t Protocol (RTP)? (Choose two.)","explanation":"Topic 14.3.4 The Real-Time Transport Protocol (RTP) is a specialized communication protocol designed specifically to facilitate the end-to-end delivery of data with real-time characteristics, such as interactive audio and video. Within the framework of network applications, particularly those utilizing the User Datagram Protocol (UDP) for transport, voice and video traffic are the primary types that leverage RTP. These media-rich transmissions, which include services such as Voice over IP (VoIP) and live multimedia streaming, are highly sensitive to latency and jitter; consequently, they prioritize the rapid, continuous flow of information over the absolute reliability provided by connection-oriented protocols. While applications such as file transfers and web browsing rely on the retransmission and sequencing mechanisms of TCP to ensure data integrity, real-time multimedia streaming accepts a degree of packet loss in favor of maintaining a synchronized and uninterrupted user experience. To manage these requirements effectively, RTP is often deployed in conjunction with the Real-Time Transport Control Protocol (RTCP) to minimize latency issues and ensure the priority delivery of real-time packets across the network infrastructure.","section":"Transport Layer","module":"Module 14","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":2,"type":"choice","choices":[{"text":"video","correct":true},{"text":"web","correct":false},{"text":"file transfer","correct":false},{"text":"voice","correct":true},{"text":"peer to peer","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":2,"question":"Which wireless technology has low-power and data rate requirements making it popular in home automation applications?","explanation":"Topic 4.6.2 ZigBee is an IEEE 802.15.4 wireless standard designed for creating personal-area networks. Low energy, power, and data rate requirements make Zigbee a popular protocol for connecting home automation devices.","section":"Physical Layer","module":"Module 4","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":3,"type":"choice","choices":[{"text":"ZigBee","correct":true},{"text":"LoRaWAN","correct":false},{"text":"5G","correct":false},{"text":"Wi-Fi","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":3,"question":"Which layer of the TCP/IP model provides a route to forward messages through an internetwork?","explanation":"Topic 3.5.3 The OSI model network layer corresponds directly to the internet layer of the TCP/IP model and is used to describe protocols that address and route messages through an internetwork.","section":"Protocols and Models","module":"Module 3","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":3,"type":"choice","choices":[{"text":"application","correct":false},{"text":"network access","correct":false},{"text":"internet","correct":true},{"text":"transport","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":4,"question":"Which type of server relies on record types such as A, NS, AAAA, and MX in order to provide services?","explanation":"Topic 15.4.2 A DNS server stores records that are used to resolve IP addresses to host names. Some DNS record types include the following: A – an end device IPv4 address NS – an authoritative name server AAAA – an end device IPv6 address MX – a mail exchange record","section":"Application Layer","module":"Module 15","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":4,"type":"choice","choices":[{"text":"DNS","correct":true},{"text":"email","correct":false},{"text":"file","correct":false},{"text":"web","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":5,"question":"What are proprietary protocols?","explanation":"Topic 3.3.4 Proprietary protocols have their definition and operation controlled by one company or vendor. Some of them can be used by different organizations with permission from the owner. The TCP/IP protocol suite is an open standard, not a proprietary protocol.","section":"Protocols and Models","module":"Module 3","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":4,"type":"choice","choices":[{"text":"protocols developed by private organizations to operate on any vendor hardware","correct":false},{"text":"protocols that can be freely used by any organization or vendor","correct":false},{"text":"protocols developed by organizations who have control over their definition and operation","correct":true},{"text":"a collection of protocols known as the TCP/IP protocol suite","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":6,"question":"What service is provided by DNS?","explanation":"Topic 15.4.1 The Domain Name System (DNS) is a foundational application layer protocol designed to automate the translation of human-readable domain names into the numeric IP addresses required for network communication. Because it is impractical for users to memorize complex strings of numbers, DNS provides a hierarchical mapping service that allows individuals to use recognizable names, such as cisco.com, while the network infrastructure continues to route data based on underlying numeric identifiers. This automated resolution process is essential for maintaining connectivity even if a server’s numeric IP address changes, as the updated address can simply be re-linked to the existing domain name without impacting the end user’s experience. While other protocols like HTTP manage the exchange of web content and FTP handles file transfers, DNS specifically serves as the directory service that ensures requests are directed to the correct destination host.","section":"Application Layer","module":"Module 15","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":5,"type":"choice","choices":[{"text":"Resolves domain names, such as cisco.com, into IP addresses.","correct":true},{"text":"A basic set of rules for exchanging text, graphic images, sound, video, and other multimedia files on the web.","correct":false},{"text":"Allows for data transfers between a client and a file server.","correct":false},{"text":"Uses encryption to secure the exchange of text, graphic images, sound, and video on the web.","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":7,"question":"A client packet is received by a server. The packet has a destination port number of 110. What service is the client requesting?","explanation":"Topic 14.4.3 The transport layer utilizes destination port numbers to identify the specific service or application being requested on a server. According to the standard port assignments defined by the Internet Assigned Numbers Authority (IANA), port 110 is reserved as a well-known port for the Post Office Protocol version 3 (POP3) . When a server receives a packet with this destination port, it recognizes that the client is requesting to establish a connection for retrieving email messages. While other ports are used for different mail services—such as port 25 for SMTP or port 143 for IMAP—port 110 specifically signals the server to direct the traffic to the POP3 application process to facilitate the download of mail to the client’s local application.","section":"Transport Layer","module":"Module 14","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":5,"type":"choice","choices":[{"text":"DNS","correct":false},{"text":"DHCP","correct":false},{"text":"SMTP","correct":false},{"text":"POP3","correct":true}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":8,"question":"What command can be used on a Windows PC to see the IP configuration of that computer?","explanation":"Topic 17.5.1 The ipconfig command is the primary utility used on a Windows-based computer to display its current IP configuration, including the IPv4 and IPv6 addresses, subnet mask, and default gateway. While networking devices like routers and switches use Cisco IOS commands such as or show ip interface brief show interfaces to verify their own configurations, Windows hosts rely on ipconfig to provide a summary of network settings directly from the command prompt. For a more comprehensive view that includes physical (MAC) addresses and DNS server details, the command can be extended with the switch /all","section":"Build a Small Network","module":"Module 17","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":6,"type":"choice","choices":[{"text":"show ip interface brief","correct":false},{"text":"ping","correct":false},{"text":"show interfaces","correct":false},{"text":"ipconfig","correct":true}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":9,"question":"A wired laser printer is attached to a home computer. That printer has been shared so that other computers on the home network can also use the printer. What networking model is in use?","explanation":"Topic 1.2.2 Peer-to-peer (P2P) networks have two or more network devices that can share resources such as printers or files without having a dedicated server.","section":"Networking Today","module":"Module 1","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":6,"type":"choice","choices":[{"text":"client-based","correct":false},{"text":"master-slave","correct":false},{"text":"point-to-point","correct":false},{"text":"peer-to-peer (P2P)","correct":true}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":10,"question":"What characteristic describes a virus?","explanation":"Topic 16.2.1 A virus is a specific type of malware defined as malicious software or code running on an end device , such as a computer, laptop, or mobile phone. Unlike standalone threats, a virus typically propagates by inserting a copy of itself into another program or executable file and remains dormant until a user runs that host file. Once activated, the virus can spread to other systems through network transfers, file sharing, or email attachments, potentially causing damage ranging from minor annoyances to the total destruction of data and system functionality. This distinguishes viruses from other security concepts, such as firewalls which are hardware or software filters, or denial of service attacks which focus on overwhelming network resources.","section":"Network Security Fundamentals","module":"Module 16","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":7,"type":"choice","choices":[{"text":"a network device that filters access and traffic coming into a network","correct":false},{"text":"the use of stolen credentials to access private data","correct":false},{"text":"an attack that slows or crashes a device or network service","correct":false},{"text":"malicious software or code running on an end device","correct":true}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":11,"question":"Three bank employees are using the corporate network. The first employee uses a web browser to view a company web page in order to read some announcements. The second employee accesses the corporate database to perform some financial transactions. The third employee participates in an important live audio conference with other corporate managers in branch offices. If QoS is implemented on this network, what will be the priorities from highest to lowest of the different data types?","explanation":"Topic 1.6.4 QoS mechanisms enable the establishment of queue management strategies that enforce priorities for different categories of application data. Thus, this queuing enables voice data to have priority over transaction data, which has priority over web data.","section":"Networking Today","module":"Module 1","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":7,"type":"choice","choices":[{"text":"financial transactions, web page, audio conference","correct":false},{"text":"audio conference, financial transactions, web page","correct":true},{"text":"financial transactions, audio conference, web page","correct":false},{"text":"audio conference, web page, financial transactions","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":12,"question":"Match the description to the IPv6 addressing component. (Not all options are used.)","explanation":"Topic 12.3.6 Place the options in the following order: This network portion of the address is assigned by the provider. global routing This part of the address is used by an organization to identify subnets. subnet ID This part of the address is the equivalent to the host portion of an IPv4 address. interface ID","section":"IPv6 Addressing","module":"Module 12","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":8,"type":"reveal","answer":"See the associated exhibit for the answer shown in the source PDF.","choices":[],"images":["assets/question-images/ccna-1-v7-0-final-exam-answers-full-introduction-to-networks-p8-c070ee6f5b9e.png"],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":13,"question":"Refer to the exhibit. If Host1 were to transfer a file to the server, what layers of the TCP/IP model would be used?","explanation":"Topic 3.5.3 The TCP/IP model contains the application, transport, internet, and network access layers. A file transfer uses the FTP application layer protocol. The data would move from the application layer through all of the layers of the model and across the network to the file server.","section":"Protocols and Models","module":"Module 3","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":9,"type":"choice","choices":[{"text":"only application and Internet layers","correct":false},{"text":"only Internet and network access layers","correct":false},{"text":"only application, Internet, and network access layers","correct":false},{"text":"application, transport, Internet, and network access layers","correct":true},{"text":"only application, transport, network, data link, and physical layers","correct":false},{"text":"application, session, transport, network, data link, and physical layers","correct":false}],"images":["assets/question-images/ccna-1-v7-0-final-exam-answers-full-introduction-to-networks-p9-5511e4da6c59.png"],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":14,"question":"Match the characteristic to the forwarding method. (Not all options are used.)","explanation":"Topic 7.4.1 A store-and-forward switch always stores the entire frame before forwarding, and checks its CRC and frame length. A cut-through switch can forward frames before receiving the destination address field, thus presenting less latency than a store-and-forward switch. Because the frame can begin to be forwarded before it is completely received, the switch may transmit a corrupt or runt frame. All forwarding methods require a Layer 2 switch to forward broadcast frames.","section":"Ethernet Switching","module":"Module 7","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":9,"type":"reveal","answer":"See the associated exhibit for the answer shown in the source PDF.","choices":[],"images":["assets/question-images/ccna-1-v7-0-final-exam-answers-full-introduction-to-networks-p9-9c17b639f452.png"],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":15,"question":"Refer to the exhibit. The IP address of which device interface should be used as the default gateway setting of host H1?","explanation":"Topic 10.3.1 The default gateway for host H1 is the router interface that is attached to the LAN that H1 is a member of. In this case, that is the G0/0 interface of R1. H1 should be configured with the IP address of that interface in its addressing settings. R1 will provide routing services to packets from H1 that need to be forwarded to remote networks.","section":"Basic Router Configuration","module":"Module 10","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":10,"type":"choice","choices":[{"text":"R1: S0/0/0","correct":false},{"text":"R2: S0/0/1","correct":false},{"text":"R1: G0/0","correct":true},{"text":"R2: S0/0/0","correct":false}],"images":["assets/question-images/ccna-1-v7-0-final-exam-answers-full-introduction-to-networks-p11-e96be1ef63e5.png"],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":16,"question":"What service is provided by Internet Messenger?","explanation":"Topic 1.2.1 Internet Messenger, widely recognized as instant messaging, is a service that facilitates real-time communication between remote users across a network infrastructure. According to the documentation on host roles, it functions as client software that allows individuals to interact synchronously, enabling the immediate exchange of text and ideas within online communities or organizational settings. Unlike asynchronous services such as email, which follow a store-and-forward model, Internet Messenger supports simultaneous messaging where users can both initiate and receive data in a continuous stream to achieve their communication objectives. This application is essential for modern collaboration, often operating through peer-to-peer or hybrid networking models to ensure that users stay connected across geographic and cultural boundaries.","section":"Networking Today","module":"Module 1","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":11,"type":"choice","choices":[{"text":"An application that allows real-time chatting among remote users.","correct":true},{"text":"Allows remote access to network devices and servers.","correct":false},{"text":"Resolves domain names, such as cisco.com, into IP addresses.","correct":false},{"text":"Uses encryption to provide secure remote access to network devices and servers.","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":18,"question":"Refer to the exhibit. Which protocol was responsible for building the table that is shown?","explanation":"Topic 9.2.7 The table that is shown corresponds to the output of the arp -a command, a command that is used on a Windows PC to display the ARP table.","section":"Address Resolution","module":"Module 9","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":13,"type":"choice","choices":[{"text":"DHCP","correct":false},{"text":"ARP","correct":true},{"text":"DNS","correct":false},{"text":"ICMP","correct":false}],"images":["assets/question-images/ccna-1-v7-0-final-exam-answers-full-introduction-to-networks-p13-5c166cfdb268.png"],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":19,"question":"A network administrator notices that some newly installed Ethernet cabling is carrying corrupt and distorted data signals. The new cabling was installed in the ceiling close to fluorescent lights and electrical equipment. Which two factors may interfere with the copper cabling and result in signal distortion and data corruption? (Choose two.)","explanation":"Topic 4.3.1 Copper cabling transmits data using electrical pulses, which are highly susceptible to distortion from external electromagnetic signals. According to the sources, electromagnetic interference (EMI) and radio frequency interference (RFI) are two primary factors that can corrupt data signals when cabling is positioned near electronic noise sources such as fluorescent lights, electric motors, or other heavy electrical equipment. While signal attenuation is related to the deterioration of a signal over an extended length of cabling and crosstalk involves interference between adjacent wires within the same cable, EMI and RFI represent external environmental disruptions that can change bit values during transmission. To mitigate these specific effects, network administrators must often use shielded cabling or ensure a physical distance between the data cables and potential sources of interference.","section":"Physical Layer","module":"Module 4","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":13,"type":"choice","choices":[{"text":"crosstalk","correct":false},{"text":"extended length of cabling","correct":false},{"text":"RFI","correct":true},{"text":"EMI","correct":true},{"text":"signal attenuation","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":20,"question":"A host is trying to send a packet to a device on a remote LAN segment, but there are currently no mappings in its ARP cache. How will the device obtain a destination MAC address? (A host is trying to send a packet to a device on a remote LAN segment, but there are currently no mappings in the ARP cache. How will the device obtain a destination MAC address?)","explanation":"Topic 9.2.5 When a source host identifies that a destination IP address resides on a remote network segment , it must forward the packet to its default gateway (the local router) to reach that destination. Because Layer 2 Ethernet frames are designed for local delivery within the same segment, the host requires the physical MAC address of the gateway’s interface to encapsulate the IP packet. If the ARP cache does not contain a mapping for the gateway’s IP address, the host initiates an ARP request specifically for the default gateway’s MAC address . The host does not request the MAC address of the final destination device, as that device is not on the local segment and cannot respond to local Layer 2 broadcast requests. Once the gateway’s MAC address is resolved and stored in the cache, the host can successfully transmit the frame to the router for further delivery across the internetwork.","section":"Address Resolution","module":"Module 9","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":14,"type":"choice","choices":[{"text":"It will send the frame and use its own MAC address as the destination.","correct":false},{"text":"It will send an ARP request for the MAC address of the destination device.","correct":false},{"text":"It will send the frame with a broadcast MAC address.","correct":false},{"text":"It will send a request to the DNS server for the destination MAC address.","correct":false},{"text":"It will send an ARP request for the MAC address of the default gateway.","correct":true}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":22,"question":"A client packet is received by a server. The packet has a destination port number of 53. What service is the client requesting?","explanation":"Topic 14.4.3 The transport layer utilizes destination port numbers to identify the specific application or service being requested on a destination server. According to the standard assignments defined by the Internet Assigned Numbers Authority (IANA), port 53 is categorized as a well-known port reserved specifically for the Domain Name System (DNS) . When a server receives a packet with this destination port, it recognizes that the client is requesting a name resolution service, typically to translate a human- readable domain name into its corresponding numeric IP address. While other services such as POP3 or IMAP utilize their own designated well-known ports (110 and 143 respectively) to facilitate email retrieval, port 53 remains the global standard for DNS queries and responses using both UDP and TCP transport protocols.","section":"Transport Layer","module":"Module 14","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":15,"type":"choice","choices":[{"text":"DNS","correct":true},{"text":"NetBIOS (NetBT)","correct":false},{"text":"POP3","correct":false},{"text":"IMAP","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":23,"question":"A network administrator is adding a new LAN to a branch office. The new LAN must support 25 connected devices. What is the smallest network mask that the network administrator can use for the new network?","explanation":"Topic 11.7.2 To support a LAN with 25 connected devices, a network administrator must select a subnet mask that provides a sufficient number of usable host addresses while minimizing the waste of address space. The number of usable hosts is determined by the formula 2 n −2, where n represents the number of host bits remaining in the mask. A subnet mask of 255.255.255.224 (which corresponds to a /27 prefix) leaves 5 bits for the host portion, allowing for 30 usable host addresses (25−2=30). This is the most efficient (smallest) block among the choices provided because the next available mask, 255.255.255.240 (/28), only provides 14 usable addresses (24−2=14), which would not accommodate the 25 required devices. By utilizing the /27 mask, the administrator ensures that the requirements of the branch office are met while adhering to the principle of maximizing available subnets by minimizing unused IP addresses.","section":"IPv4 Addressing","module":"Module 11","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":15,"type":"choice","choices":[{"text":"255.255.255.128","correct":false},{"text":"255.255.255.192","correct":false},{"text":"255.255.255.224","correct":true},{"text":"255.255.255.240","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":24,"question":"What characteristic describes a Trojan horse?","explanation":"Topic 16.2.1 A Trojan horse is a specialized form of malware characterized by malicious software or code running on an end device that intentionally disguises itself as a legitimate program to deceive users. Unlike viruses which attach to existing host programs or worms which are standalone and self-propagating, Trojan horses rely on user interaction—such as opening an email attachment or executing a download—to be loaded and activated on a system. Once executed, the software can perform a variety of illegitimate actions, including the destruction of data, the theft of sensitive information, or the creation of unauthorized back doors that provide threat actors with persistent access to the compromised host. Because they present a harmful payload within a seemingly benign package, Trojan horses are considered a primary external security threat that exploits human trust rather than relying solely on technical system vulnerabilities.","section":"Network Security Fundamentals","module":"Module 16","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":16,"type":"choice","choices":[{"text":"malicious software or code running on an end device","correct":true},{"text":"an attack that slows or crashes a device or network service","correct":false},{"text":"the use of stolen credentials to access private data","correct":false},{"text":"a network device that filters access and traffic coming into a network","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":25,"question":"What service is provided by HTTPS?","explanation":"Topic 15.3.2 Hypertext Transfer Protocol Secure (HTTPS) is the encrypted version of HTTP, designed to provide authentication and secure data transmission across the World Wide Web. While standard HTTP transmits data in plaintext that can be intercepted and read, HTTPS utilizes Secure Socket Layer (SSL) or Transport Layer Security (TLS) to encrypt the data stream as it travels between the client browser and the web server. This encryption specifically protects various types of web content— including text, graphic images, and multimedia files— ensuring that the information remains confidential and has not been altered during transit. Consequently, many organizations implement HTTPS as a security policy to authenticate websites and protect user interactions against data interception and theft.","section":"Application Layer","module":"Module 15","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":17,"type":"choice","choices":[{"text":"Uses encryption to provide secure remote access to network devices and servers.","correct":false},{"text":"Resolves domain names, such as cisco.com, into IP addresses.","correct":false},{"text":"Uses encryption to secure the exchange of text, graphic images, sound, and video on the web.","correct":true},{"text":"Allows remote access to network devices and servers.","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":26,"question":"A technician with a PC is using multiple applications while connected to the Internet. How is the PC able to keep track of the data flow between multiple application sessions and have each application receive the correct packet flows?","explanation":"Topic 14.4.1 The source port number of an application is randomly generated and used to individually keep track of each session connecting out to the Internet. Each application will use a unique source port number to provide simultaneous communication from multiple applications through the Internet.","section":"Transport Layer","module":"Module 14","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":17,"type":"choice","choices":[{"text":"The data flow is being tracked based on the destination MAC address of the technician PC.","correct":false},{"text":"The data flow is being tracked based on the source port number that is used by each application.","correct":true},{"text":"The data flow is being tracked based on the source IP address that is used by the PC of the technician.","correct":false},{"text":"The data flow is being tracked based on the destination IP address that is used by the PC of the technician.","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":27,"question":"A network administrator is adding a new LAN to a branch office. The new LAN must support 61 connected devices. What is the smallest network mask that the network administrator can use for the new network?","explanation":"Topic 11.7.2 To support a LAN with 61 connected devices, the network administrator must select a subnet mask that provides a sufficient number of usable host addresses while minimizing wasted address space. The number of usable hosts is calculated using the formula 2 n −2, where n represents the number of host bits remaining in the mask. A subnet mask of 255.255.255.192 (which corresponds to a /26 prefix) leaves 6 bits for the host portion, providing 62 usable host addresses . This is the most efficient (smallest) mask among the choices because the next tighter mask, 255.255.255.224 (/27), only provides 30 usable addresses, which is insufficient for the 61 required devices. While the 255.255.255.128 (/25) mask would also accommodate the devices, it provides 126 usable addresses and would therefore result in a significant number of unused IP addresses compared to the /26 option.","section":"IPv4 Addressing","module":"Module 11","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":18,"type":"choice","choices":[{"text":"255.255.255.240","correct":false},{"text":"255.255.255.224","correct":false},{"text":"255.255.255.192","correct":true},{"text":"255.255.255.128","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":29,"question":"What characteristic describes a DoS attack?","explanation":"Topic 16.2.4 A Denial of Service (DoS) attack is a malicious attempt to prevent legitimate users from accessing network services or resources by intentionally consuming system capacity. According to the sources, the primary characteristic of this attack type is that it is designed to slow or crash the applications and processes running on a network device. While other security threats such as identity theft or spyware focus on stealing data or monitoring user activity, DoS attacks prioritize the disruption of service availability, often leading to significant operational downtime and financial loss for an organization.","section":"Network Security Fundamentals","module":"Module 16","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":20,"type":"choice","choices":[{"text":"the use of stolen credentials to access private data","correct":false},{"text":"a network device that filters access and traffic coming into a network","correct":false},{"text":"software that is installed on a user device and collects information about the user","correct":false},{"text":"an attack that slows or crashes a device or network service","correct":true}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":30,"question":"Match the application protocols to the correct transport protocols.","explanation":"Topic 14.4.3","section":"Transport Layer","module":"Module 14","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":20,"type":"reveal","answer":"See the associated exhibit for the answer shown in the source PDF.","choices":[],"images":["assets/question-images/ccna-1-v7-0-final-exam-answers-full-introduction-to-networks-p20-476a71c8a3e1.png"],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":31,"question":"What service is provided by SMTP?","explanation":"Topic 15.3.4 The Simple Mail Transfer Protocol (SMTP) is a foundational application layer protocol designed to facilitate the reliable transmission of electronic mail across a network. According to the sources, its primary function is to enable email clients to send messages to a local mail server and to allow those mail servers to further relay messages to other servers across the internet. Unlike retrieval protocols such as POP3 or IMAP, which are used by clients to download or manage mail stored on a server, SMTP specifically handles the outgoing delivery process and requires a properly formatted message header containing recipient and sender addresses. This service operates using a store-and-forward method where messages are spooled and periodically retried if the destination server is temporarily busy or offline, ensuring that communication remains persistent even when immediate end-to-end connectivity is not available.","section":"Application Layer","module":"Module 15","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":21,"type":"choice","choices":[{"text":"Allows clients to send email to a mail server and the servers to send email to other servers.","correct":true},{"text":"Allows remote access to network devices and servers.","correct":false},{"text":"Uses encryption to provide secure remote access to network devices and servers.","correct":false},{"text":"An application that allows real-time chatting among remote users.","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":33,"question":"Refer to the exhibit. Host B on subnet Teachers transmits a packet to host D on subnet Students. Which Layer 2 and Layer 3 addresses are contained in the PDUs that are transmitted from host B to the router?","explanation":"Topic 9.1.2 The source and destination port numbers are used to identify the correct application and window within that application.","section":"Address Resolution","module":"Module 9","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":22,"type":"reveal","answer":"Layer 2 destination address = 00-00-0c-94-36-ab | Layer 2 source address = 00-00-0c-94-36-bb | Layer 3 destination address = 172.16.20.200 | Layer 3 source address = 172.16.10.200","choices":[],"images":["assets/question-images/ccna-1-v7-0-final-exam-answers-full-introduction-to-networks-p22-1d6afea8b703.png"],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":34,"question":"What does the term “attenuation” mean in data communication?","explanation":"Topic 4.3.1 Data is transmitted on copper cables as electrical pulses. A detector in the network interface of a destination device must receive a signal that can be successfully decoded to match the signal sent. However, the farther the signal travels, the more it deteriorates. This is referred to as signal attenuation.","section":"Physical Layer","module":"Module 4","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":23,"type":"choice","choices":[{"text":"strengthening of a signal by a networking device","correct":false},{"text":"leakage of signals from one cable pair to another","correct":false},{"text":"time for a signal to reach its destination","correct":false},{"text":"loss of signal strength as distance increases","correct":true}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":35,"question":"Refer to the exhibit. An administrator is trying to configure the switch but receives the error message that is displayed in the exhibit. What is the problem?","explanation":"Topic 2.2.4 In order to enter global configuration mode, the command configure terminal, or a shortened version such as config t, must be entered from privileged EXEC mode. In this scenario the administrator is in user EXEC mode, as indicated by the > symbol after the hostname. The administrator would need to use the enable command to move into privileged EXEC mode before entering the configure terminal command.","section":"Basic Switch and End Device Configuration","module":"Module 2","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":23,"type":"choice","choices":[{"text":"The entire command, configure terminal, must be used.","correct":false},{"text":"The administrator is already in global configuration mode.","correct":false},{"text":"The administrator must first enter privileged EXEC mode before issuing the command.","correct":true},{"text":"The administrator must connect via the console port to access global configuration mode.","correct":false}],"images":["assets/question-images/ccna-1-v7-0-final-exam-answers-full-introduction-to-networks-p24-f520c1499bae.png"],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":36,"question":"Which two protocols operate at the top layer of the TCP/IP protocol suite? (Choose two.)","explanation":"Topic 3.3.4 The top layer of the TCP/IP protocol suite is the application layer , which provides the primary interface for network-aware software to interact with the underlying network infrastructure. Within this model, both DNS (Domain Name System) and POP (Post Office Protocol) function at this highest level to facilitate specific user-facing services, such as translating human-readable domain names into numeric IP addresses and enabling the retrieval of email from mail servers. While other protocols like TCP and UDP operate at the transport layer to manage end-to-end communication, and IP operates at the internet layer to handle routing, DNS and POP are responsible for defining the content and formatting of requests and responses for their respective applications. Therefore, they belong to the application layer, ensuring that data is presented in a format that both the source and destination hosts can process effectively.","section":"Protocols and Models","module":"Module 3","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":24,"type":"choice","choices":[{"text":"TCP","correct":false},{"text":"IP","correct":false},{"text":"UDP","correct":false},{"text":"POP","correct":true},{"text":"DNS","correct":true},{"text":"Ethernet","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":37,"question":"A company has a file server that shares a folder named Public. The network security policy specifies that the Public folder is assigned Read-Only rights to anyone who can log into the server while the Edit rights are assigned only to the network admin group. Which component is addressed in the AAA network service framework?","explanation":"Topic 16.3.4 After a user is successfully authenticated (logged into the server), the authorization is the process of determining what network resources the user can access and what operations (such as read or edit) the user can perform.","section":"Network Security Fundamentals","module":"Module 16","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":25,"type":"choice","choices":[{"text":"automation","correct":false},{"text":"accounting","correct":false},{"text":"authentication","correct":false},{"text":"authorization","correct":true}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":38,"question":"What three requirements are defined by the protocols used in network communcations to allow message transmission across a network? (Choose three.)","explanation":"Topic 3.1.5 Network communication protocols establish specific rules and standards to ensure that data is successfully transmitted and understood by both the sender and the receiver. According to the sources, these protocols define several critical requirements for message transmission, including message encoding , which converts information into an acceptable format for the medium, and message size , which ensures data is broken into manageable pieces that receiving devices can process. Furthermore, protocols specify delivery options —such as unicast, multicast, or broadcast—to determine whether a message is intended for a single individual or a broader group of recipients. By standardizing these elements along with message timing and formatting, protocols facilitate effective communication between diverse devices across the network infrastructure.","section":"Protocols and Models","module":"Module 3","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":25,"type":"choice","choices":[{"text":"message size","correct":true},{"text":"message encoding","correct":true},{"text":"connector specifications","correct":false},{"text":"media selection","correct":false},{"text":"delivery options","correct":true},{"text":"end-device installation","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":39,"question":"What are two characteristics of IP? (Choose two.)","explanation":"Topic 8.1.3 The Internet Protocol (IP) is a connectionless, best effort protocol. This means that IP requires no end-to-end connection nor does it guarantee delivery of packets. IP is also media independent, which means it operates independently of the network media carrying the packets.","section":"Network Layer","module":"Module 8","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":26,"type":"choice","choices":[{"text":"does not require a dedicated end-to-end connection","correct":true},{"text":"operates independently of the network media","correct":true},{"text":"retransmits packets if errors occur","correct":false},{"text":"re-assembles out of order packets into the correct order at the receiver end","correct":false},{"text":"guarantees delivery of packets","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":40,"question":"An employee of a large corporation remotely logs into the company using the appropriate username and password. The employee is attending an important video conference with a customer concerning a large sale. It is important for the video quality to be excellent during the meeting. The employee is unaware that after a successful login, the connection to the company ISP failed. The secondary connection, however, activated within seconds. The disruption was not noticed by the employee or other employees. What three network characteristics are described in this scenario? (Choose three.)","explanation":"Topic 1.6.1 Usernames and passwords relate to network security. Good quality video, to support video conferencing, relates to prioritizing the video traffic with quality of service (QoS). The fact that a connection to an ISP failed and was then restored but went unnoticed by employees relates to the fault tolerant design of the network.","section":"Networking Today","module":"Module 1","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":26,"type":"choice","choices":[{"text":"security","correct":true},{"text":"quality of service","correct":true},{"text":"scalability","correct":false},{"text":"powerline networking","correct":false},{"text":"integrity","correct":false},{"text":"fault tolerance","correct":true}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":41,"question":"What are two common causes of signal degradation when using UTP cabling? (Choose two.)","explanation":"Topic 4.4.2 When terminated improperly, each cable is a potential source of physical layer performance degradation.","section":"Physical Layer","module":"Module 4","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":27,"type":"choice","choices":[{"text":"improper termination","correct":true},{"text":"low-quality shielding in cable","correct":false},{"text":"installing cables in conduit","correct":false},{"text":"low-quality cable or connectors","correct":true},{"text":"loss of light over long distances","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":43,"question":"Refer to the exhibit. On the basis of the output, which two statements about network connectivity are correct? (Choose two.)","explanation":"Topic 17.4.3 The output displays a successful Layer 3 connection between a host computer and a host at 19.168.100.1. It can be determined that 4 hops exist between them and the average transmission time is 1 milliseconds. Layer 3 connectivity does not necessarily mean that an application can run between the hosts.","section":"Build a Small Network","module":"Module 17","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":28,"type":"choice","choices":[{"text":"This host does not have a default gateway configured.","correct":false},{"text":"There are 4 hops between this device and the device at 192.168.100.1.","correct":true},{"text":"There is connectivity between this device and the device at 192.168.100.1.","correct":true},{"text":"The connectivity between these two hosts allows for videoconferencing calls.","correct":false},{"text":"The average transmission time between the two hosts is 2 milliseconds.","correct":false}],"images":["assets/question-images/ccna-1-v7-0-final-exam-answers-full-introduction-to-networks-p28-2e130ef3e614.png"],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":44,"question":"Which two statements describe how to assess traffic flow patterns and network traffic types using a protocol analyzer? (Choose two.)","explanation":"Topic 17.3.2 Traffic flow patterns should be gathered during peak utilization times to get a good representation of the different traffic types. The capture should also be performed on different network segments because some traffic will be local to a particular segment.","section":"Build a Small Network","module":"Module 17","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":28,"type":"choice","choices":[{"text":"Capture traffic on the weekends when most employees are off work.","correct":false},{"text":"Capture traffic during peak utilization times to get a good representation of the different traffic types.","correct":true},{"text":"Only capture traffic in the areas of the network that receive most of the traffic such as the data center.","correct":false},{"text":"Perform the capture on different network segments.","correct":true},{"text":"Only capture WAN traffic because traffic to the web is responsible for the largest amount of traffic on a network.","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":45,"question":"What is the consequence of configuring a router with the","explanation":"Topic 12.5.1 The ipv6 unicast-routing global configuration command is a critical step in IPv6 implementation because Cisco routers do not function as IPv6 routers by default. Once this command is issued, the router joins the all-routers multicast group and its IPv6-enabled interfaces begin transmitting ICMPv6 Router Advertisement (RA) messages periodically or in response to host solicitations. These RA messages are essential for dynamic address allocation, as they provide neighboring hosts with vital information such as the network prefix, prefix length, and the default gateway address. While link-local addresses are generated automatically when IPv6 is enabled on an interface, the global unicast routing command is specifically what triggers the router to begin its active role in directing IPv6 traffic and facilitating stateless address autoconfiguration (SLAAC).","section":"IPv6 Addressing","module":"Module 12","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":29,"type":"choice","choices":[{"text":"ipv6 unicast-routing","correct":false},{"text":"global configuration command?","correct":false},{"text":"All router interfaces will be automatically activated.","correct":false},{"text":"The IPv6 enabled router interfaces begin sending ICMPv6 Router Advertisement messages.","correct":true},{"text":"Each router interface will generate an IPv6 link-local address.","correct":false},{"text":"It statically creates a global unicast address on this router.","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":46,"question":"Which three layers of the OSI model map to the application layer of the TCP/IP model? (Choose three.)","explanation":"Topic 15.1.1 The TCP/IP model consists of four layers: application, transport, internet, and network access. The OSI model consists of seven layers: application, presentation, session, transport, network, data link, and physical. The top three layers of the OSI model: application, presentation, and session map to the application layer of the TCP/IP model.","section":"Application Layer","module":"Module 15","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":29,"type":"choice","choices":[{"text":"application","correct":true},{"text":"network","correct":false},{"text":"data link","correct":false},{"text":"session","correct":true},{"text":"presentation","correct":true},{"text":"transport","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":47,"question":"Refer to the exhibit. If PC1 is sending a packet to PC2 and routing has been configured between the two routers, what will R1 do with the Ethernet frame header attached by PC1?","explanation":"Topic 6.1.3 When PC1 forms the various headers attached to the data one of those headers is the Layer 2 header. Because PC1 connects to an Ethernet network, an Ethernet header is used. The source MAC address will be the MAC address of PC1 and the destination MAC address will be that of G0/0 on R1. When R1 gets that information, the router removes the Layer 2 header and creates a new one for the type of network the data will be placed onto (the serial link).","section":"Data Link Layer","module":"Module 6","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":30,"type":"choice","choices":[{"text":"nothing, because the router has a route to the destination network","correct":false},{"text":"open the header and use it to determine whether the data is to be sent out S0/0/0","correct":false},{"text":"open the header and replace the destination MAC address with a new one","correct":false},{"text":"remove the Ethernet header and configure a new Layer 2 header before sending it out S0/0/0","correct":true}],"images":["assets/question-images/ccna-1-v7-0-final-exam-answers-full-introduction-to-networks-p30-98ec1f022328.png"],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":48,"question":"What will happen if the default gateway address is incorrectly configured on a host?","explanation":"Topic 10.3.1 When a host needs to send a message to another host located on the same network, it can forward the message directly. However, when a host needs to send a message to a remote network, it must use the router, also known as the default gateway. This is because the data link frame address of the remote destination host cannot be used directly. Instead, the IP packet has to be sent to the router (default gateway) and the router will forward the packet toward its destination. Therefore, if the default gateway is incorrectly configured, the host can communicate with other hosts on the same network, but not with hosts on remote networks.","section":"Basic Router Configuration","module":"Module 10","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":31,"type":"choice","choices":[{"text":"The host cannot communicate with other hosts in the local network.","correct":false},{"text":"The host cannot communicate with hosts in other networks.","correct":true},{"text":"A ping from the host to 127.0.0.1 would not be successful.","correct":false},{"text":"The host will have to use ARP to determine the correct address of the default gateway.","correct":false},{"text":"The switch will not forward packets initiated by the host.","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":49,"question":"What are two features of ARP? (Choose two.)","explanation":"Topic 9.2.2 When a node encapsulates a data packet into a frame, it needs the destination MAC address. First it determines if the destination device is on the local network or on a remote network. Then it checks the ARP table (not the MAC table) to see if a pair of IP address and MAC address exists for either the destination IP address (if the destination host is on the local network) or the default gateway IP address (if the destination host is on a remote network). If the match does not exist, it generates an ARP broadcast to seek the IP address to MAC address resolution. Because the destination MAC address is unknown, the ARP request is broadcast with the MAC address FFFF.FFFF.FFFF. Either the destination device or the default gateway will respond with its MAC address, which enables the sending node to assemble the frame. If no device responds to the ARP request, then the originating node will discard the packet because a frame cannot be created.","section":"Address Resolution","module":"Module 9","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":31,"type":"choice","choices":[{"text":"When a host is encapsulating a packet into a frame, it refers to the MAC address table to determine the mapping of IP addresses to MAC addresses.","correct":false},{"text":"An ARP request is sent to all devices on the Ethernet LAN and contains the IP address of the destination host and its multicast MAC address.","correct":false},{"text":"If a host is ready to send a packet to a local destination device and it has the IP address but not the MAC address of the destination, it generates an ARP broadcast.","correct":true},{"text":"If no device responds to the ARP request, then the originating node will broadcast the data packet to all devices on the network segment.","correct":false},{"text":"If a device receiving an ARP request has the destination IPv4 address, it responds with an ARP reply.","correct":true}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":50,"question":"A network administrator is adding a new LAN to a branch office. The new LAN must support 90 connected devices. What is the smallest network mask that the network administrator can use for the new network?","explanation":"Topic 11.7.2 To support a LAN with 90 connected devices, the network administrator must select a subnet mask that provides a sufficient number of usable host addresses while minimizing wasted address space. The number of usable hosts is calculated using the formula 2 n −2, where n represents the number of host bits remaining in the mask. A subnet mask of 255.255.255.128 (which corresponds to a /25 prefix) leaves 7 bits for the host portion, providing 126 usable host addresses . This is the most efficient (smallest) mask among the provided choices because the next tighter mask, 255.255.255.224 (/27), only provides 30 usable addresses, which is insufficient for the 90 required devices. By utilizing the /25 mask, the administrator ensures that the branch office requirements are met while adhering to the principle of maximizing available subnets by minimizing unused IP addresses.","section":"IPv4 Addressing","module":"Module 11","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":32,"type":"choice","choices":[{"text":"255.255.255.128","correct":true},{"text":"255.255.255.240","correct":false},{"text":"255.255.255.248","correct":false},{"text":"255.255.255.224","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":51,"question":"What are two ICMPv6 messages that are not present in ICMP for IPv4? (Choose two.)","explanation":"Topic 13.1.5 While ICMPv6 maintains several error and informational messages common to ICMPv4—such as Destination Unreachable and Time Exceeded—it introduces enhanced functionality through the Neighbor Discovery Protocol (NDP). According to the sources, specific messages including Neighbor Solicitation and Router Advertisement are unique to ICMPv6 and are utilized to facilitate critical network processes like address resolution, duplicate address detection, and dynamic address allocation. These new messaging types allow IPv6-enabled devices to discover local routers and resolve MAC addresses for known IPv6 addresses more efficiently than the broadcast-based resolution methods used in IPv4 environments.","section":"ICMP","module":"Module 13","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":33,"type":"choice","choices":[{"text":"Neighbor Solicitation","correct":true},{"text":"Destination Unreachable","correct":false},{"text":"Host Confirmation","correct":false},{"text":"Time Exceeded","correct":false},{"text":"Router Advertisement","correct":true},{"text":"Route Redirection","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":52,"question":"A client packet is received by a server. The packet has a destination port number of 80. What service is the client requesting?","explanation":"Topic 14.4.3 The transport layer uses port numbers to identify specific applications and services. According to the well-known port assignments, port 80 is reserved for Hypertext Transfer Protocol (HTTP) web services. When a server receives a packet with port 80 as the destination, it identifies the request as a client seeking to access web content, such as HTML pages. This standardized numbering allows the server to simultaneously handle multiple services, distinguishing web traffic from other requests like DNS (port 53) or SMTP (port 25).","section":"Transport Layer","module":"Module 14","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":33,"type":"choice","choices":[{"text":"DHCP","correct":false},{"text":"SMTP","correct":false},{"text":"DNS","correct":false},{"text":"HTTP","correct":true}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":53,"question":"What is an advantage for small organizations of adopting IMAP instead of POP?","explanation":"Topic 15.3.4 IMAP and POP are protocols that are used to retrieve email messages. The advantage of using IMAP instead of POP is that when the user connects to an IMAP-capable server, copies of the messages are downloaded to the client application. IMAP then stores the email messages on the server until the user manually deletes those messages.","section":"Application Layer","module":"Module 15","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":34,"type":"choice","choices":[{"text":"POP only allows the client to store messages in a centralized way, while IMAP allows distributed storage.","correct":false},{"text":"Messages are kept in the mail servers until they are manually deleted from the email client.","correct":true},{"text":"When the user connects to a POP server, copies of the messages are kept in the mail server for a short time, but IMAP keeps them for a long time.","correct":false},{"text":"IMAP sends and retrieves email, but POP only retrieves email.","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":54,"question":"A technician can ping the IP address of the web server of a remote company but cannot successfully ping the URL address of the same web server. Which software utility can the technician use to diagnose the problem?","explanation":"Topic 15.4.4 Traceroute (tracert) is a utility that generates a list of hops that were successfully reached along the path from source to destination.This list can provide important verification and troubleshooting information. The ipconfig utility is used to display the IP configuration settings on a Windows PC. The Netstat utility is used to identify which active TCP connections are open and running on a networked host. Nslookup is a utility that allows the user to manually query the name servers to resolve a given host name. This utility can also be used to troubleshoot name resolution issues and to verify the current status of the name servers.","section":"Application Layer","module":"Module 15","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":35,"type":"choice","choices":[{"text":"tracert","correct":false},{"text":"ipconfig","correct":false},{"text":"netstat","correct":false},{"text":"nslookup","correct":true}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":55,"question":"Which two functions are performed at the LLC sublayer of the OSI Data Link Layer to facilitate Ethernet communication? (Choose two.)","explanation":"Topic 6.1.2 The data link layer is actually divided into two sublayers: + Logical Link Control (LLC): This upper sublayer defines the software processes that provide services to the network layer protocols. It places information in the frame that identifies which network layer protocol is being used for the frame. This information allows multiple Layer 3 protocols, such as IPv4 and IPv6, to utilize the same network interface and media. + Media Access Control (MAC): This lower sublayer defines the media access processes performed by the hardware. It provides data link layer addressing and delimiting of data according to the physical signaling requirements of the medium and the type of data link layer protocol in use.","section":"Data Link Layer","module":"Module 6","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":35,"type":"choice","choices":[{"text":"implements CSMA/CD over legacy shared half-duplex media","correct":false},{"text":"enables IPv4 and IPv6 to utilize the same physical medium","correct":true},{"text":"integrates Layer 2 flows between 10 Gigabit Ethernet over fiber and 1 Gigabit Ethernet over copper","correct":false},{"text":"implements a process to delimit fields within an Ethernet 2 frame","correct":false},{"text":"places information in the Ethernet frame that identifies which network layer protocol is being encapsulated by the frame","correct":true}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":56,"question":"The global configuration command ip default-gateway 172.16.100.1 is applied to a switch. What is the effect of this command?","explanation":"Topic 10.3.2 A default gateway address is typically configured on all devices to allow them to communicate beyond just their local network.In a switch this is achieved using the command ip default-gateway <ip address>.","section":"Basic Router Configuration","module":"Module 10","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":37,"type":"choice","choices":[{"text":"The switch can communicate with other hosts on the 172.16.100.0 network.","correct":false},{"text":"The switch can be remotely managed from a host on another network.","correct":true},{"text":"The switch is limited to sending and receiving frames to and from the gateway 172.16.100.1.","correct":false},{"text":"The switch will have a management interface with the address 172.16.100.1.","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":57,"question":"What happens when the","explanation":"Topic 16.4.4 The transport input ssh command when entered on the switch vty (virtual terminal lines) will encrypt all inbound controlled telnet connections.","section":"Network Security Fundamentals","module":"Module 16","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":37,"type":"choice","choices":[{"text":"transport input ssh","correct":false},{"text":"The SSH client on the switch is enabled.","correct":false},{"text":"The switch requires a username/password combination for remote access.","correct":false},{"text":"Communication between the switch and remote users is encrypted.","correct":true},{"text":"The switch requires remote connections via a proprietary client software.","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":58,"question":"Match the type of threat with the cause. (Not all options are used.)","explanation":"Topic 16.1.3","section":"Network Security Fundamentals","module":"Module 16","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":38,"type":"reveal","answer":"See the associated exhibit for the answer shown in the source PDF.","choices":[],"images":["assets/question-images/ccna-1-v7-0-final-exam-answers-full-introduction-to-networks-p38-57a0f5f0fd9e.png"],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":59,"question":"A disgruntled employee is using some free wireless networking tools to determine information about the enterprise wireless networks. This person is planning on using this information to hack the wireless network. What type of attack is this?","explanation":"Topic 16.2.2 A reconnaissance attack is the unauthorized discovery and documentation of various computing networks, network systems, resources, applications, services, or vulnerabilities.","section":"Network Security Fundamentals","module":"Module 16","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":38,"type":"choice","choices":[{"text":"DoS","correct":false},{"text":"access","correct":false},{"text":"reconnaissance","correct":true},{"text":"Trojan horse","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":60,"question":"What service is provided by HTTP?","explanation":"Topic 15.3.1 The Hypertext Transfer Protocol (HTTP) is an application layer protocol that defines a specific set of rules for how web browsers (clients) and web servers interact to exchange information across the World Wide Web. It governs the content and formatting of requests and responses, allowing for the successful delivery of various multimedia files, including text, graphic images, sound, and video. Unlike HTTPS, which adds a layer of encryption for security, standard HTTP transmits data in plaintext and relies on the request/response model—such as using GET messages to retrieve HTML pages—to facilitate web communication.","section":"Application Layer","module":"Module 15","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":39,"type":"choice","choices":[{"text":"Uses encryption to secure the exchange of text, graphic images, sound, and video on the web.","correct":false},{"text":"Allows for data transfers between a client and a file server.","correct":false},{"text":"An application that allows real-time chatting among remote users.","correct":false},{"text":"A basic set of rules for exchanging text, graphic images, sound, video, and other multimedia files on the web.","correct":true}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":61,"question":"A client packet is received by a server. The packet has a destination port number of 67. What service is the client requesting?","explanation":"Topic 14.4.3 The transport layer uses port numbers to identify specific applications and services. According to the IANA assignments for well-known ports, port 67 is reserved for the Dynamic Host Configuration Protocol (DHCP) server using the UDP protocol. When a server receives a packet with this destination port, it identifies the request as a client seeking to automatically acquire an IP configuration, including an IP address, subnet mask, and default gateway. While port 68 is used by the DHCP client to receive responses, port 67 is the standard destination for requests sent toward the server.","section":"Transport Layer","module":"Module 14","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":40,"type":"choice","choices":[{"text":"FTP","correct":false},{"text":"DHCP","correct":true},{"text":"Telnet","correct":false},{"text":"SSH","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":62,"question":"What are two problems that can be caused by a large number of ARP request and reply messages? (Choose two.)","explanation":"Topic 9.2.8 ARP requests are sent as broadcasts: (1) All nodes will receive them, and they will be processed by software, interrupting the CPU. (2) The switch forwards (floods) Layer 2 broadcasts to all ports. A switch does not change its MAC table based on ARP request or reply messages. The switch populates the MAC table using the source MAC address of all frames. The ARP payload is very small and does not overload the switch.","section":"Address Resolution","module":"Module 9","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":40,"type":"choice","choices":[{"text":"Switches become overloaded because they concentrate all the traffic from the attached subnets.","correct":false},{"text":"The ARP request is sent as a broadcast, and will flood the entire subnet.","correct":true},{"text":"The network may become overloaded because ARP reply messages have a very large payload due to the 48-bit MAC address and 32-bit IP address that they contain.","correct":false},{"text":"A large number of ARP request and reply messages may slow down the switching process, leading the switch to make many changes in its MAC table.","correct":false},{"text":"All ARP request messages must be processed by all nodes on the local network.","correct":true}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":63,"question":"A group of Windows PCs in a new subnet has been added to an Ethernet network. When testing the connectivity, a technician finds that these PCs can access local network resources but not the Internet resources. To troubleshoot the problem, the technician wants to initially confirm the IP address and DNS configurations on the PCs, and also verify connectivity to the local router. Which three Windows CLI commands and utilities will provide the necessary information? (Choose three.)","explanation":"Topic 17.5.1 The ipconfig and nslookup commands will provide initial IP address and DNS configuration information to the technicians and determine if DHCP is assigning correct information to the PCs. The ping utility would be used to verify, or not, connectivity to the default gateway (router) using the configured default gateway address, or using the known correct default gateway address if these are found to be different. The arp -a or netsh interface ipv6 show neighbor commands could be used if the problem is then suspected to be an IP address to MAC address mapping issue. The telnet and tracert utilities could be used to determine where the problem was located in the network if the default gateway configuration was found to be correct.","section":"Build a Small Network","module":"Module 17","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":41,"type":"choice","choices":[{"text":"netsh interface ipv6 show neighbor","correct":false},{"text":"arp -a","correct":false},{"text":"tracert","correct":false},{"text":"ping","correct":true},{"text":"ipconfig","correct":true},{"text":"nslookup","correct":true},{"text":"telnet","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":64,"question":"During the process of forwarding traffic, what will the router do immediately after matching the destination IP address to a network on a directly connected routing table entry?","explanation":"Topic 8.5.1 A router receives a packet on an interface and looks at the destination IP address. It consults its routing table and matches the destination IP address to a routing table entry. The router then discovers that it has to send the packet to the next-hop address or out to a directly connected interface. When the destination address is on a directly connected interface, the packet is switched over to that interface.","section":"Network Layer","module":"Module 8","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":41,"type":"choice","choices":[{"text":"analyze the destination IP address","correct":false},{"text":"switch the packet to the directly connected interface","correct":true},{"text":"look up the next-hop address for the packet","correct":false},{"text":"discard the traffic after consulting the route table","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":65,"question":"What characteristic describes antispyware?","explanation":"Topic 1.8.2 Antispyware refers to specialized applications designed to protect end devices —such as PCs, laptops, and smartphones—from being compromised by malicious software . While other security tools like firewalls or VPNs focus on filtering network traffic or creating secure tunnels, antispyware operates at the host level to detect and prevent software that secretly collects information about the user. It is considered a fundamental security component for both home and corporate networks, often implemented alongside antivirus software as part of a layered defense strategy to maintain device integrity.","section":"Networking Today","module":"Module 1","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":42,"type":"choice","choices":[{"text":"applications that protect end devices from becoming infected with malicious software","correct":true},{"text":"a network device that filters access and traffic coming into a network","correct":false},{"text":"software on a router that filters traffic based on IP addresses or applications","correct":false},{"text":"a tunneling protocol that provides remote users with secure access into the network of an organization","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":66,"question":"A network administrator needs to keep the user ID, password, and session contents private when establishing remote CLI connectivity with a switch to manage it. Which access method should be chosen?","explanation":"Topic 2.1.4 SSH (Secure Shell) is the recommended method for establishing a remote CLI connection because it utilizes encryption to ensure that user IDs, passwords, and all session contents remain private and unreadable if intercepted. In contrast, Telnet is considered insecure because it transmits all data, including login credentials, in plaintext . While the Console and AUX ports provide administrative access, they are primarily intended for out- of-band management rather than secure remote connectivity over a standard IP network.","section":"Basic Switch and End Device Configuration","module":"Module 2","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":42,"type":"choice","choices":[{"text":"Telnet","correct":false},{"text":"AUX","correct":false},{"text":"SSH","correct":true},{"text":"Console","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":67,"question":"What are the two most effective ways to defend against malware? (Choose two.)","explanation":"Topic 16.3.3 A cybersecurity specialist must be aware of the technologies and measures that are used as countermeasures to protect the organization from threats and vulnerabilities.","section":"Network Security Fundamentals","module":"Module 16","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":43,"type":"choice","choices":[{"text":"Implement a VPN.","correct":false},{"text":"Implement network firewalls.","correct":false},{"text":"Implement RAID.","correct":false},{"text":"Implement strong passwords.","correct":false},{"text":"Update the operating system and other application software.","correct":true},{"text":"Install and update antivirus software.","correct":true}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":68,"question":"Which type of security threat would be responsible if a spreadsheet add-on disables the local software firewall?","explanation":"Topic 16.2.1 A Trojan horse is software that does something harmful, but is hidden in legitimate software code. A denial of service (DoS) attack results in interruption of network services to users, network devices, or applications. A brute-force attack commonly involves trying to access a network device
