l Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":84,"type":"choice","choices":[{"text":"It generates the electrical or optical signals that represent the 1 and 0 on the media.","correct":false},{"text":"It converts a stream of data bits into a predefined code.","correct":false},{"text":"It shields the upper layer protocol from being aware of the physical medium to be used in the communication.","correct":true},{"text":"It accepts Layer 3 packets and decides the path by which to forward the packet to a remote network.","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":138,"question":"What are three characteristics of the CSMA/CD process? (Choose three.)","explanation":"Topic 6.2.7 The Carrier Sense Multiple Access/Collision Detection (CSMA/CD) process is a contention-based media access control mechanism used on shared media access networks, such as Ethernet. When a device needs to transmit data, it listens and waits until the media is available (quiet), then it will send data. If two devices transmit at the same time, a collision will occur. Both devices will detect the collision on the network. When a device detects a collision, it will stop the data transmission process, wait for a random amount of time, then try again.","section":"Data Link Layer","module":"Module 6","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":85,"type":"choice","choices":[{"text":"The device with the electronic token is the only one that can transmit after a collision.","correct":false},{"text":"A device listens and waits until the media is not busy before transmitting.","correct":true},{"text":"After detecting a collision, hosts can attempt to resume transmission after a random time delay has expired.","correct":true},{"text":"All of the devices on a segment see data that passes on the network medium.","correct":true},{"text":"A jam signal indicates that the collision has cleared and the media is not busy.","correct":false},{"text":"Devices can be configured with a higher transmission priority.","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":139,"question":"Which information does the show startup-config command display?","explanation":"Topic 2.5.1 The show startup-config command displays the saved configuration located in NVRAM. The show running- config command displays the contents of the currently running configuration file located in RAM.","section":"Basic Switch and End Device Configuration","module":"Module 2","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":85,"type":"choice","choices":[{"text":"the IOS image copied into RAM","correct":false},{"text":"the bootstrap program in the ROM","correct":false},{"text":"the contents of the current running configuration file in the RAM","correct":false},{"text":"the contents of the saved configuration file in the NVRAM","correct":true}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":140,"question":"Which two commands can be used on a Windows host to display the routing table? (Choose two.)","explanation":"Topic 8.4.4 On a Windows host, the route print or netstat -r commands can be used to display the host routing table. Both commands generate the same output. On a router, the show ip route command is used to display the routing table. The netstat –s command is used to display per- protocol statistics. The tracert command is used to display the path that a packet travels to its destination.","section":"Network Layer","module":"Module 8","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":86,"type":"choice","choices":[{"text":"netstat -s","correct":false},{"text":"route print","correct":true},{"text":"show ip route","correct":false},{"text":"netstat -r","correct":true},{"text":"tracert","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":141,"question":"What are two functions that are provided by the network layer? (Choose two.)","explanation":"Topic 8.1.1 The network layer is primarily concerned with passing data from a source to a destination on another network. IP addresses supply unique identifiers for the source and destination. The network layer provides connectionless, best-effort delivery. Devices rely on higher layers to supply services to processes.","section":"Network Layer","module":"Module 8","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":86,"type":"choice","choices":[{"text":"directing data packets to destination hosts on other networks","correct":true},{"text":"placing data on the network medium","correct":false},{"text":"carrying data between processes that are running on source and destination hosts","correct":false},{"text":"providing dedicated end-to-end connections","correct":false},{"text":"providing end devices with a unique network identifier","correct":true}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":142,"question":"Which two statements describe features of an IPv4 routing table on a router? (Choose two.)","explanation":"Topic 8.5.6 The show ip route command is used to display the routing table of the router. In IPv4, directly connected interfaces will have one source code: C . The routing table stores information about directly connected routes and remote routes. An entry in the routing table with a source code of S is included if a default static route is configured on the router.","section":"Network Layer","module":"Module 8","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":87,"type":"choice","choices":[{"text":"Directly connected interfaces will have two route source codes in the routing table: C and S .","correct":false},{"text":"If there are two or more possible routes to the same destination, the route associated with the higher metric value is included in the routing table.","correct":false},{"text":"The netstat -r command can be used to display the routing table of a router.","correct":false},{"text":"The routing table lists the MAC addresses of each active interface.","correct":false},{"text":"It stores information about routes derived from the active router interfaces.","correct":true},{"text":"If a default static route is configured in the router, an entry will be included in the routing table with source code S .","correct":true}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":143,"question":"What characteristic describes a VPN?","explanation":"Topic 1.8.2 A VPN (Virtual Private Network) uses a router to create secure encrypted tunnels that provide remote workers with secure access to an organization’s network resources. This connection allows a remote user to access internal servers as if they were a host directly within the intranet .","section":"Networking Today","module":"Module 1","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":88,"type":"choice","choices":[{"text":"software on a router that filters traffic based on IP addresses or applications","correct":false},{"text":"software that identifies fast-spreading threats","correct":false},{"text":"a tunneling protocol that provides remote users with secure access into the network of an organization","correct":true},{"text":"a network device that filters access and traffic coming into a network","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":144,"question":"Why would a Layer 2 switch need an IP address?","explanation":"Topic 10.3.2 A switch, as a Layer 2 device, does not need an IP address to transmit frames to attached devices. However, when a switch is accessed remotely through the network, it must have a Layer 3 address. The IP address must be applied to a virtual interface rather than to a physical interface. Routers, not switches, function as default gateways.","section":"Basic Router Configuration","module":"Module 10","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":88,"type":"choice","choices":[{"text":"to enable the switch to send broadcast frames to attached PCs","correct":false},{"text":"to enable the switch to function as a default gateway","correct":false},{"text":"to enable the switch to be managed remotely","correct":true},{"text":"to enable the switch to receive frames from attached PCs","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":145,"question":"Match each description to its corresponding term. (Not all options are used.)","explanation":"Topic 3.1.5","section":"Protocols and Models","module":"Module 3","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":89,"type":"reveal","answer":"See the associated exhibit for the answer shown in the source PDF.","choices":[],"images":["assets/question-images/ccna-1-v7-0-final-exam-answers-full-introduction-to-networks-p89-a4b6d6559ed4.png"],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":146,"question":"A user sends an HTTP request to a web server on a remote network. During encapsulation for this request, what information is added to the address field of a frame to indicate the destination?","explanation":"Topic 9.1.2 A frame is encapsulated with source and destination MAC addresses. The source device will not know the MAC address of the remote host. An ARP request will be sent by the source and will be responded to by the router. The router will respond with the MAC address of its interface, the one which is connected to the same network as the source.","section":"Address Resolution","module":"Module 9","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":89,"type":"choice","choices":[{"text":"the network domain of the destination host","correct":false},{"text":"the IP address of the default gateway","correct":false},{"text":"the MAC address of the destination host","correct":false},{"text":"the MAC address of the default gateway","correct":true}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":147,"question":"What is an advantage to using a protocol that is defined by an open standard?","explanation":"Topic 3.4.1 A monopoly by one company is not a good idea from a user point of view. If a protocol can only be run on one brand, it makes it difficult to have mixed equipment in a network. A proprietary protocol is not free to use. An open standard protocol will in general be implemented by a wide range of vendors.","section":"Protocols and Models","module":"Module 3","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":90,"type":"choice","choices":[{"text":"A company can monopolize the market.","correct":false},{"text":"The protocol can only be run on equipment from a specific vendor.","correct":false},{"text":"An open standard protocol is not controlled or regulated by standards organizations.","correct":false},{"text":"It encourages competition and promotes choices.","correct":true}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":148,"question":"Data is being sent from a source PC to a destination server. Which three statements correctly describe the function of TCP or UDP in this situation? (Choose three.)","explanation":"Topic 14.4.2 Layer 4 port numbers identify the application or service which will handle the data. The source port number is added by the sending device and will be the destination port number when the requested information is returned. Layer 4 segments are encapsulated within IP packets. UDP, not TCP, is used when low overhead is needed. A source IP address, not a TCP source port number, identifies the sending host on the network. Destination port numbers are specific ports that a server application or service monitors for requests.","section":"Transport Layer","module":"Module 14","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":90,"type":"choice","choices":[{"text":"The source port field identifies the running application or service that will handle data returning to the PC.","correct":true},{"text":"The TCP process running on the PC randomly selects the destination port when establishing a session with the server.","correct":false},{"text":"UDP segments are encapsulated within IP packets for transport across the network.","correct":true},{"text":"The UDP destination port number identifies the application or service on the server which will handle the data.","correct":true},{"text":"TCP is the preferred protocol when a function requires lower network overhead.","correct":false},{"text":"The TCP source port number identifies the sending host on the network.","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":149,"question":"Match each description with the corresponding TCP mechanism. (Not all options are used.)","explanation":"Topic 14.6","section":"Transport Layer","module":"Module 14","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":91,"type":"reveal","answer":"See the associated exhibit for the answer shown in the source PDF.","choices":[],"images":["assets/question-images/ccna-1-v7-0-final-exam-answers-full-introduction-to-networks-p91-9bc31df25093.png"],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":150,"question":"Refer to the exhibit. A company uses the address block of 128.107.0.0/16 for its network. What subnet mask would provide the maximum number of equal size subnets while providing enough host addresses for each subnet in the exhibit?","explanation":"Topic 11.7.2 The largest subnet in the topology has 100 hosts in it so the subnet mask must have at least 7 host bits in it (27- 2=126). 255.255.255.0 has 8 hosts bits, but this does not meet the requirement of providing the maximum number of subnets.","section":"IPv4 Addressing","module":"Module 11","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":91,"type":"choice","choices":[{"text":"255.255.255.192","correct":false},{"text":"255.255.255.0","correct":false},{"text":"255.255.255.128","correct":true},{"text":"255.255.255.240","correct":false},{"text":"255.255.255.224","correct":false}],"images":["assets/question-images/ccna-1-v7-0-final-exam-answers-full-introduction-to-networks-p92-aff9f6143b0b.png"],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":151,"question":"A network administrator wants to have the same subnet mask for three subnetworks at a small site. The site has the following networks and numbers of devices:","explanation":"Topic 11.7.2 If the same mask is to be used, then the network with the most hosts must be examined for number of hosts. Because this is 10 hosts, 4 host bits are needed. The /28 or 255.255.255.240 subnet mask would be appropriate to use for these networks.","section":"IPv4 Addressing","module":"Module 11","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":92,"type":"choice","choices":[{"text":"Copy","correct":false},{"text":"255.255.255.0","correct":false},{"text":"255.255.255.240","correct":true},{"text":"255.255.255.248","correct":false},{"text":"255.255.255.252","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":152,"question":"Match each item to the type of topology diagram on which it is typically identified. (Not all options are used.)","explanation":"Topic 1.3.2 A logical topology diagram typically depicts the IP addressing scheme and groupings of devices and ports. A physical topology diagram shows how those devices are connected to each other and the network, focusing on the physical locations of intermediary devices, configured ports, and cabling.","section":"Networking Today","module":"Module 1","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":93,"type":"reveal","answer":"See the associated exhibit for the answer shown in the source PDF.","choices":[],"images":["assets/question-images/ccna-1-v7-0-final-exam-answers-full-introduction-to-networks-p93-daa2085ff95a.png"],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":153,"question":"What two pieces of information are displayed in the output of the show ip interface brief command? (Choose two.)","explanation":"Topic 10.2.3 The command show ip interface brief shows the IP address of each interface, as well as the operational status of the interfaces at both Layer 1 and Layer 2. In order to see interface descriptions and speed and duplex settings, use the command show running-config interface. Next-hop addresses are displayed in the routing table with the command show ip route, and the MAC address of an interface can be seen with the command show interfaces.","section":"Basic Router Configuration","module":"Module 10","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":94,"type":"choice","choices":[{"text":"IP addresses","correct":true},{"text":"interface descriptions","correct":false},{"text":"MAC addresses","correct":false},{"text":"next-hop addresses","correct":false},{"text":"Layer 1 statuses","correct":true},{"text":"speed and duplex settings","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":154,"question":"A user is complaining that an external web page is taking longer than normal to load.The web page does eventually load on the user machine. Which tool should the technician use with administrator privileges in order to locate where the issue is in the network?","explanation":"Topic 17.4.3 The Command Prompt command tracert will map the path from the PC to the web server and measure transit delays of packets across the network.","section":"Build a Small Network","module":"Module 17","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":94,"type":"choice","choices":[{"text":"ping","correct":false},{"text":"nslookup","correct":false},{"text":"tracert","correct":true},{"text":"ipconfig /displaydns","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":155,"question":"Which value, that is contained in an IPv4 header field, is decremented by each router that receives a packet?","explanation":"Topic 8.2.2 When a router receives a packet, the router will decrement the Time-to-Live (TTL) field by one. When the field reaches zero, the receiving router will discard the packet and will send an ICMP Time Exceeded message to the sender.","section":"Network Layer","module":"Module 8","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":95,"type":"choice","choices":[{"text":"Header Length","correct":false},{"text":"Differentiated Services","correct":false},{"text":"Time-to-Live","correct":true},{"text":"Fragment Offset","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":156,"question":"A network technician is researching the use of fiber optic cabling in a new technology center. Which two issues should be considered before implementing fiber optic media? (Choose two.)","explanation":"Topic 4.5.6 Fiber optic media is more expensive than copper cabling used over the same distance. Fiber optic cables use light instead of an electrical signal, so EMI and RFI are not issues. However, fiber optic does require different skills to terminate and splice.","section":"Physical Layer","module":"Module 4","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":95,"type":"choice","choices":[{"text":"Fiber optic cabling requires different termination and splicing expertise from what copper cabling requires.","correct":true},{"text":"Fiber optic cabling requires specific grounding to be immune to EMI.","correct":false},{"text":"Fiber optic cabling is susceptible to loss of signal due to RFI.","correct":false},{"text":"Fiber optic cable is able to withstand rough handling.","correct":false},{"text":"Fiber optic provides higher data capacity but is more expensive than copper cabling.","correct":true}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":159,"question":"Users report that the network access is slow. After questioning the employees, the network administrator learned that one employee downloaded a third-party scanning program for the printer. What type of malware might be introduced that causes slow performance of the network?","explanation":"Topic 16.2.1 A cybersecurity specialist needs to be familiar with the characteristics of the different types of malware and attacks that threaten an organization.","section":"Network Security Fundamentals","module":"Module 16","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":96,"type":"choice","choices":[{"text":"virus","correct":false},{"text":"worm","correct":true},{"text":"phishing","correct":false},{"text":"spam","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]}]
