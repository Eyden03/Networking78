<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCNA Reviewer — Interactive Quiz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap');

  :root{
    --bg: #0b1220;
    --bg-panel: #101a2e;
    --bg-panel-2: #14203a;
    --line: #22314f;
    --text: #e7ecf7;
    --text-dim: #94a3c4;
    --accent: #35e0a1;
    --accent-dim: #1f7a5c;
    --accent-glow: rgba(53,224,161,0.18);
    --wrong: #ff6b6b;
    --wrong-dim: #5c2626;
    --amber: #ffb84d;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', sans-serif;
    --radius: 14px;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 15% 0%, rgba(53,224,161,0.06), transparent 40%),
      radial-gradient(circle at 85% 100%, rgba(80,130,255,0.07), transparent 45%),
      var(--bg);
    color:var(--text);
    font-family:var(--sans);
    min-height:100vh;
    padding:32px 18px 60px;
  }

  .wrap{max-width:760px;margin:0 auto;}

  /* header */
  .topbar{
    display:flex;justify-content:space-between;align-items:flex-start;
    margin-bottom:22px;gap:16px;flex-wrap:wrap;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{
    width:34px;height:34px;border-radius:8px;
    background:linear-gradient(135deg,var(--accent),#2ab6ff);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-weight:800;color:#04140e;font-size:15px;
    flex-shrink:0;
  }
  .brand-text h1{font-size:16px;margin:0;font-weight:700;letter-spacing:0.2px;}
  .brand-text p{margin:1px 0 0;font-size:12px;color:var(--text-dim);font-family:var(--mono);}

  .btn{
    font-family:var(--mono);font-size:12.5px;font-weight:600;
    border:1px solid var(--line);background:var(--bg-panel);
    color:var(--text);padding:9px 14px;border-radius:9px;cursor:pointer;
    display:inline-flex;align-items:center;gap:7px;transition:all .15s ease;
    white-space:nowrap;
  }
  .btn:hover{border-color:var(--accent-dim);background:var(--bg-panel-2);}
  .btn:active{transform:scale(0.97);}
  .btn.primary{
    background:var(--accent);color:#05160f;border-color:var(--accent);
  }
  .btn.primary:hover{background:#4beeb2;}
  .btn:disabled{opacity:0.35;cursor:not-allowed;}
  .btn svg{width:14px;height:14px;flex-shrink:0;}

  /* progress */
  .progress-row{display:flex;align-items:center;gap:12px;margin-bottom:26px;}
  .progress-track{
    flex:1;height:6px;border-radius:99px;background:var(--bg-panel);
    overflow:hidden;border:1px solid var(--line);
  }
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent-dim),var(--accent));
    width:0%;transition:width .35s ease;}
  .progress-label{font-family:var(--mono);font-size:12px;color:var(--text-dim);white-space:nowrap;}
  .score-chip{
    font-family:var(--mono);font-size:12px;color:var(--accent);
    background:var(--accent-glow);border:1px solid var(--accent-dim);
    padding:5px 10px;border-radius:99px;white-space:nowrap;
  }

  /* filter row */
  .filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px;}
  .chip{
    font-family:var(--mono);font-size:11.5px;padding:6px 12px;border-radius:99px;
    border:1px solid var(--line);color:var(--text-dim);cursor:pointer;background:transparent;
    transition:all .15s ease;
  }
  .chip.active{background:var(--accent-glow);border-color:var(--accent-dim);color:var(--accent);}
  .chip:hover{border-color:var(--accent-dim);}

  /* card */
  .card{
    background:linear-gradient(180deg,var(--bg-panel),var(--bg-panel-2));
    border:1px solid var(--line);border-radius:var(--radius);
    padding:26px 24px 22px;box-shadow:0 20px 40px -20px rgba(0,0,0,0.6);
  }
  .card-meta{
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:14px;flex-wrap:wrap;gap:8px;
  }
  .q-index{font-family:var(--mono);font-size:12px;color:var(--accent);font-weight:700;}
  .section-tag{
    font-family:var(--mono);font-size:11px;color:var(--text-dim);
    border:1px solid var(--line);padding:3px 9px;border-radius:99px;
  }
  .multi-tag{
    font-family:var(--mono);font-size:11px;color:var(--amber);
    border:1px solid #6b4d1f;padding:3px 9px;border-radius:99px;background:rgba(255,184,77,0.08);
  }

  .q-text{font-size:18px;line-height:1.5;font-weight:600;margin:6px 0 20px;color:var(--text);}

  .choices{display:flex;flex-direction:column;gap:10px;}
  .choice{
    display:flex;align-items:flex-start;gap:12px;
    border:1px solid var(--line);background:rgba(255,255,255,0.015);
    border-radius:10px;padding:13px 14px;cursor:pointer;
    transition:all .15s ease;font-size:14.5px;line-height:1.5;
  }
  .choice:hover:not(.locked){border-color:var(--accent-dim);background:rgba(53,224,161,0.05);}
  .choice .box{
    flex-shrink:0;width:20px;height:20px;border-radius:6px;
    border:1.5px solid var(--line);margin-top:1px;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-size:11px;color:var(--text-dim);
    transition:all .15s ease;
  }
  .choice.selected .box{border-color:var(--accent);background:var(--accent-glow);color:var(--accent);}
  .choice.correct{border-color:var(--accent);background:rgba(53,224,161,0.09);}
  .choice.correct .box{background:var(--accent);border-color:var(--accent);color:#05160f;}
  .choice.incorrect{border-color:var(--wrong);background:rgba(255,107,107,0.08);}
  .choice.incorrect .box{background:var(--wrong);border-color:var(--wrong);color:#2b0808;}
  .choice.dimmed{opacity:0.45;}
  .choice.locked{cursor:default;}

  .choice-text code, .q-text code{
    font-family:var(--mono);background:rgba(255,255,255,0.06);
    padding:1px 5px;border-radius:4px;font-size:0.92em;
  }

  .action-row{display:flex;justify-content:space-between;align-items:center;margin-top:20px;gap:10px;flex-wrap:wrap;}

  .feedback{
    margin-top:16px;padding:14px 16px;border-radius:10px;
    font-size:13.5px;line-height:1.6;display:none;
  }
  .feedback.show{display:block;animation:fade .25s ease;}
  .feedback.right{background:rgba(53,224,161,0.08);border:1px solid var(--accent-dim);}
  .feedback.wrong{background:rgba(255,107,107,0.08);border:1px solid #7a3030;}
  .feedback-head{font-family:var(--mono);font-weight:700;font-size:12.5px;margin-bottom:6px;letter-spacing:0.3px;}
  .feedback.right .feedback-head{color:var(--accent);}
  .feedback.wrong .feedback-head{color:var(--wrong);}
  .feedback-body{color:var(--text-dim);}

  @keyframes fade{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}

  /* results screen */
  .results{text-align:center;padding:40px 20px;}
  .results .big-score{
    font-family:var(--mono);font-size:56px;font-weight:800;color:var(--accent);
    margin:6px 0 2px;
  }
  .results .sub{color:var(--text-dim);font-size:14px;margin-bottom:26px;}
  .results-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  .breakdown{
    margin-top:28px;text-align:left;border-top:1px solid var(--line);padding-top:18px;
  }
  .breakdown-row{
    display:flex;justify-content:space-between;font-family:var(--mono);
    font-size:12.5px;padding:7px 0;color:var(--text-dim);border-bottom:1px dashed var(--line);
  }
  .breakdown-row span:last-child{color:var(--text);}

  footer{text-align:center;margin-top:26px;color:var(--text-dim);font-family:var(--mono);font-size:11px;}

  @media (max-width:520px){
    .card{padding:20px 16px 18px;}
    .q-text{font-size:16.5px;}
    .results .big-score{font-size:44px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">::</div>
      <div class="brand-text">
        <h1>CCNA Reviewer</h1>
        <p id="sourceLabel">SA4 — 69 questions</p>
      </div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn" id="shuffleBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg>

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>

  <div class="filter-row" id="filterRow"></div>

  <div class="progress-row">

  <div id="quizArea"></div>

  <footer>Reviewer generated from your uploaded PDF · answers marked in red were treated as correct</footer>
</div>

<script id="quiz-data" type="application/json">
[{"number": 1, "question": "Network congestion has resulted in the source learning of the loss of TCP segments that were sent to the destination. What is one way that the TCP protocol addresses this?", "choices": [{"text": "The source decreases the amount of data that it transmits before it receives an acknowledgement from the destination.", "correct": true}, {"text": "The source decreases the window size to decrease the rate of transmission from the destination.", "correct": false}, {"text": "The destination decreases the window size.", "correct": false}, {"text": "The destination sends fewer acknowledgement messages in order to conserve bandwidth.", "correct": false}], "explanation": "If the source determines that the TCP segments are either not being acknowledged or are not acknowledged in a timely manner, then it can reduce the number of bytes it sends before receiving an acknowledgment. This does not involve changing the window in the segment header. The source does not decrease the window that is sent in the segment header. The window in the segment header is adjusted by the destination host when it is receiving data faster than it can process it, not when network congestion is encountered.", "section": "Transport Layer"}, {"number": 2, "question": "Which two operations are provided by TCP but not by UDP? (Choose two.)", "choices": [{"text": "identifying the applications", "correct": false}, {"text": "acknowledging received data", "correct": true}, {"text": "tracking individual conversations", "correct": false}, {"text": "retransmitting any unacknowledged data", "correct": true}, {"text": "reconstructing data in the order received", "correct": false}], "explanation": "Numbering and tracking data segments, acknowledging received data, and retransmitting any unacknowledged data are reliability operations to ensure that all of the data arrives at the destination. UDP does not provide reliability. Both TCP and UDP identify the applications and track individual conversations. UDP does not number data segments and reconstructs data in the order that it is received.", "section": "Transport Layer"}, {"number": 3, "question": "What is the TCP mechanism used in congestion avoidance?", "choices": [{"text": "three-way handshake", "correct": false}, {"text": "socket pair", "correct": false}, {"text": "two-way handshake", "correct": false}, {"text": "sliding window", "correct": true}], "explanation": "TCP uses windows to attempt to manage the rate of transmission to the maximum flow that the network and destination device can support while minimizing loss and retransmissions. When overwhelmed with data, the destination can send a request to reduce the of the window. This congestion avoidance is called sliding windows.", "section": "Transport Layer"}, {"number": 4, "question": "What is a responsibility of transport layer protocols?", "choices": [{"text": "providing network access", "correct": false}, {"text": "tracking individual conversations", "correct": true}, {"text": "determining the best path to forward a packet", "correct": false}, {"text": "translating private IP addresses to public IP addresses", "correct": false}], "explanation": "There are three main responsibilities for transport layer protocols TCP and UDP: Tracking individual conversations Segmenting data and reassembling segments Identifying the applications", "section": "Transport Layer"}, {"number": 5, "question": "How does a networked server manage requests from multiple clients for different services?", "choices": [{"text": "The server sends all requests through a default gateway.", "correct": false}, {"text": "Each request has a combination of source and destination port numbers, coming from a unique IP address.", "correct": true}, {"text": "The server uses IP addresses to identify different services.", "correct": false}, {"text": "Each request is tracked through the physical address of the client.", "correct": false}], "explanation": "Each service provided by a server, such as email or file transfers, uses a specific port number. The source port number of a service request identifies the client that is requesting services. The destination port number identifies the specific service. Servers do not use address information to provide services. Routers and switches use addressing information to move traffic through the network.", "section": "Transport Layer"}, {"number": 6, "question": "Which two services or protocols use the preferred UDP protocol for fast transmission and low overhead? (Choose two)", "choices": [{"text": "FTP", "correct": false}, {"text": "DNS", "correct": true}, {"text": "HTTP", "correct": false}, {"text": "POP3", "correct": false}, {"text": "VoIP", "correct": true}], "explanation": "Both DNS and VoIP use UDP to provide low overhead services within a network implementation.", "section": "Transport Layer"}, {"number": 7, "question": "What is the purpose of using a source port number in a TCP communication?", "choices": [{"text": "to notify the remote device that the conversation is over", "correct": false}, {"text": "to assemble the segments that arrived out of order", "correct": false}, {"text": "to keep track of multiple conversations between devices", "correct": true}, {"text": "to inquire for a nonreceived segment", "correct": false}], "explanation": "The source port number in a segment header is used to keep track of multiple conversations between devices. It is also used to keep an open entry for the response from the server. The incorrect options are more related to flow control and guaranteed delivery.", "section": "Transport Layer"}, {"number": 8, "question": "Which number or set of numbers represents a socket?", "choices": [{"text": "01-23-45-67-89-AB", "correct": false}, {"text": "192.168.1.1:80", "correct": true}, {"text": "10.1.1.15", "correct": false}], "explanation": "A socket is defined by the combination of an IP address and a port number, and uniquely identifies a particular communication.", "section": "Transport Layer"}, {"number": 9, "question": "Which two flags in the TCP header are used in a TCP three-way handshake to establish connectivity between two network devices? (Choose two.)", "choices": [{"text": "ACK", "correct": true}, {"text": "FIN", "correct": false}, {"text": "PSH", "correct": false}, {"text": "RST", "correct": false}, {"text": "SYN", "correct": true}, {"text": "URG", "correct": false}], "explanation": "TCP uses the SYN and ACK flags in order to establish connectivity between two network devices.", "section": "Transport Layer"}, {"number": 10, "question": "What happens if part of an FTP message is not delivered to the destination?", "choices": [{"text": "The message is lost because FTP does not use a reliable delivery method.", "correct": false}, {"text": "The FTP source host sends a query to the destination host.", "correct": false}, {"text": "The part of the FTP message that was lost is re-sent.", "correct": true}, {"text": "The entire FTP message is re-sent.", "correct": false}], "explanation": "Because FTP uses TCP as its transport layer protocol, sequence and acknowledgment numbers will identify the missing segments, which will be re-sent to complete the message.", "section": "Transport Layer"}, {"number": 11, "question": "What type of applications are best suited for using UDP?", "choices": [{"text": "applications that are sensitive to delay", "correct": true}, {"text": "applications that need reliable delivery", "correct": false}, {"text": "applications that require retransmission of lost segments", "correct": false}, {"text": "applications that are sensitive to packet loss", "correct": false}], "explanation": "UDP is not a connection-oriented protocol and does not provide retransmission, sequencing, or flow control mechanisms. It provides basic transport layer functions with a much lower overhead than TCP. Lower overhead makes UDP suitable for applications which are sensitive to delay.", "section": "Transport Layer"}, {"number": 12, "question": "Which action is performed by a client when establishing communication with a server via the use of UDP at the transport layer?", "choices": [{"text": "The client sets the window size for the session.", "correct": false}, {"text": "The client sends an ISN to the server to start the 3-way handshake.", "correct": false}, {"text": "The client randomly selects a source port number.", "correct": true}, {"text": "The client sends a synchronization segment to begin the session.", "correct": false}], "explanation": "Because a session does not have to be established for UDP, the client selects a random source port to begin a connection. The random port number selected is inserted into the source port field of the UDP header.", "section": "Transport Layer"}, {"number": 13, "question": "Which transport layer feature is used to guarantee session establishment?", "choices": [{"text": "UDP ACK flag", "correct": false}, {"text": "TCP 3-way handshake", "correct": true}, {"text": "UDP sequence number", "correct": false}, {"text": "TCP port number", "correct": false}], "explanation": "TCP uses the 3-way handshake. UDP does not use this feature. The 3-way handshake ensures there is connectivity between the source and destination devices before transmission occurs.", "section": "Transport Layer"}, {"number": 14, "question": "What is the complete range of TCP and UDP well-known ports?", "choices": [{"text": "0 to 255", "correct": false}, {"text": "0 to 1023", "correct": true}, {"text": "256 \u2013 1023", "correct": false}, {"text": "1024 \u2013 49151", "correct": false}], "explanation": "There are three ranges of TCP and UDP ports. The well-know range of port numbers is from 0 \u2013 1023.", "section": "Transport Layer"}, {"number": 15, "question": "What is a socket?", "choices": [{"text": "the combination of the source and destination IP address and source and destination Ethernet address", "correct": false}, {"text": "the combination of a source IP address and port number or a destination IP address and port number", "correct": true}, {"text": "the combination of the source and destination sequence and acknowledgment numbers", "correct": false}, {"text": "the combination of the source and destination sequence numbers and port numbers", "correct": false}], "explanation": "A socket is a combination of the source IP address and source port or the destination IP address and the destination port number.", "section": "Transport Layer"}, {"number": 16, "question": "Which transport layer feature is used to establish a connection-oriented session?", "choices": [{"text": "UDP ACK flag", "correct": false}, {"text": "TCP 3-way handshake", "correct": true}, {"text": "UDP sequence number", "correct": false}, {"text": "TCP port number", "correct": false}], "explanation": "TCP uses the 3-way handshake. UDP does not use this feature. The 3-way handshake ensures there is connectivity between the source and destination devices before transmission occurs.", "section": "Transport Layer"}, {"number": 17, "question": "What TCP mechanism is used to enhance performance by allowing a device to continuously send a steady stream of segments as long as the device is also receiving necessary acknowledgements?", "choices": [{"text": "Three-way handshake", "correct": false}, {"text": "Socket pair", "correct": false}, {"text": "Two-way handshake", "correct": false}, {"text": "Sliding window", "correct": true}], "explanation": "TCP uses windows to attempt to manage the rate of transmission to the maximum flow that the network and destination device can support while minimizing loss and retransmissions. When overwhelmed with data, the destination can send a request to reduce the of the window. The process of the destination sending acknowledgments as it processes bytes received and the continual adjustment of the source send window is known as sliding windows. Subscribe Copyright \u00a9 2026. All content is created and curated by our editorial team. This is not a user-generated platform. | | | | 15.1.4 Check Your Understanding \u2013 Application, Session, Presentation Answers ITExam Editorial Team | Last Updated: Jun 13, 2022 |", "section": "Transport Layer"}, {"number": 1, "question": "This layer of the OSI model is concerned with the protocols that exchange data between programs running on hosts.", "choices": [{"text": "application", "correct": true}, {"text": "transport", "correct": false}, {"text": "network", "correct": false}, {"text": "physical", "correct": false}], "explanation": "Explanation: The application layer of the OSI model is the layer that is closest to the end user. It provides an interface between application protocols exchanging data between hosts.", "section": "Application Layer (OSI)"}, {"number": 2, "question": "MKV, GIF, and JPG standards are associated with which OSI layer?", "choices": [{"text": "application", "correct": false}, {"text": "presentation", "correct": true}, {"text": "session", "correct": false}, {"text": "transport", "correct": false}], "explanation": "Explanation: The presentation layer is concerned with formatting and presenting data in a format that is compatible with the destination device. Examples of presentation layer standards are MKV, GIF, JPG, MOV, and PNG.", "section": "Application Layer (OSI)"}, {"number": 3, "question": "These three OSI layers define the same functions as the TCP/IP model application layer.", "choices": [{"text": "application", "correct": true}, {"text": "presentation", "correct": true}, {"text": "session", "correct": true}, {"text": "transport", "correct": false}, {"text": "network", "correct": false}, {"text": "data link", "correct": false}], "explanation": "Explanation: The upper three OSI layers; application, presentation, and session, define the application layer functions of the TCP/IP model.", "section": "Application Layer (OSI)"}, {"number": 4, "question": "Which two are protocols that belong in the OSI application layer?", "choices": [{"text": "PNG", "correct": false}, {"text": "DNS", "correct": true}, {"text": "SMTP", "correct": true}, {"text": "QuickTime", "correct": false}], "explanation": "Explanation: The application layer of the OSI model provides an interface between applications protocols exchanging data between hosts. Protocols at the application layer include DNS, HTTP, SMTP, FTP, and IMAP.", "section": "Application Layer (OSI)"}, {"number": 5, "question": "This is a function of the OSI session layer.", "choices": [{"text": "compress and decompress data", "correct": false}, {"text": "provide an interface between applications", "correct": false}, {"text": "format data for the application layer", "correct": false}, {"text": "exchange of information to initiate dialog between peers", "correct": true}], "explanation": "Explanation: The session layer of the OSI model creates and maintains the dialogs, or sessions, between two communicating hosts. Subscribe Copyright \u00a9 2026. All content is created and curated by our editorial team. This is not a user-generated platform. | | | | 15.2.5 Check Your Understanding \u2013 Peer-to-Peer Answers ITExam Editorial Team | Last Updated: Jun 13, 2022 |", "section": "Application Layer (OSI)"}, {"number": 1, "question": "True or false? The peer-to-peer networking model", "choices": [{"text": "requires the implementation of a dedicated server for data access.", "correct": false}, {"text": "True", "correct": false}, {"text": "False", "correct": true}], "explanation": "Explanation: The correct answer is False. In the peer-to-peer model, clients can share resources without using a dedicated server.", "section": "Peer-to-Peer / P2P"}, {"number": 2, "question": "True or false? In a peer-to-peer network environment every peer can function as both a client and a server.", "choices": [{"text": "True", "correct": true}, {"text": "False", "correct": false}], "explanation": "Explanation: The correct answer is True. A peer-to-peer network does not require a dedicated server because each peer can function as both a client and as a server.", "section": "Peer-to-Peer / P2P"}, {"number": 3, "question": "Which peer-to-peer application allows users to share pieces of many files with each other at the same time?", "choices": [{"text": "Hybrid", "correct": false}, {"text": "Gnutella", "correct": false}, {"text": "BitTorrent", "correct": true}], "explanation": "Explanation: BitTorrent clients use a torrent file to locate other clients that are sharing pieces of needed files. In this way, many files can be shared between clients at the same time.", "section": "Peer-to-Peer / P2P"}, {"number": 4, "question": "Which of the following is a feature of the Gnutella protocol?", "choices": [{"text": "Users can share whole files with other users.", "correct": true}, {"text": "Users can share pieces of files with other users.", "correct": false}, {"text": "Users can access an index server to get the location of resources shared by other users.", "correct": false}], "explanation": "Explanation: Gnutella is a peer-to-peer protocol that allows users to share whole files with other users. Subscribe Copyright \u00a9 2026. All content is created and curated by our editorial team. This is not a user-generated platform. | | | | 15.6.2 Module Quiz \u2013 Application Layer (Answers) ITExamAnswers Editorial Team | Last Updated: Jun 17, 2026 | 15.6.2 Module Quiz \u2013 Application Layer Answers", "section": "Peer-to-Peer / P2P"}, {"number": 1, "question": "On a home network, which device is most likely to provide dynamic IPv4 addressing to clients on the home network?", "choices": [{"text": "a dedicated file server", "correct": false}, {"text": "a home router", "correct": true}, {"text": "an ISP DHCP server", "correct": false}, {"text": "a DNS server", "correct": false}], "explanation": "On a home network, a home router usually serves as the DHCP server. The home router is responsible for dynamically assigning IPv4 addresses to clients on the home network. ISPs also use DHCP, but it usually assigns an IPv4 address to the Internet interface of the home router, not the clients on the home network. In businesses, it is common to have a file or other dedicated server provide DHCP services to the network. Finally, a DNS server is responsible for finding the IP address for a URL, not for providing dynamic addressing to network clients.", "section": "Application Layer (TCP/IP)"}, {"number": 2, "question": "What part of the URL, http://www.cisco.com/index.html, represents the top-level DNS domain?", "choices": [{"text": ".com", "correct": true}, {"text": "www", "correct": false}, {"text": "http", "correct": false}, {"text": "index", "correct": false}], "explanation": "The components of the URL http://www.cisco.com/ index.htm are as follows: http = protocol www = part of the server name cisco = part of the domain name index = file name com = the top-level domain", "section": "Application Layer (TCP/IP)"}, {"number": 3, "question": "What are two characteristics of the application layer of the TCP/IP model? (Choose two.)", "choices": [{"text": "responsibility for logical addressing", "correct": false}, {"text": "responsibility for physical addressing", "correct": false}, {"text": "the creation and maintenance of dialogue between source and destination applications", "correct": true}, {"text": "closest to the end user", "correct": true}, {"text": "the establishing of window size", "correct": false}], "explanation": "The application layer of the TCP/IP model is the layer that is closest to the end user, providing the interface between the applications. It is responsible for formatting, compressing, and encrypting data, and is used to create and maintain dialog between source and destination applications.", "section": "Application Layer (TCP/IP)"}, {"number": 4, "question": "What message type is used by an HTTP client to request data from a web server?", "choices": [{"text": "GET", "correct": true}, {"text": "POST", "correct": false}, {"text": "PUT", "correct": false}, {"text": "ACK", "correct": false}], "explanation": "HTTP clients send GET messages to request data from web servers.", "section": "Application Layer (TCP/IP)"}, {"number": 5, "question": "Which statement is true about FTP?", "choices": [{"text": "The client can choose if FTP is going to establish one or two connections with the server.", "correct": false}, {"text": "The client can download data from or upload data to the server.", "correct": true}, {"text": "FTP is a peer-to-peer application.", "correct": false}, {"text": "FTP does not provide reliability during data transmission.", "correct": false}], "explanation": "FTP is a client/server protocol. FTP requires two connections between the client and the server and uses TCP to provide reliable connections. With FTP, data transfer can happen in either direction. The client can download (pull) data from the server or upload (push) data to the server.", "section": "Application Layer (TCP/IP)"}, {"number": 6, "question": "A wireless host needs to request an IPv4 address. What protocol would be used to process the request?", "choices": [{"text": "FTP", "correct": false}, {"text": "HTTP", "correct": false}, {"text": "DHCP", "correct": true}, {"text": "ICMP", "correct": false}, {"text": "SNMP", "correct": false}], "explanation": "The DHCP protocol is used to request, issue, and manage IP addressing information. CSMA/CD is the access method used with wired Ethernet. ICMP is used to test connectivity. SNMP is used with network management and FTP is used for file transfer.", "section": "Application Layer (TCP/IP)"}, {"number": 7, "question": "Which TCP/IP model layer is closest to the end user?", "choices": [{"text": "application", "correct": true}, {"text": "internet", "correct": false}, {"text": "network access", "correct": false}, {"text": "transport", "correct": false}], "explanation": "End users use applications to interact with and use the network. The application layer of the TCP/IP model is closest to the end user. Application layer protocols are used to communicate and exchange messages with other network devices and applications. The layers of the TCP/IP model are from top to bottom (memory aid \u2013 ATIN): application, transport, internet, network access", "section": "Application Layer (TCP/IP)"}, {"number": 8, "question": "Which three protocols or standards are used at the application layer of the TCP/IP model? (Choose three.)", "choices": [{"text": "TCP", "correct": false}, {"text": "HTTP", "correct": true}, {"text": "MPEG", "correct": true}, {"text": "GIF", "correct": true}, {"text": "IP", "correct": false}, {"text": "UDP", "correct": false}], "explanation": "HTTP, MPEG, and GIF operate at the application layer of the TCP/IP model. TCP and UDP operate at the transport layer. IP operates at the internet layer.", "section": "Application Layer (TCP/IP)"}, {"number": 9, "question": "Which protocol uses encryption?", "choices": [{"text": "DHCP", "correct": false}, {"text": "DNS", "correct": false}, {"text": "FTP", "correct": false}, {"text": "HTTPS", "correct": true}], "explanation": "HTTPS uses Secure Socket Layer (SSL) to encrypt traffic accessed from a web server.", "section": "Application Layer (TCP/IP)"}, {"number": 10, "question": "Why is DHCP for IPv4 preferred for use on large networks?", "choices": [{"text": "Large networks send more requests for domain to IP address resolution than do smaller networks.", "correct": false}, {"text": "DHCP uses a reliable transport layer protocol.", "correct": false}, {"text": "It prevents sharing of files that are copyrighted.", "correct": false}, {"text": "It is a more efficient way to manage IPv4 addresses than static address assignment is.", "correct": true}, {"text": "Hosts on large networks require more IPv4 addressing configuration settings than do hosts on small networks.", "correct": false}], "explanation": "Static IPv4 address assignment requires personnel to configure each network host with addresses manually. Large networks can change frequently and have many more hosts to configure than do small networks. DHCP provides a much more efficient means of configuring and managing IPv4 addresses on large networks than does static address assignment.", "section": "Application Layer (TCP/IP)"}, {"number": 11, "question": "Which two tasks can be performed by a local DNS server? (Choose two.)", "choices": [{"text": "providing IP addresses to local hosts", "correct": false}, {"text": "allowing data transfer between two network devices", "correct": false}, {"text": "mapping name-to-IP addresses for internal hosts", "correct": true}, {"text": "forwarding name resolution requests between servers", "correct": true}, {"text": "retrieving email messages", "correct": false}], "explanation": "Two important functions of DNS are to (1) provide IP addresses for domain names such as www.cisco.com, and (2) forward requests that cannot be resolved to other servers in order to provide domain name to IP address translation. DHCP provides IP addressing information to local devices. A file transfer protocol such as FTP, SFTP, or TFTP provides file sharing services. IMAP or POP can be used to retrieve an email message from a server.", "section": "Application Layer (TCP/IP)"}, {"number": 12, "question": "Which protocol can be used to transfer messages from an email server to an email client?", "choices": [{"text": "SMTP", "correct": false}, {"text": "POP3", "correct": true}, {"text": "SNMP", "correct": false}, {"text": "HTTP", "correct": false}], "explanation": "SMTP is used to send mail from the client to the server but POP3 is used to download mail from the server to the client. HTTP and SNMP are protocols that are unrelated to email.", "section": "Application Layer (TCP/IP)"}, {"number": 13, "question": "When retrieving email messages, which protocol allows for easy, centralized storage and backup of emails that would be desirable for a small-to medium-sized business?", "choices": [{"text": "IMAP", "correct": true}, {"text": "POP", "correct": false}, {"text": "SMTP", "correct": false}, {"text": "HTTPS", "correct": false}], "explanation": "IMAP is preferred for small-to medium-sized businesses as IMAP allows centralized storage and backup of emails, with copies of the emails being forwarded to clients. POP delivers the emails to the clients and deletes them on the email server. SMTP is used to send emails and not to receive them. HTTPS is not used for secure web browsing.", "section": "Application Layer (TCP/IP)"}, {"number": 14, "question": "Which application layer protocol is used to provide file-sharing and print services to Microsoft applications?", "choices": [{"text": "HTTP", "correct": false}, {"text": "SMTP", "correct": false}, {"text": "DHCP", "correct": false}, {"text": "SMB", "correct": true}], "explanation": "SMB is used in Microsoft networking for file-sharing and print services. The Linux operating system provides a method of sharing resources with Microsoft networks by using a version of SMB called SAMBA.", "section": "Application Layer (TCP/IP)"}, {"number": 15, "question": "An author is uploading one chapter document from a personal computer to a file server of a book publisher. What role is the personal computer assuming in this network model?", "choices": [{"text": "client", "correct": true}, {"text": "master", "correct": false}, {"text": "server", "correct": false}, {"text": "slave", "correct": false}, {"text": "transient", "correct": false}], "explanation": "In the client/server network model, a network device assumes the role of server in order to provide a particular service such as file transfer and storage. The device requesting the service assumes the role of client. In the client/server network model, a dedicated server does not have to be used, but if one is present, the network model being used is the client/server model. In contrast, the peer-to-peer network model does not have a dedicated server. Subscribe Copyright \u00a9 2026. All content is created and curated by our editorial team. This is not a user-generated platform. | | | | 16.5.4 Module Quiz \u2013 Network Security Fundamentals (Answers) ITExamAnswers Editorial Team | Last Updated: Jun 17, 2026 | 16.5.4 Module Quiz \u2013 Network Security Fundamentals Answers", "section": "Application Layer (TCP/IP)"}, {"number": 1, "question": "What three configuration steps must be performed to implement SSH access to a router? (Choose three.)", "choices": [{"text": "a password on the console line", "correct": false}, {"text": "an IP domain name", "correct": true}, {"text": "a user account", "correct": true}, {"text": "an enable mode password", "correct": false}, {"text": "a unique hostname", "correct": true}, {"text": "an encrypted password", "correct": false}], "explanation": "To implement SSH on a router the following steps need to be performed: Configure a unique hostname. Configure the domain name of the network. Configure a user account to use AAA or local database for authentication. Generate RSA keys. Enable VTY SSH sessions.", "section": "Network Security Fundamentals"}, {"number": 2, "question": "What is the objective of a network reconnaissance attack?", "choices": [{"text": "discovery and mapping of systems", "correct": true}, {"text": "unauthorized manipulation of data", "correct": false}, {"text": "disabling network systems or services", "correct": false}, {"text": "denying access to resources by legitimate users", "correct": false}], "explanation": "The objective of a network reconnaissance attack is to discover information about a network, network systems, and network services.", "section": "Network Security Fundamentals"}, {"number": 3, "question": "For security reasons a network administrator needs to ensure that local computers cannot ping each other. Which settings can accomplish this task?", "choices": [{"text": "smartcard settings", "correct": false}, {"text": "firewall settings", "correct": true}, {"text": "MAC address settings", "correct": false}, {"text": "file system settings", "correct": false}], "explanation": "Smartcard and file system settings do not affect network operation. MAC address settings and filtering may be used to control device network access but cannot be used to filter different data traffic types.", "section": "Network Security Fundamentals"}, {"number": 4, "question": "A network administrator establishes a connection to a switch via SSH. What characteristic uniquely describes the SSH connection?", "choices": [{"text": "out-of-band access to a switch through the use of a virtual terminal with password authentication", "correct": false}, {"text": "remote access to the switch through the use of a telephone dialup connection", "correct": false}, {"text": "on-site access to a switch through the use of a directly connected PC and a console cable", "correct": false}, {"text": "remote access to a switch where data is encrypted during the session", "correct": true}, {"text": "direct access to the switch through the use of a terminal emulation program", "correct": false}], "explanation": "SSH provides a secure remote login through a virtual interface. SSH provides a stronger password authentication than Telnet. SSH also encrypts the data during the session.", "section": "Network Security Fundamentals"}, {"number": 5, "question": "Which benefit does SSH offer over Telnet for remotely managing a router?", "choices": [{"text": "encryption", "correct": true}, {"text": "TCP usage", "correct": false}, {"text": "authorization", "correct": false}, {"text": "connections via multiple VTY lines", "correct": false}], "explanation": "SSH provides secure access to a network device for remote management. It uses a stronger password authorization than Telnet does and encrypts any data that is transported during the session.", "section": "Network Security Fundamentals"}, {"number": 6, "question": "What is one of the most effective security tools available for protecting users from external threats?", "choices": [{"text": "firewalls", "correct": true}, {"text": "router that run AAA services", "correct": false}, {"text": "patch servers", "correct": false}, {"text": "password encryption techniques", "correct": false}], "explanation": "A firewall is one of the most effective security tools for protecting internal network users from external threats. A firewall resides between two or more networks, controls the traffic between them, and helps prevent unauthorized access. A host intrusion prevention system can help prevent outside intruders and should be used on all systems.", "section": "Network Security Fundamentals"}, {"number": 7, "question": "Which type of network threat is intended to prevent authorized users from accessing resources?", "choices": [{"text": "DoS attacks", "correct": true}, {"text": "access attacks", "correct": false}, {"text": "reconnaissance attacks", "correct": false}, {"text": "trust exploitation", "correct": false}], "explanation": "Network reconnaissance attacks involve the unauthorized discovery and mapping of the network and network systems. Access attacks and trust exploitation involve unauthorized manipulation of data and access to systems or user privileges. DoS, or Denial of Service attacks, are intended to prevent legitimate users and devices from accessing network resources.", "section": "Network Security Fundamentals"}, {"number": 8, "question": "Which three services are provided by the AAA framework? (Choose three.)", "choices": [{"text": "accounting", "correct": true}, {"text": "automation", "correct": false}, {"text": "authorization", "correct": true}, {"text": "authentication", "correct": true}, {"text": "autobalancing", "correct": false}, {"text": "autoconfiguration", "correct": false}], "explanation": "The authentication, authorization, and accounting (AAA) framework provides services to help secure access to network devices.", "section": "Network Security Fundamentals"}, {"number": 9, "question": "Which malicious code attack is self-contained and tries to exploit a specific vulnerability in a system being attacked?", "choices": [{"text": "virus", "correct": false}, {"text": "worm", "correct": true}, {"text": "Trojan horse", "correct": false}, {"text": "social engineering", "correct": false}], "explanation": "A worm is a computer program that is self replicated with the intention of attacking a system and trying to exploit a specific vulnerability in the target. Both virus and Trojan horse rely on a delivery mechanism to carry them from one host to another. Social engineering is not a type of malicious code attack.", "section": "Network Security Fundamentals"}, {"number": 10, "question": "Some routers and switches in a wiring closet malfunctioned after an air conditioning unit failed. What type of threat does this situation describe?", "choices": [{"text": "configuration", "correct": false}, {"text": "environmental", "correct": true}, {"text": "electrical", "correct": false}, {"text": "maintenance", "correct": false}], "explanation": "The four classes of threats are as follows: Hardware threats \u2013 physical damage to servers, routers, switches, cabling plant, and workstations Environmental threats \u2013 temperature extremes (too hot or too cold) or humidity extremes (too wet or too dry) Electrical threats \u2013 voltage spikes, insufficient supply voltage (brownouts), unconditioned power (noise), and total power loss Maintenance threats \u2013 poor handling of key electrical components (electrostatic discharge), lack of critical spare parts, poor cabling, and poor labeling", "section": "Network Security Fundamentals"}, {"number": 11, "question": "What does the term vulnerability mean?", "choices": [{"text": "a weakness that makes a target susceptible to an attack", "correct": true}, {"text": "a computer that contains sensitive information", "correct": false}, {"text": "a method of attack to exploit a target", "correct": false}, {"text": "a known target or victim machine", "correct": false}, {"text": "a potential threat that a hacker creates", "correct": false}], "explanation": "A vulnerability is not a threat, but it is a weakness that makes the PC or the software a target for attacks.", "section": "Network Security Fundamentals"}, {"number": 12, "question": "Which component is designed to protect against unauthorized communications to and from a computer?", "choices": [{"text": "security center", "correct": false}, {"text": "port scanner", "correct": false}, {"text": "antimalware", "correct": false}, {"text": "antivirus", "correct": false}, {"text": "firewall", "correct": true}], "explanation": "Antivirus and antimalware software are used to prevent infection from malicious software. A port scanner is used to test a PC network connection to determine which ports the PC is listening to. The security center is an area of Windows that keeps track of the security software and settings on the PC. A firewall is designed to block unsolicited connection attempts to a PC unless they are specifically permitted.", "section": "Network Security Fundamentals"}, {"number": 13, "question": "Which command will block login attempts on RouterA for a period of 30 seconds if there are 2 failed login attempts within 10 seconds?", "choices": [{"text": "RouterA(config)# login block-for 10 attempts 2 within 30", "correct": false}, {"text": "RouterA(config)# login block-for 30 attempts 2 within 10", "correct": true}, {"text": "RouterA(config)# login block-for 2 attempts 30 within 10", "correct": false}, {"text": "RouterA(config)# login block-for 30 attempts 10 within 2", "correct": false}], "explanation": "The correct syntax is RouterA(config)# login block-for (number of seconds) attempts (number of attempts) within (number of seconds).", "section": "Network Security Fundamentals"}, {"number": 14, "question": "What is the purpose of the network security accounting function?", "choices": [{"text": "to require users to prove who they are", "correct": false}, {"text": "to determine which resources a user can access", "correct": false}, {"text": "to keep track of the actions of a user", "correct": true}, {"text": "to provide challenge and response questions", "correct": false}], "explanation": "Authentication, authorization, and accounting are network services collectively known as AAA. Authentication requires users to prove who they are. Authorization determines which resources the user can access. Accounting keeps track of the actions of the user.", "section": "Network Security Fundamentals"}, {"number": 15, "question": "What type of attack may involve the use of tools such as nslookup and fping?", "choices": [{"text": "access attack", "correct": false}, {"text": "reconnaissance attack", "correct": true}, {"text": "denial of service attack", "correct": false}, {"text": "worm attack", "correct": false}], "explanation": "For reconnaissance attacks, external attackers can use Internet tools, such as the nslookup and whois utilities, to easily determine the IP address space assigned to a given corporation or entity. After the IP address space is determined, an attacker can then ping the publicly available IP addresses to identify the addresses that are active. Fping is a ping sweep tool that can help automate this process. Subscribe Copyright \u00a9 2026. All content is created and curated by our editorial team. This is not a user-generated platform. | | | | 17.8.5 Module Quiz \u2013 Build a Small Network (Answers) ITExamAnswers Editorial Team | Last Updated: Jun 17, 2026 | 17.8.5 Module Quiz \u2013 Build a Small Network Answers", "section": "Network Security Fundamentals"}, {"number": 1, "question": "Which two traffic types require delay sensitive delivery? (Choose two.)", "choices": [{"text": "email", "correct": false}, {"text": "web", "correct": false}, {"text": "FTP", "correct": false}, {"text": "voice", "correct": true}, {"text": "video", "correct": true}], "explanation": "Voice and video traffic have delay sensitive characteristics and must be given priority over other traffic types such as web, email, and file transfer traffic.", "section": "Build a Small Network"}, {"number": 2, "question": "A network technician suspects that a particular network connection between two Cisco switches is having a duplex mismatch. Which command would the technician use to see the Layer 1 and Layer 2 details of a switch port?", "choices": [{"text": "show interfaces", "correct": true}, {"text": "show running-config", "correct": false}, {"text": "show ip interface brief", "correct": false}, {"text": "show mac-address-table", "correct": false}], "explanation": "The show interfaces command can be used on both routers and switches to see speed, duplex, media type, MAC address, port type, and other Layer 1/Layer 2-related information.", "section": "Build a Small Network"}, {"number": 3, "question": "Which statement is true about CDP on a Cisco device?", "choices": [{"text": "The show cdp neighbor detail command will reveal the IP address of a neighbor only if there is Layer 3 connectivity.", "correct": false}, {"text": "To disable CDP globally, the no cdp enable command in interface configuration mode must be used.", "correct": false}, {"text": "CDP can be disabled globally or on a specific interface.", "correct": true}, {"text": "Because it runs at the data link layer, the CDP protocol can only be implemented in switches.", "correct": false}], "explanation": "CDP is a Cisco-proprietary protocol that can be disabled globally by using the no cdp run global configuration command, or disabled on a specific interface, by using the no cdp enable interface configuration command. Because CDP operates at the data link layer, two or more Cisco network devices, such as routers can learn about each other even if Layer 3 connectivity does not exist. The show cdp neighbors detail command reveals the IP address of a neighboring device regardless of whether you can ping the neighbor.", "section": "Build a Small Network"}, {"number": 4, "question": "What factor should be considered in the design of a small network when devices are being chosen?", "choices": [{"text": "cost of devices", "correct": true}, {"text": "redundancy", "correct": false}, {"text": "traffic analysis", "correct": false}, {"text": "ISP", "correct": false}], "explanation": "Factors to consider when designing a network include the cost of devices, speed, modularity and scalability, and ease of managing the network.", "section": "Build a Small Network"}, {"number": 5, "question": "A user is unable to reach the website when typing http://www.cisco.com in a web browser, but can reach the same site by typing http://72.163.4.161. What is the issue?", "choices": [{"text": "default gateway", "correct": false}, {"text": "DHCP", "correct": false}, {"text": "DNS", "correct": true}, {"text": "TCP/IP protocol stack", "correct": false}], "explanation": "Domain Name Service (DNS) is used to translate a web address to an IP address. The address of the DNS server is provided via DHCP to host computers.", "section": "Build a Small Network"}, {"number": 6, "question": "Where are Cisco IOS debug output messages sent by default?", "choices": [{"text": "memory buffers", "correct": false}, {"text": "vty lines", "correct": false}, {"text": "Syslog server", "correct": false}, {"text": "console line", "correct": true}], "explanation": "Debug messages, like other IOS log messages, are sent to the console line by default. Sending these messages to the terminal lines requires the terminal monitor command.", "section": "Build a Small Network"}, {"number": 7, "question": "Which element of scaling a network involves identifying the physical and logical topologies?", "choices": [{"text": "traffic analysis", "correct": false}, {"text": "network documentation", "correct": true}, {"text": "device inventory", "correct": false}, {"text": "cost analysis", "correct": false}], "explanation": "To scale a network, several elements are required: Network documentation \u2013 physical and logical topology Device Inventory \u2013 list of devices that use or make up the network Budget \u2013 Itemized IT budget, including fiscal year equipment purchasing budget Traffic analysis \u2013 protocols, applications, and services and their respective traffic requirements should be documented", "section": "Build a Small Network"}, {"number": 8, "question": "What mechanism can be implemented in a small network to help minimize network latency for real-time streaming applications?", "choices": [{"text": "QoS", "correct": true}, {"text": "PoE", "correct": false}, {"text": "AAA", "correct": false}, {"text": "ICMP", "correct": false}], "explanation": "Quality of service (QoS) is a mechanism which is used to classify and prioritize traffic through the network. This enables network devices to minimize the latency for real-time applications such as voice and video.", "section": "Build a Small Network"}, {"number": 9, "question": "Which process failed if a computer cannot access the internet and received an IP address of 169.254.142.5?", "choices": [{"text": "IP", "correct": false}, {"text": "DNS", "correct": false}, {"text": "DHCP", "correct": true}, {"text": "HTTP", "correct": false}], "explanation": "When a Windows computer cannot communicate with an IPv4 DHCP server, the computer automatically assigns itself an IP address in the169.254.0.0/16 range. Linux and Apple computers do not automatically assign an IP address.", "section": "Build a Small Network"}, {"number": 10, "question": "A small company has only one router as the exit point to its ISP. Which solution could be adopted to maintain connectivity if the router itself, or its connection to the ISP, fails?", "choices": [{"text": "Activate another router interface that is connected to the ISP, so the traffic can flow through it.", "correct": false}, {"text": "Have a second router that is connected to another ISP.", "correct": true}, {"text": "Purchase a second least-cost link from another ISP to connect to this router.", "correct": false}, {"text": "Add more interfaces to the router that is connected to the internal network.", "correct": false}], "explanation": "Small networks generally have only one link to an ISP to establish a connection to the Internet. Problems can occur in the network, which can cause the disruption of this service. In order to keep connectivity, redundancy has to be provided. If the problem is in the router interface that is connected to the ISP, another interface can be activated on the router, so if one interface fails, traffic may be redirected toward the other interface. However, if the router itself fails, a second router that is connected to another ISP can be used as a backup.", "section": "Build a Small Network"}, {"number": 11, "question": "When should an administrator establish a network baseline?", "choices": [{"text": "devices with a fixed number and type of interfaces", "correct": false}, {"text": "devices that have support for network monitoring", "correct": false}, {"text": "redundant devices", "correct": false}, {"text": "devices with support for modularity", "correct": true}], "explanation": "In a small business with a large growth forecast, the primary influencing factor would be the ability of devices to support modularity. Devices with a fixed type/number of interfaces would not support growth. Redundancy is an important factor, but typically found in large enterprises. Network monitoring is also an important consideration, but not as important as modularity.", "section": "Build a Small Network"}, {"number": 14, "question": "What type of traffic would most likely have the highest priority through the network?", "choices": [{"text": "FTP", "correct": false}, {"text": "instant messaging", "correct": false}, {"text": "voice", "correct": true}, {"text": "SNMP", "correct": false}], "explanation": "Not all traffic should receive the same treatment or priority through a network. Some ty </script>

<script>
const RAW_DATA = JSON.parse(document.getElementById('quiz-data').textContent);

let state = {
  order: [],          // indices into RAW_DATA in current play order
  pos: 0,              // current position in order
  score: 0,
  answered: [],        // per order-position: {done, correct}
  selected: new Set(), // selected choice indices for current question
  locked: false,
  activeSection: 'All',
  choiceOrder: []       // shuffled choice index map per current question
};

const sections = ['All', ...Array.from(new Set(RAW_DATA.map(q => q.section)))];

function buildFilterChips(){
  const row = document.getElementById('filterRow');
  row.innerHTML = '';
  sections.forEach(s => {
    const el = document.createElement('button');
    el.className = 'chip' + (s === state.activeSection ? ' active' : '');
    el.textContent = s + (s==='All' ? ` (${RAW_DATA.length})` : ` (${RAW_DATA.filter(q=>q.section===s).length})`);
    el.onclick = () => { state.activeSection = s; initOrder(false); render(); };
    row.appendChild(el);
  });
}

function initOrder(shuffle){
  let idxs = RAW_DATA.map((q,i)=>i).filter(i => state.activeSection==='All' || RAW_DATA[i].section===state.activeSection);
  if(shuffle){
    for(let i=idxs.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [idxs[i],idxs[j]]=[idxs[j],idxs[i]];
    }
  }
  state.order = idxs;
  state.pos = 0;
  state.score = 0;
  state.answered = idxs.map(()=>({done:false, correct:false}));
  state.selected = new Set();
  state.locked = false;
  document.getElementById('sourceLabel').textContent = `SA4 — ${idxs.length} question${idxs.length===1?'':'s'}`;
}

function shuffleChoices(q){
  const arr = q.choices.map((c,i)=>i);
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function render(){
  buildFilterChips();
  updateProgress();

  const area = document.getElementById('quizArea');

  if(state.order.length === 0){
    area.innerHTML = `<div class="card"><p style="color:var(--text-dim)">No questions in this section.</p></div>`;
    return;
  }

  if(state.pos >= state.order.length){
    renderResults();
    return;
  }

  const qIdx = state.order[state.pos];
  const q = RAW_DATA[qIdx];
  const ansState = state.answered[state.pos];
  const isMulti = q.choices.filter(c=>c.correct).length > 1;

  if(state.choiceOrder.length !== q.choices.length || !state._builtFor || state._builtFor !== state.pos){
    state.choiceOrder = shuffleChoices(q);
    state._builtFor = state.pos;
    if(!ansState.done) state.selected = new Set();
  }

  let choicesHtml = '';
  state.choiceOrder.forEach(ci => {
    const c = q.choices[ci];
    let cls = 'choice';
    let boxContent = isMulti ? '' : '';
    if(ansState.done){
      cls += ' locked';
      if(c.correct) cls += ' correct';
      else if(state.selected.has(ci)) cls += ' incorrect';
      else cls += ' dimmed';
    } else if(state.selected.has(ci)){
      cls += ' selected';
    }
    choicesHtml += `<div class="${cls}" data-ci="${ci}" onclick="onChoiceClick(${ci}, ${isMulti})">
      <div class="box">${ansState.done ? (c.correct ? '✓' : (state.selected.has(ci) ? '✕' : '')) : (state.selected.has(ci) ? '✓' : '')}</div>
      <div class="choice-text">${escapeHtml(c.text)}</div>
    </div>`;
  });

  let feedbackHtml = '';
  if(ansState.done){
    feedbackHtml = `<div class="feedback show ${ansState.correct ? 'right' : 'wrong'}">
      <div class="feedback-head">${ansState.correct ? '✓ CORRECT' : '✕ INCORRECT'}</div>
      <div class="feedback-body">${escapeHtml(q.explanation) || 'No explanation provided.'}</div>
    </div>`;
  }

  area.innerHTML = `
    <div class="card">
      <div class="card-meta">
        <span class="q-index">QUESTION ${state.pos+1} / ${state.order.length}</span>
        <div style="display:flex;gap:8px;">
          ${isMulti ? `<span class="multi-tag">SELECT ${q.choices.filter(c=>c.correct).length}</span>` : ''}
          <span class="section-tag">${escapeHtml(q.section)} · #${q.number}</span>
        </div>
      </div>
      <div class="q-text">${escapeHtml(q.question)}</div>
      <div class="choices">${choicesHtml}</div>
      ${feedbackHtml}
      <div class="action-row">
        <button class="btn" id="prevBtn" ${state.pos===0 ? 'disabled' : ''} onclick="goPrev()">&larr; Previous</button>
        ${ansState.done
          ? `<button class="btn primary" onclick="goNext()">${state.pos === state.order.length-1 ? 'See results' : 'Next question'} &rarr;</button>`
          : `<button class="btn primary" id="submitBtn" onclick="submitAnswer(${isMulti})" ${state.selected.size===0?'disabled':''}>Submit answer</button>`
        }
      </div>
    </div>
  `;
}

function onChoiceClick(ci, isMulti){
  const qIdx = state.order[state.pos];
  const ansState = state.answered[state.pos];
  if(ansState.done) return;

  if(isMulti){
    if(state.selected.has(ci)) state.selected.delete(ci);
    else state.selected.add(ci);
    render();
  } else {
    state.selected = new Set([ci]);
    submitAnswer(false);
  }
}

function submitAnswer(isMulti){
  const qIdx = state.order[state.pos];
  const q = RAW_DATA[qIdx];
  const ansState = state.answered[state.pos];
  if(ansState.done || state.selected.size===0) return;

  const correctSet = new Set(q.choices.map((c,i)=>c.correct?i:null).filter(x=>x!==null));
  let isCorrect = correctSet.size === state.selected.size;
  if(isCorrect){
    for(const ci of state.selected){ if(!correctSet.has(ci)){ isCorrect=false; break; } }
  }

  ansState.done = true;
  ansState.correct = isCorrect;
  if(isCorrect) state.score += 1;

  render();
}

function goNext(){
  state.pos += 1;
  render();
}
function goPrev(){
  if(state.pos>0){ state.pos -= 1; render(); }
}

function updateProgress(){
  const total = state.order.length;
  const done = state.answered.filter(a=>a.done).length;
  const pct = total ? Math.round((done/total)*100) : 0;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = `${done} / ${total}`;
  document.getElementById('scoreChip').textContent = `Score: ${state.score}`;
}

function renderResults(){
  const total = state.order.length;
  const pct = total ? Math.round((state.score/total)*100) : 0;
  const area = document.getElementById('quizArea');

  const bySection = {};
  state.order.forEach((qIdx,i)=>{
    const sec = RAW_DATA[qIdx].section;
    if(!bySection[sec]) bySection[sec] = {correct:0,total:0};
    bySection[sec].total += 1;
    if(state.answered[i].correct) bySection[sec].correct += 1;
  });

  let breakdownHtml = Object.entries(bySection).map(([sec,v])=>`
    <div class="breakdown-row"><span>${escapeHtml(sec)}</span><span>${v.correct} / ${v.total}</span></div>
  `).join('');

  area.innerHTML = `
    <div class="card results">
      <div style="font-family:var(--mono);color:var(--text-dim);font-size:12px;letter-spacing:1px;">QUIZ COMPLETE</div>
      <div class="big-score">${state.score}<span style="font-size:24px;color:var(--text-dim);">/${total}</span></div>
      <div class="sub">${pct}% correct</div>
      <div class="results-actions">
        <button class="btn primary" onclick="retryAll()">Retry (same order)</button>
        <button class="btn" onclick="retryShuffled()">Retry shuffled</button>
      </div>
      <div class="breakdown">${breakdownHtml}</div>
    </div>
  `;
}

function retryAll(){
  state.pos = 0;
  state.score = 0;
  state.answered = state.order.map(()=>({done:false, correct:false}));
  state.selected = new Set();
  state._builtFor = null;
  render();
}
function retryShuffled(){
  initOrder(true);
  render();
}

document.getElementById('shuffleBtn').onclick = () => { initOrder(true); render(); };
document.getElementById('restartBtn').onclick = () => { initOrder(false); render(); };

initOrder(false);
render();
</script>
</body>
</html>
