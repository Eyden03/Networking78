o route to destination (the router lacks a path to that network). Code 1: Communication with destination administratively prohibited (e.g., blocked by a firewall rule or ACL). Code 2: Beyond scope of the source address. Code 3: Address unreachable . This implies that the packet successfully reached the local gateway or edge router serving the destination segment, but that router failed to map or resolve the Layer 2 physical address (Neighbor Discovery/NDP failure) required to deliver the packet to the final host.","section":"ICMP","module":"Module 13","source":"Modules 11-13: IP Addressing Exam","sourceFile":"11.pdf","sourcePage":65,"type":"choice","choices":[{"text":"address unreachable","correct":true},{"text":"network unreachable","correct":false},{"text":"host unreachable","correct":false},{"text":"protocol unreachable","correct":false}],"images":[],"sources":["Modules 11-13: IP Addressing Exam"]},{"number":53,"question":"A host is transmitting a multicast. Which host or hosts will receive it?","explanation":"Topic 11.2.3 A multicast transmission is designed to send data packets from a single source to a specific group of destination hosts that have explicitly joined or subscribed to a multicast group address (such as devices listening to routing protocols or video streams). Unlike a broadcast (which delivers data to every single host on the subnet) or a unicast (which targets one specific device), multicast optimizes network bandwidth by duplicating and delivering traffic only to the interested group members.","section":"IPv4 Addressing","module":"Module 11","source":"Modules 11-13: IP Addressing Exam","sourceFile":"11.pdf","sourcePage":65,"type":"choice","choices":[{"text":"a specially defined group of hosts","correct":true},{"text":"the closest neighbor on the same network","correct":false},{"text":"one specific host","correct":false},{"text":"directly connected network devices","correct":false}],"images":[],"sources":["Modules 11-13: IP Addressing Exam"]},{"number":60,"question":"Which is the compressed format of the IPv6 address 2001:0db8:0000:0000:0000:a0b0:0008:0001?","explanation":"Topic 12.2.2","section":"IPv6 Addressing","module":"Module 12","source":"Modules 11-13: IP Addressing Exam","sourceFile":"11.pdf","sourcePage":66,"type":"choice","choices":[{"text":"2001:db8::a0b0:8:1","correct":true},{"text":"2001:db8::ab8:1:0:1000","correct":false},{"text":"2001:db80:0:1::80:1","correct":false},{"text":"2001:db80:::1::80:1","correct":false}],"images":[],"sources":["Modules 11-13: IP Addressing Exam"]},{"number":61,"question":"Which is the compressed format of the IPv6 address fe80:09ea:0000:2200:0000:0000:0fe0:0290?","explanation":"Topic 12.2.2 1. Omit leading zeros: Remove any starting zeros from each 16-bit segment ( hextet ). Following this, 09ea 9ea 0000 0 becomes , becomes , simplifies to , and reduces to 0fe0 fe0 0290 290 2200 . (Note: Trailing zeros, such as those in , cannot be dropped). 2. Compress with double colons ( ): This rule allows you to replace the longest contiguous string of all-zero hextets with a single :: :: . This specific address features a single in the third hextet and a consecutive pair of 0000 0000:0000 in the fifth and sixth hextets. You must choose the longest sequence to compress, which substitutes the consecutive pair with . :: Combining these rules yields the correct optimized format: fe80:9ea:0:2200::fe0:290 .","section":"IPv6 Addressing","module":"Module 12","source":"Modules 11-13: IP Addressing Exam","sourceFile":"11.pdf","sourcePage":66,"type":"choice","choices":[{"text":"fe80:9ea:0:2200::fe0:290","correct":true},{"text":"fe80:9:20::b000:290","correct":false},{"text":"fe80:9ea0::2020:0:bf:e0:9290","correct":false},{"text":"fe80:9ea0::2020::bf:e0:9290","correct":false}],"images":[],"sources":["Modules 11-13: IP Addressing Exam"]},{"number":62,"question":"Which is the compressed format of the IPv6 address 2002:0042:0010:c400:0000:0000:0000:0909?","explanation":"Topic 12.2.2 1. Omit leading zeros: Drop any starting zeros within each 16-bit segment ( hextet ). Following this step, 0042 42 0010 10 simplifies to , becomes , and reduces to . Trailing zeros (such as the ones in 0909 909 c400 ) must be kept exactly as they are. 2. Compress with the double colon ( ): The contiguous string of three consecutive all-zero segments ( :: 0000:0000:0000 ) is fully replaced by a single notation. :: Combining both optimization rules yields the correct compressed format: 2002:42:10:c400::909 .","section":"IPv6 Addressing","module":"Module 12","source":"Modules 11-13: IP Addressing Exam","sourceFile":"11.pdf","sourcePage":67,"type":"choice","choices":[{"text":"2002:42:10:c400::909","correct":true},{"text":"200:420:110:c4b::910:0:90","correct":false},{"text":"2002:4200::25:1090:0:99","correct":false},{"text":"2002:42::25:1090:0:99","correct":false}],"images":[],"sources":["Modules 11-13: IP Addressing Exam"]},{"number":63,"question":"Which is the compressed format of the IPv6 address 2001:0db8:0000:0000:0ab8:0001:0000:1000?","explanation":"Topic 12.2.2 1. Omit leading zeros: Drop any starting zeros within each 16-bit segment ( hextet ). Following this step, simplifies to , becomes , 0db8 db8 0ab8 ab8 reduces to , and segments simplify 0001 1 0000 to a single . (Note: Trailing zeros, such as the ones in 0 1000 , cannot be omitted). 2. Compress with the double colon ( ): Replace the longest continuous string of all-zero hextets with a single :: :: notation. This address contains two all-zero sequences: a two-block sequence ( ) in the 3rd and 4th segments, and a single block ( 0000:0000 0000 ) in the 7th segment. Compressing the longest sequence turns the two consecutive blocks into , while the 7th segment remains represented by a single :: 0 . Combining both optimization rules yields the correct compressed format: 2001:db8::ab8:1:0:1000 .","section":"IPv6 Addressing","module":"Module 12","source":"Modules 11-13: IP Addressing Exam","sourceFile":"11.pdf","sourcePage":67,"type":"choice","choices":[{"text":"2001:db8::ab8:1:0:1000","correct":true},{"text":"2001:db8::a0b0:8:1","correct":false},{"text":"2001:db8:1::ab8:0:1","correct":false},{"text":"2001:db8:0:1::8:1","correct":false}],"images":[],"sources":["Modules 11-13: IP Addressing Exam"]},{"number":64,"question":"Which is the compressed format of the IPv6 address 2002:0420:00c4:1008:0025:0190:0000:0990?","explanation":"Topic 12.2.2 To compress an IPv6 address, two standard rules must be followed: 1. Omit leading zeros in any 16-bit section (hextet). Following this rule: becomes , 0420 420 00c4 c4 0025 25 0190 becomes , becomes , becomes , and becomes . Trailing zeros must 190 0990 990 not be dropped. :: 2. Use a double colon ( ) to replace any single, contiguous string of one or more segments consisting entirely of zeros. In this address, the seventh hextet is , which is compressed into . 0000 :: Combining these rules, the original address successfully compresses to 2002:420:c4:1008:25:190::990 .","section":"IPv6 Addressing","module":"Module 12","source":"Modules 11-13: IP Addressing Exam","sourceFile":"11.pdf","sourcePage":68,"type":"choice","choices":[{"text":"2002:420:c4:1008:25:190::990","correct":true},{"text":"2002:42:10:c400::909","correct":false},{"text":"2002:4200::25:1090:0:99","correct":false},{"text":"2002:42::25:1090:0:99","correct":false}],"images":[],"sources":["Modules 11-13: IP Addressing Exam"]},{"number":66,"question":"Which is the compressed format of the IPv6 address fe80:0000:0000:0000:0220:0b3f:f0e0:0029?","explanation":"Topic 12.2.2 1. Omit leading zeros: In every hextet, any leading zeros are dropped. Thus, 0220 220 becomes , becomes , and reduces to . 0b3f b3f 0029 29 2. Compress contiguous zeros using the double colon ( :: ): The three consecutive all-zero segments ( ) are replaced with a single 0000:0000:0000 :: notation. Combining these optimization steps results in the correct compressed address: fe80::220:b3f:f0e0:29 .","section":"IPv6 Addressing","module":"Module 12","source":"Modules 11-13: IP Addressing Exam","sourceFile":"11.pdf","sourcePage":69,"type":"choice","choices":[{"text":"fe80::220:b3f:f0e0:29","correct":true},{"text":"fe80:9ea:0:2200::fe0:290","correct":false},{"text":"fe80:9ea0::2020:0:bf:e0:9290","correct":false},{"text":"fe80:9ea0::2020::bf:e0:9290","correct":false}],"images":[],"sources":["Modules 11-13: IP Addressing Exam"]},{"number":70,"question":"A user issues a ping 2001:db8:FACE:39::10 command and receives a response that includes a code of 2. What does this code represent?","explanation":"Topic 13.1.3 In ICMPv6 “Destination Unreachable” messages (Type 1), the Code field specifies the precise diagnostic reason why the packet could not be delivered. The standard ICMPv6 codes are defined as follows: Code 0: No route to destination. Code 1: Communication with destination administratively prohibited. Code 2: Beyond scope of the source address . This tells the sender that the scope of its source IP address is too constrained (for example, a Link-Local Address) to successfully communicate with the destination IP address (such as a Global Unicast Address). Code 3: Address unreachable.","section":"ICMP","module":"Module 13","source":"Modules 11-13: IP Addressing Exam","sourceFile":"11.pdf","sourcePage":70,"type":"choice","choices":[{"text":"beyond scope of the source address","correct":true},{"text":"communication with the destination administratively prohibited","correct":false},{"text":"address unreachable","correct":false},{"text":"no route to destination","correct":false}],"images":[],"sources":["Modules 11-13: IP Addressing Exam"]},{"number":72,"question":"A user issues a ping fe80:65ab:dcc1::100 command and receives a response that includes a code of 3. What does this code represent?","explanation":"Topic 13.1.3 Within ICMPv6 “Destination Unreachable” messages (Type 1), the Code field values identify the precise reason for the delivery failure. The standard definitions are classified as follows: Code 0: No route to destination. Code 1: Communication with destination administratively prohibited. Code 2: Beyond scope of the source address. Code 3: Address unreachable (the targeted destination IP cannot be resolved or is physically unavailable on the local link).","section":"ICMP","module":"Module 13","source":"Modules 11-13: IP Addressing Exam","sourceFile":"11.pdf","sourcePage":72,"type":"choice","choices":[{"text":"address unreachable","correct":true},{"text":"communication with the destination administratively prohibited","correct":false},{"text":"beyond scope of the source address","correct":false},{"text":"no route to destination","correct":false}],"images":[],"sources":["Modules 11-13: IP Addressing Exam"]},{"number":73,"question":"A user issues a ping 10.10.14.67 command and receives a response that includes a code of 0. What does this code represent?","explanation":"Topic 13.1.3 Within ICMP “Destination Unreachable” messages (Type 3), Code 0 specifically stands for Network unreachable . This indicates that the router does not possess a valid route in its routing table to reach the destination network.","section":"ICMP","module":"Module 13","source":"Modules 11-13: IP Addressing Exam","sourceFile":"11.pdf","sourcePage":72,"type":"choice","choices":[{"text":"network unreachable","correct":true},{"text":"protocol unreachable","correct":false},{"text":"port unreachable","correct":false},{"text":"host unreachable","correct":false}],"images":[],"sources":["Modules 11-13: IP Addressing Exam"]},{"number":74,"question":"A user issues a ping fe80:65ab:dcc1::100 command and receives a response that includes a code of 4. What does this code represent?","explanation":"Topic 13.1.3 When a device replies with an ICMPv6 “Destination Unreachable” message (Type 1), it includes a specific Code value to explain precisely why the packet could not be delivered. Within the ICMPv6 standard, these codes are classified as follows: Code 0: No route to destination (Network unreachable). Code 1: Communication with destination administratively prohibited. Code 3: Address unreachable (Host unreachable). Code 4: Port unreachable . Consequently, a code of 4 fundamentally indicates that the packet successfully reached the destination host, but the transport layer protocol (such as UDP) on that host was unable to find an active application or service listening on the targeted port.","section":"ICMP","module":"Module 13","source":"Modules 11-13: IP Addressing Exam","sourceFile":"11.pdf","sourcePage":73,"type":"choice","choices":[{"text":"port unreachable","correct":true},{"text":"host unreachable","correct":false},{"text":"protocol unreachable","correct":false},{"text":"network unreachable","correct":false}],"images":[],"sources":["Modules 11-13: IP Addressing Exam"]},{"number":75,"question":"A user issues a ping 198.133.219.8 command and receives a response that includes a code of 0. What does this code represent?","explanation":"Topic 13.1.3","section":"ICMP","module":"Module 13","source":"Modules 11-13: IP Addressing Exam","sourceFile":"11.pdf","sourcePage":73,"type":"choice","choices":[{"text":"network unreachable","correct":true},{"text":"protocol unreachable","correct":false},{"text":"port unreachable","correct":false},{"text":"host unreachable","correct":false}],"images":[],"sources":["Modules 11-13: IP Addressing Exam"]},{"number":76,"question":"A user issues a ping 2001:db8:3040:114::88 command and receives a response that includes a code of 4. What does this code represent?","explanation":"Topic 13.1.3 Much like in IPv4 networking, the ICMPv6 protocol relies on distinct code numbers inside its “Destination Unreachable” error messages (Type 1) to provide diagnostic details about delivery failures. Code 4 specifically stands for Port unreachable . This means that the IP packet was successfully routed across the network and physically reached the target host. However, once the network layer passed the payload up to the transport layer (TCP or UDP), the receiving operating system could not find any active application or service listening on the specified destination port.","section":"ICMP","module":"Module 13","source":"Modules 11-13: IP Addressing Exam","sourceFile":"11.pdf","sourcePage":74,"type":"choice","choices":[{"text":"port unreachable","correct":true},{"text":"host unreachable","correct":false},{"text":"protocol unreachable","correct":false},{"text":"network unreachable","correct":false}],"images":[],"sources":["Modules 11-13: IP Addressing Exam"]},{"number":5,"question":"Match each weakness with an example. (Not all options are used.)","explanation":"Topic 16.1.2 An employee who is trying to guess the password of another user exemplifies not a weakness but an attack.","section":"Network Security Fundamentals","module":"Module 16","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":3,"type":"reveal","answer":"See the associated exhibit for the answer shown in the source PDF.","choices":[],"images":["assets/question-images/ccna-1-v7-modules-16-17-building-and-securing-a-small-network-exam-answers-p3-fe850ff3b2a5.png"],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":6,"question":"Match the type of information security threat to the scenario. (Not all options are used.)","explanation":"Topic 16.1.2 After an intruder gains access to a network, common network threats are as follows: Information theft Identity theft Data loss or manipulation Disruption of service Cracking the password for a known username is a type of access attack.","section":"Network Security Fundamentals","module":"Module 16","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":4,"type":"reveal","answer":"See the associated exhibit for the answer shown in the source PDF.","choices":[],"images":["assets/question-images/ccna-1-v7-modules-16-17-building-and-securing-a-small-network-exam-answers-p4-354aaff906d5.png"],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":7,"question":"Which example of malicious code would be classified as a Trojan horse?","explanation":"Topic 16.2.1 A Trojan horse is malicious code that has been written specifically to look like a legitimate program. This is in contrast to a virus, which simply attaches itself to an actual legitimate program. Viruses require manual intervention from a user to spread from one system to another, while a worm is able to spread automatically between systems by exploiting vulnerabilities on those devices.","section":"Network Security Fundamentals","module":"Module 16","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":5,"type":"choice","choices":[{"text":"malware that was written to look like a video game","correct":true},{"text":"malware that requires manual user intervention to spread between systems","correct":false},{"text":"malware that attaches itself to a legitimate program and spreads to other programs when launched","correct":false},{"text":"malware that can automatically spread from one system to another by exploiting a vulnerability in the target","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":8,"question":"What is the difference between a virus and a worm?","explanation":"Topic 16.2.1 Worms are able to self-replicate and exploit vulnerabilities on computer networks without user participation.","section":"Network Security Fundamentals","module":"Module 16","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":5,"type":"choice","choices":[{"text":"Viruses self-replicate but worms do not.","correct":false},{"text":"Worms self-replicate but viruses do not.","correct":true},{"text":"Worms require a host file but viruses do not.","correct":false},{"text":"Viruses hide in legitimate programs but worms do not.","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":9,"question":"Which attack involves a compromise of data that occurs between two end points?","explanation":"Topic 16.2.3 Threat actors frequently attempt to access devices over the internet through communication protocols. Some of the most popular remote exploits are as follows: Man-In-the-middle attack (MITM) – The threat actor gets between devices in the system and intercepts all of the data being transmitted. This information could simply be collected or modified for a specific purpose and delivered to its original destination. Eavesdropping attack – When devices are being installed, the threat actor can intercept data such as security keys that are used by constrained devices to establish communications once they are up and running. SQL injection (SQLi) – Threat actors uses a flaw in the Structured Query Language (SQL) application that allows them to have access to modify the data or gain administrative privileges. Routing attack – A threat actor could either place a rogue routing device on the network or modify routing packets to manipulate routers to send all packets to the chosen destination of the threat actor. The threat actor could then drop specific packets, known as selective forwarding, or drop all packets, known as a sinkhole attack.","section":"Network Security Fundamentals","module":"Module 16","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":6,"type":"choice","choices":[{"text":"denial-of-service","correct":false},{"text":"man-in-the-middle attack","correct":true},{"text":"extraction of security parameters","correct":false},{"text":"username enumeration","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":10,"question":"Which type of attack involves an adversary attempting to gather information about a network to identify vulnerabilities?","explanation":"Topic 16.2.2 Reconnaissance is a type of attack where the intruder is looking for wireless network vulnerabilities.","section":"Network Security Fundamentals","module":"Module 16","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":7,"type":"choice","choices":[{"text":"reconnaissance","correct":true},{"text":"DoS","correct":false},{"text":"dictionary","correct":false},{"text":"man-in-the-middle","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":11,"question":"Match the description to the type of firewall filtering. (Not all options are used.)","explanation":"Topic 16.3.6 Stateful packet inspection : Prevents or allows access based on whether the traffic is in response to requests from internal hosts. URL filtering : Prevents or allows access based on web addresses or keywords. Application filtering : Prevents or allows access based on the port numbers used in the request. Packet filtering : Prevents or allows access based on the IP or MAC addresses of the source and destination.","section":"Network Security Fundamentals","module":"Module 16","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":7,"type":"reveal","answer":"See the associated exhibit for the answer shown in the source PDF.","choices":[],"images":["assets/question-images/ccna-1-v7-modules-16-17-building-and-securing-a-small-network-exam-answers-p7-e854c047433d.png","assets/question-images/ccna-1-v7-modules-16-17-building-and-securing-a-small-network-exam-answers-p7-8316787cdd9b.png"],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":12,"question":"What is the purpose of the network security authentication function?","explanation":"Topic 16.3.4 Authentication, authorization, and accounting are network services collectively known as AAA. Authentication requires users to prove who they are. Authorization determines which resources the user can access. Accounting keeps track of the actions of the user.","section":"Network Security Fundamentals","module":"Module 16","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":8,"type":"choice","choices":[{"text":"to require users to prove who they are","correct":true},{"text":"to determine which resources a user can access","correct":false},{"text":"to keep track of the actions of a user","correct":false},{"text":"to provide challenge and response questions","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":13,"question":"Which firewall feature is used to ensure that packets coming into a network are legitimate responses to requests initiated from internal hosts?","explanation":"Topic 16.3.6 Stateful packet inspection on a firewall checks that incoming packets are actually legitimate responses to requests originating from hosts inside the network. Packet filtering can be used to permit or deny access to resources based on IP or MAC address. Application filtering can permit or deny access based on port number. URL filtering is used to permit or deny access based on URL or on keywords.","section":"Network Security Fundamentals","module":"Module 16","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":8,"type":"choice","choices":[{"text":"stateful packet inspection","correct":true},{"text":"URL filtering","correct":false},{"text":"application filtering","correct":false},{"text":"packet filtering","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":14,"question":"When applied to a router, which command would help mitigate brute-force password attacks against the router?","explanation":"Topic 16.4.3 The login block-for command sets a limit on the maximum number of failed login attempts allowed within a defined period of time. If this limit is exceeded, no further logins are allowed for the specified period of time. This helps to mitigate brute-force password cracking since it will significantly increase the amount of time required to crack a password. The exec-timeout command specifies how long the session can be idle before the user is disconnected. The service password-encryption command encrypts the passwords in the running configuration. The banner motd command displays a message to users who are logging in to the device.","section":"Network Security Fundamentals","module":"Module 16","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":9,"type":"choice","choices":[{"text":"exec-timeout 30","correct":false},{"text":"service password-encryption","correct":false},{"text":"banner motd $Max failed logins = 5$","correct":false},{"text":"login block-for 60 attempts 5 within 60","correct":true}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":15,"question":"Identify the steps needed to configure a switch for SSH. The answer order does not matter. (Not all options are used.)","explanation":"Topic 16.4.4 The login and password cisco commands are used with Telnet switch configuration, not SSH configuration.","section":"Network Security Fundamentals","module":"Module 16","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":9,"type":"reveal","answer":"See the associated exhibit for the answer shown in the source PDF.","choices":[],"images":["assets/question-images/ccna-1-v7-modules-16-17-building-and-securing-a-small-network-exam-answers-p9-63737fde9632.png"],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":16,"question":"What feature of SSH makes it more secure than Telnet for a device management connection?","explanation":"Topic 16.4.4 Secure Shell (SSH) is a protocol that provides a secure management connection to a remote device. SSH provides security by providing encryption for both authentication (username and password) and the transmitted data. Telnet is a protocol that uses unsecure plaintext transmission. SSH is assigned to TCP port 22 by default. Although this port can be changed in the SSH server configuration, the port is not dynamically changed. SSH does not use IPsec.","section":"Network Security Fundamentals","module":"Module 16","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":10,"type":"choice","choices":[{"text":"confidentiality with IPsec","correct":false},{"text":"stronger password requirement","correct":false},{"text":"random one-time port connection","correct":false},{"text":"login information and data encryption","correct":true}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":17,"question":"What is the advantage of using SSH over Telnet?","explanation":"Topic 16.4.4 SSH provides a secure method for remote access to hosts by encrypting network traffic between the SSH client and remote hosts. Although both Telnet and SSH request authentication before a connection is established, Telnet does not support encryption of login credentials.","section":"Network Security Fundamentals","module":"Module 16","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":10,"type":"choice","choices":[{"text":"SSH is easier to use.","correct":false},{"text":"SSH operates faster than Telnet.","correct":false},{"text":"SSH provides secure communications to access hosts.","correct":true},{"text":"SSH supports authentication for a connection request.","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":18,"question":"What is the role of an IPS?","explanation":"Topic 16.3.4 An intrusion prevention system (IPS) provides real-time detection and blocking of attacks.","section":"Network Security Fundamentals","module":"Module 16","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":11,"type":"choice","choices":[{"text":"detecting and blocking of attacks in real time","correct":true},{"text":"connecting global threat information to Cisco network security devices","correct":false},{"text":"authenticating and validating traffic","correct":false},{"text":"filtering of nefarious websites","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":19,"question":"A user is redesigning a network for a small company and wants to ensure security at a reasonable price. The user deploys a new application-aware firewall with intrusion detection capabilities on the ISP connection. The user installs a second firewall to separate the company network from the public network. Additionally, the user installs an IPS on the internal network of the company. What approach is the user implementing?","explanation":"Topic 16.3.1 Using different defenses at various points of the network creates a layered approach.","section":"Network Security Fundamentals","module":"Module 16","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":11,"type":"choice","choices":[{"text":"attack based","correct":false},{"text":"risk based","correct":false},{"text":"structured","correct":false},{"text":"layered","correct":true}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":20,"question":"What is an accurate description of redundancy?","explanation":"Topic 17.1.4 Redundancy attempts to remove any single point of failure in a network by using multiple physically cabled paths between switches in the network.","section":"Build a Small Network","module":"Module 17","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":11,"type":"choice","choices":[{"text":"configuring a router with a complete MAC address database to ensure that all frames can be forwarded to the correct destination","correct":false},{"text":"configuring a switch with proper security to ensure that all traffic forwarded through an interface is filtered","correct":false},{"text":"designing a network to use multiple virtual devices to ensure that all traffic uses the best path through the internetwork","correct":false},{"text":"designing a network to use multiple paths between switches to ensure there is no single point of failure","correct":true}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":21,"question":"A network administrator is upgrading a small business network to give high priority to real-time applications traffic. What two types of network services is the network administrator trying to accommodate? (Choose two.)","explanation":"Topic 17.1.5 Streaming media, such as video, and voice traffic, are both examples of real-time traffic. Real-time traffic needs higher priority through the network than other types of traffic because it is very sensitive to network delay and latency.","section":"Build a Small Network","module":"Module 17","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":12,"type":"choice","choices":[{"text":"voice","correct":true},{"text":"video","correct":true},{"text":"instant messaging","correct":false},{"text":"FTP","correct":false},{"text":"SNMP","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":22,"question":"What is the purpose of a small company using a protocol analyzer utility to capture network traffic on the network segments where the company is considering a network upgrade?","explanation":"Topic 17.3.2 An important prerequisite for considering network growth is to understand the type and amount of traffic that is crossing the network as well as the current traffic flow. By using a protocol analyzer in each network segment, the network administrator can document and analyze the network traffic pattern for each segment, which becomes the base in determining the needs and means of the network growth.","section":"Build a Small Network","module":"Module 17","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":12,"type":"choice","choices":[{"text":"to identify the source and destination of local network traffic","correct":false},{"text":"to capture the Internet connection bandwidth requirement","correct":false},{"text":"to document and analyze network traffic requirements on each network segment","correct":true},{"text":"to establish a baseline for security analysis after the network is upgraded","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":23,"question":"Refer to the exhibit. An administrator is testing connectivity to a remote device with the IP address 10.1.1.1. What does the output of this command indicate?","explanation":"Topic 17.4.1 In the output of the ping command, an exclamation mark (!) indicates a response was successfully received, a period (.) indicates that the connection timed out while waiting for a reply, and the letter “U” indicates that a router along the path did not have a route to the destination and sent an ICMP destination unreachable message back to the source.","section":"Build a Small Network","module":"Module 17","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":13,"type":"choice","choices":[{"text":"Connectivity to the remote device was successful.","correct":false},{"text":"A router along the path did not have a route to the destination.","correct":true},{"text":"A ping packet is being blocked by a security device along the path.","correct":false},{"text":"The connection timed out while waiting for a reply from the remote device.","correct":false}],"images":["assets/question-images/ccna-1-v7-modules-16-17-building-and-securing-a-small-network-exam-answers-p13-3b3acf6cde9b.png"],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":24,"question":"Which method is used to send a ping message specifying the source address for the ping?","explanation":"Topic 17.4.2 By issuing the ping command without a destination IP address in privileged EXEC mode, the Cisco IOS enters extended ping mode. This allows the user to implement extended commands which include source IP address.","section":"Build a Small Network","module":"Module 17","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":13,"type":"choice","choices":[{"text":"Issue the ping command from within interface configuration mode.","correct":false},{"text":"Issue the ping command without specifying a destination IP address.","correct":true},{"text":"Issue the ping command without extended commands.","correct":false},{"text":"Issue the ping command after shutting down un-needed interfaces.","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":25,"question":"A network engineer is analyzing reports from a recently performed network baseline. Which situation would depict a possible latency issue?","explanation":"Topic 17.4.1 While analyzing historical reports an administrator can compare host-to-host timers from the ping command and depict possible latency issues.","section":"Build a Small Network","module":"Module 17","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":14,"type":"choice","choices":[{"text":"a change in the bandwidth according to the show interfaces output","correct":false},{"text":"a next-hop timeout from a traceroute","correct":false},{"text":"an increase in host-to-host ping response times","correct":true},{"text":"a change in the amount of RAM according to the show version output","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":26,"question":"Which statement is true about Cisco IOS ping indicators?","explanation":"Topic 17.4.1 The most common indicators of a ping issued from the Cisco IOS are “!”, “.”, and “U”. The “!” indicates that the ping completed successfully, verifying connectivity at Layer 3. The “.” may indicate that a connectivity problem, routing problem, or device security issue exists along the path and that an ICMP destination unreachable message was not provided. The “U” indicates that a router along the path may not have had a route to the destination address, and that it responded with an ICMP unreachable message.","section":"Build a Small Network","module":"Module 17","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":14,"type":"choice","choices":[{"text":"‘!’ indicates that the ping was unsuccessful and that the device may have issues finding a DNS server.","correct":false},{"text":"‘U’ may indicate that a router along the path did not contain a route to the destination address and that the ping was unsuccessful.","correct":true},{"text":"‘.’ indicates that the ping was successful but the response time was longer than normal.","correct":false},{"text":"A combination of ‘.’ and ‘!’ indicates that a router along the path did not have a route to the destination address and responded with an ICMP unreachable message.","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":27,"question":"A user reports a lack of network connectivity. The technician takes control of the user machine and attempts to ping other computers on the network and these pings fail. The technician pings the default gateway and that also fails. What can be determined for sure by the results of these tests?","explanation":"Topic 17.4.1 In networks today, a failed ping could mean that the other devices on the network are blocking pings. Further investigation such as checking network connectivity from other devices on the same network is warranted.","section":"Build a Small Network","module":"Module 17","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":15,"type":"choice","choices":[{"text":"The NIC in the PC is bad.","correct":false},{"text":"The TCP/IP protocol is not enabled.","correct":false},{"text":"The router that is attached to the same network as the workstation is down.","correct":false},{"text":"Nothing can be determined for sure at this point.","correct":true}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":28,"question":"A network technician issues the C:> tracert -6 www.cisco.com command on a Windows PC. What is the purpose of the -6 command option?","explanation":"Topic 17.4.3 The -6 option in the command C:> tracert -6 www.cisco.com is used to force the trace to use IPv6.","section":"Build a Small Network","module":"Module 17","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":15,"type":"choice","choices":[{"text":"It forces the trace to use IPv6.","correct":true},{"text":"It limits the trace to only 6 hops.","correct":false},{"text":"It sets a 6 milliseconds timeout for each replay.","correct":false},{"text":"It sends 6 probes within each TTL time period.","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":29,"question":"Why would a network administrator use the tracert utility?","explanation":"Topic 17.4.3 The tracert utility is used to identify the path a packet takes from source to destination. Tracert is commonly used when packets are dropped or not reaching a specific destination.","section":"Build a Small Network","module":"Module 17","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":16,"type":"choice","choices":[{"text":"to determine the active TCP connections on a PC","correct":false},{"text":"to check information about a DNS name in the DNS server","correct":false},{"text":"to identify where a packet was lost or delayed on a network","correct":true},{"text":"to display the IP address, default gateway, and DNS server address for a PC","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":30,"question":"A ping fails when performed from router R1 to directly connected router R2. The network administrator then proceeds to issue the show cdp neighbors command. Why would the network administrator issue this command if the ping failed between the two routers?","explanation":"Topic 17.5.6 The show cdp neighbors command can be used to prove that Layer 1 and Layer 2 connectivity exists between two Cisco devices. For example, if two devices have duplicate IP addresses, a ping between the devices will fail, but the output of show cdp neighbors will be successful. The show cdp neighbors detail could be used to verify the IP address of the directly connected device in case the same IP address is assigned to the two routers.","section":"Build a Small Network","module":"Module 17","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":16,"type":"choice","choices":[{"text":"The network administrator suspects a virus because the ping command did not work.","correct":false},{"text":"The network administrator wants to verify Layer 2 connectivity.","correct":true},{"text":"The network administrator wants to verify the IP address configured on router R2.","correct":false},{"text":"The network administrator wants to determine if connectivity can be established from a non-directly connected network.","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":31,"question":"A network engineer is troubleshooting connectivity issues among interconnected Cisco routers and switches. Which command should the engineer use to find the IP address information, host name, and IOS version of neighboring network devices?","explanation":"Topic 17.5.6 The show cdp neighbors detail command reveals much information about neighboring Cisco devices, including the IP address, the capabilities, host name, and IOS version. The show interfaces and show version commands display information about the local device.","section":"Build a Small Network","module":"Module 17","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":16,"type":"choice","choices":[{"text":"show version","correct":false},{"text":"show ip route","correct":false},{"text":"show interfaces","correct":false},{"text":"show cdp neighbors detail","correct":true}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":32,"question":"What information about a Cisco router can be verified using the show version command?","explanation":"Topic 17.5.5 The value of the configuration register can be verified with the show version command.","section":"Build a Small Network","module":"Module 17","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":17,"type":"choice","choices":[{"text":"the routing protocol version that is enabled","correct":false},{"text":"the value of the configuration register","correct":true},{"text":"the operational status of serial interfaces","correct":false},{"text":"the administrative distance used to reach networks","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":33,"question":"Which command should be used on a Cisco router or switch to allow log messages to be displayed on remotely connected sessions using Telnet or SSH?","explanation":"Topic 17.6.4 The command is very important to use when log messages appear. Log messages appear by default when a user is directly consoled into a Cisco device, but require the terminal monitor command to be entered when a user is accessing a network device remotely. terminal monitor","section":"Build a Small Network","module":"Module 17","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":17,"type":"choice","choices":[{"text":"debug all","correct":false},{"text":"logging synchronous","correct":false},{"text":"show running-config","correct":false},{"text":"terminal monitor","correct":true}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":34,"question":"Which command can an administrator issue on a Cisco router to send debug messages to the vty lines?","explanation":"Topic 17.6.4 Debug messages, like other IOS log messages, are sent to the console line by default. Sending these messages to the terminal lines requires the terminal monitor command.","section":"Build a Small Network","module":"Module 17","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":18,"type":"choice","choices":[{"text":"terminal monitor","correct":true},{"text":"logging console","correct":false},{"text":"logging buffered","correct":false},{"text":"logging synchronous","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":35,"question":"By following a structured troubleshooting approach, a network administrator identified a network issue after a conversation with the user. What is the next step that the administrator should take?","explanation":"Topic 17.6.1 A structured network troubleshooting approach should include these steps in sequence: 1. Identify the problem. 2. Establish a theory of probable causes. 3. Test the theory to determine cause. 4. Establish a plan of action to resolve the issue. 5. Verify full system functionality and implement preventive measures. 6. Document findings, actions, and outcomes.","section":"Build a Small Network","module":"Module 17","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":18,"type":"choice","choices":[{"text":"Verify full system functionality.","correct":false},{"text":"Test the theory to determine cause.","correct":false},{"text":"Establish a theory of probable causes.","correct":true},{"text":"Establish a plan of action to resolve the issue.","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":36,"question":"Users are complaining that they are unable to browse certain websites on the Internet. An administrator can successfully ping a web server via its IP address, but cannot browse to the domain name of the website. Which troubleshooting tool would be most useful in determining where the problem is?","explanation":"Topic 17.7.5 The nslookup command can be used to look up information about a particular DNS name in the DNS server. The information includes the IP address of the DNS server being used as well as the IP address associated with the specified DNS name. This command can help verify the DNS that is used and if the domain name to IP address resolution works.","section":"Build a Small Network","module":"Module 17","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":18,"type":"choice","choices":[{"text":"netstat","correct":false},{"text":"tracert","correct":false},{"text":"nslookup","correct":true},{"text":"ipconfig","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":37,"question":"An employee complains that a Windows PC cannot connect to the Internet. A network technician issues the ipconfig command on the PC and is shown an IP address of 169.254.10.3. Which two conclusions can be drawn? (Choose two.)","explanation":"Topic 17.7.3 When a Windows PC is configured to obtain an IP address automatically, the PC will try to obtain an IP address from a DHCP server. When the PC cannot contact a DHCP server, Windows will automatically assign an address belonging to the 169.254.0.0/16 range.","section":"Build a Small Network","module":"Module 17","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":19,"type":"choice","choices":[{"text":"The PC cannot contact a DHCP server.","correct":true},{"text":"The DNS server address is misconfigured.","correct":false},{"text":"The default gateway address is not configured.","correct":false},{"text":"The PC is configured to obtain an IP address automatically.","correct":true},{"text":"The enterprise network is misconfigured for dynamic routing.","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":38,"question":"Refer to the exhibit. Host H3 is having trouble communicating with host H1. The network administrator suspects a problem exists with the H3 workstation and wants to prove that there is no problem with the R2 configuration. What tool could the network administrator use on router R2 to prove that communication exists to host H1 from the interface on R2, which is the interface that H3 uses when communicating with remote networks?","explanation":"Topic 17.4.2 An extended ping allows an administrator to select specific ping features. For example in this situation, the network administrator could do an extended ping and specify a source address of the gigabit Ethernet port on the router. The destination address would be the IP address of host H1. If the ping succeeds connectivity exists from the Ethernet router interface on R2 to device H1.","section":"Build a Small Network","module":"Module 17","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":20,"type":"choice","choices":[{"text":"traceroute","correct":false},{"text":"show cdp neighbors","correct":false},{"text":"Telnet","correct":false},{"text":"an extended ping","correct":true}],"images":["assets/question-images/ccna-1-v7-modules-16-17-building-and-securing-a-small-network-exam-answers-p20-3169476c2ed5.png"],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":39,"question":"Refer to the exhibit. Baseline documentation for a small company had ping round trip time statistics of 36/97/132 between hosts H1 and H3. Today the network administrator checked connectivity by pinging between hosts H1 and H3 that resulted in a round trip time of 1458/2390/6066. What does this indicate to the network administrator?","explanation":"Topic 17.4.5 Ping round trip time statistics are shown in milliseconds. The larger the number the more delay. A baseline is critical in times of slow performance. By looking at the documentation for the performance when the network is performing fine and comparing it to information when there is a problem, a network administrator can resolve problems faster.","section":"Build a Small Network","module":"Module 17","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":20,"type":"choice","choices":[{"text":"Connectivity between H1 and H3 is fine.","correct":false},{"text":"H3 is not connected properly to the network.","correct":false},{"text":"Something is causing interference between H1 and R1.","correct":false},{"text":"Performance between the networks is within expected parameters.","correct":false},{"text":"Something is causing a time delay between the networks.","correct":true}],"images":["assets/question-images/ccna-1-v7-modules-16-17-building-and-securing-a-small-network-exam-answers-p20-3169476c2ed5.png"],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":40,"question":"Which network service automatically assigns IP addresses to devices on the network?","explanation":"Topic 17.2.2 Dynamic Host Configuration Protocol (DHCP) can be used to allow end devices to automatically configure IP information, such as their IP address, subnet mask, DNS server, and default gateway. The DNS service is used to provide domain name resolution, mapping hostnames to IP addresses. Telnet is a method for remotely accessing a CLI session of a switch or router. Traceroute is a command used to determine the path a packet takes as it traverses the network.","section":"Build a Small Network","module":"Module 17","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":21,"type":"choice","choices":[{"text":"DHCP","correct":true},{"text":"Telnet","correct":false},{"text":"DNS","correct":false},{"text":"traceroute","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":41,"question":"Which command can an administrator execute to determine what interface a router will use to reach remote networks?","explanation":"Topic 17.5.5 The show ip route command is used to display the IP routing table of the router. The IP routing table will show a list of known local and remote networks and the interfaces that the router will use to reach those networks.","section":"Build a Small Network","module":"Module 17","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":22,"type":"choice","choices":[{"text":"show arp","correct":false},{"text":"show interfaces","correct":false},{"text":"show ip route","correct":true},{"text":"show protocols","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":42,"question":"On which two interfaces or ports can security be improved by configuring executive timeouts? (Choose two.)","explanation":"Topic 16.4.3 Executive timeouts allow the Cisco device to automatically disconnect users after they have been idle for the specified time. Console, vty, and aux ports can be configured with executive timeouts.","section":"Network Security Fundamentals","module":"Module 16","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":22,"type":"choice","choices":[{"text":"Fast Ethernet interfaces","correct":false},{"text":"console ports","correct":true},{"text":"serial interfaces","correct":false},{"text":"vty ports","correct":true},{"text":"loopback interfaces","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":43,"question":"When configuring SSH on a router to implement secure network management, a network engineer has issued the login local and transport input ssh line vty commands. What three additional configuration actions have to be performed to complete the SSH configuration? (Choose three.)","explanation":"Topic 16.4.4 SSH is automatically enabled after the RSA keys are generated. Setting user privilege levels and configuring role-based CLI access are good security practices but are not a requirement of implementing SSH.","section":"Network Security Fundamentals","module":"Module 16","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":22,"type":"choice","choices":[{"text":"Set the user privilege levels.","correct":false},{"text":"Generate the asymmetric RSA keys.","correct":true},{"text":"Configure the correct IP domain name.","correct":true},{"text":"Configure role-based CLI access.","correct":false},{"text":"Create a valid local username and password database.","correct":true},{"text":"Manually enable SSH after the RSA keys are generated.","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":44,"question":"What is considered the most effective way to mitigate a worm attack?","explanation":"Topic 16.3.3 Because worms take advantage of vulnerabilities in the system itself, the most effective way to mitigate worm attacks is to download security updates from the operating system vendor and patch all vulnerable systems.","section":"Network Security Fundamentals","module":"Module 16","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":23,"type":"choice","choices":[{"text":"Change system passwords every 30 days.","correct":false},{"text":"Ensure that all systems have the most current virus definitions.","correct":false},{"text":"Ensure that AAA is configured in the network.","correct":false},{"text":"Download security updates from the operating system vendor and patch all vulnerable systems.","correct":true}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":45,"question":"Which statement describes the ping and tracert commands?","explanation":"Topic 17.4.1 The ping utility tests end-to-end connectivity between the two hosts. However, if the message does not reach the destination, there is no way to determine where the problem is located. On the other hand, the traceroute utility ( tracert in Windows) traces the route a message takes from its source to the destination. Traceroute displays each hop along the way and the time it takes for the message to get to that network and back.","section":"Build a Small Network","module":"Module 17","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":23,"type":"choice","choices":[{"text":"Tracert shows each hop, while ping shows a destination reply only.","correct":true},{"text":"Tracert uses IP addresses; ping does not.","correct":false},{"text":"Both ping and tracert can show results in a graphical display.","correct":false},{"text":"Ping shows whether the transmission is successful; tracert does not.","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":46,"question":"A technician is to document the current configurations of all network devices in a college, including those in off- site buildings. Which protocol would be best to use to securely access the network devices?","explanation":"Topic 16.4.4 Telnet sends passwords and other information in clear text, while SSH encrypts its data. FTP and HTTP do not provide remote device access for configuration purposes.","section":"Network Security Fundamentals","module":"Module 16","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":24,"type":"choice","choices":[{"text":"FTP","correct":false},{"text":"HTTP","correct":false},{"text":"SSH","correct":true},{"text":"Telnet","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":47,"question":"Open the PT Activity. Perform the tasks in the activity instructions and then answer the question. Which command has to be configured on the router to complete the SSH configuration?","explanation":"Topic 16.4.4 The missing command to complete the SSH configuration is transport input ssh in line vty 0 4 mode.The commands service password-encryption and enable secret class do configure secure features on the router, but are not required to configure SSH. The command ip domain-name cisco.com is not required because the command i p domain-name span.com has been used.","section":"Network Security Fundamentals","module":"Module 16","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":24,"type":"choice","choices":[{"text":"service password-encryption","correct":false},{"text":"transport input ssh","correct":true},{"text":"enable secret class","correct":false},{"text":"ip domain-name cisco.com","correct":false}],"images":["assets/question-images/ccna-1-v7-modules-16-17-building-and-securing-a-small-network-exam-answers-p24-901f8c103c4e.png"],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":48,"question":"An administrator decides to use “WhatAreyouwaiting4” as the password on a newly installed router. Which statement applies to the password choice?","explanation":"Topic 16.4.2","section":"Network Security Fundamentals","module":"Module 16","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":25,"type":"choice","choices":[{"text":"It is strong because it uses a passphrase.","correct":true},{"text":"It is weak because it is often the default password on new devices.","correct":false},{"text":"It is weak since it uses easily found personal information.","correct":false},{"text":"It is weak since it is a word that is easily found in the dictionary.","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":49,"question":"An administrator decides to use “pR3s!d7n&0” as the password on a newly installed router. Which statement applies to the password choice?","explanation":"Topic 16.4.2","section":"Network Security Fundamentals","module":"Module 16","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":26,"type":"choice","choices":[{"text":"It is strong because it uses a minimum of 10 numbers, letters and special characters.","correct":true},{"text":"It is weak because it is often the default password on new devices.","correct":false},{"text":"It is weak since it uses easily found personal information.","correct":false},{"text":"It is weak since it is a word that is easily found in the dictionary.","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":50,"question":"An administrator decides to use “5$7*4#033!” as the password on a newly installed router. Which statement applies to the password choice?","explanation":"Topic 16.4.2","section":"Network Security Fundamentals","module":"Module 16","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":26,"type":"choice","choices":[{"text":"It is strong because it contains 10 numbers and special characters.","correct":true},{"text":"It is weak because it is often the default password on new devices.","correct":false},{"text":"It is weak since it uses easily found personal information.","correct":false},{"text":"It is strong because it uses a minimum of 10 numbers, letters and special characters.","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":52,"question":"An administrator decides to use “12345678!” as the password on a newly installed router. Which statement applies to the password choice?","explanation":"Topic 16.4.1","section":"Network Security Fundamentals","module":"Module 16","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":27,"type":"choice","choices":[{"text":"It is weak because it uses a series of numbers or letters.","correct":true},{"text":"It is strong because it uses a passphrase.","correct":false},{"text":"It is weak since it is a word that is easily found in the dictionary.","correct":false},{"text":"It is strong because it uses a minimum of 10 numbers, letters and special characters.","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":53,"question":"An administrator decides to use “admin” as the password on a newly installed router. Which statement applies to the password choice?","explanation":"Topic 16.4.1","section":"Network Security Fundamentals","module":"Module 16","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":27,"type":"choice","choices":[{"text":"It is weak because it is often the default password on new devices.","correct":true},{"text":"It is strong because it uses a passphrase.","correct":false},{"text":"It is strong because it uses a minimum of 10 numbers, letters and special characters.","correct":false},{"text":"It is strong because it contains 10 numbers and special characters.","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":54,"question":"An administrator decides to use “Feb121978” as the password on a newly installed router. Which statement applies to the password choice?","explanation":"Topic 16.4.2","section":"Network Security Fundamentals","module":"Module 16","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":27,"type":"choice","choices":[{"text":"It is weak because it uses easily found personal information.","correct":true},{"text":"It is strong because it uses a passphrase.","correct":false},{"text":"It is weak since it is a word that is easily found in the dictionary.","correct":false},{"text":"It is strong because it uses a minimum of 10 numbers, letters and special characters.","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":55,"question":"An administrator decides to use “password” as the password on a newly installed router. Which statement applies to the password choice?","explanation":"Topic 16.4.1","section":"Network Security Fundamentals","module":"Module 16","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":28,"type":"choice","choices":[{"text":"It is weak because it is a commonly used password.","correct":true},{"text":"It is weak since it is a word that is easily found in the dictionary.","correct":false},{"text":"It is strong because it uses a passphrase.","correct":false},{"text":"It is strong because it uses a minimum of 10 numbers, letters and special characters.","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":56,"question":"An administrator decides to use “RobErT” as the password on a newly installed router. Which statement applies to the password choice?","explanation":"Topic 16.4.2","section":"Network Security Fundamentals","module":"Module 16","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":28,"type":"choice","choices":[{"text":"It is weak since it uses easily found personal information.","correct":true},{"text":"It is strong because it uses a passphrase.","correct":false},{"text":"It is strong because it uses a minimum of 10 numbers, letters and special characters.","correct":false},{"text":"It is strong because it contains 10 numbers and special characters.","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":57,"question":"An administrator decides to use “Elizabeth” as the password on a newly installed router. Which statement applies to the password choice?","explanation":"Topic 16.4.2 Rules for strong passwords: * minimum of 8 characters, preferably 10. * use complex combinations of numbers, special characters, and upper and lower case letters. * avoid repetition, common dictionary words, letter or number sequences. * avoid names of children, relatives, pets, birthdays, or any easily identifiable personal information. * can be created by misspelling words or replacing vowels with numbers or special characters.","section":"Network Security Fundamentals","module":"Module 16","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":28,"type":"choice","choices":[{"text":"It is weak because it uses easily found personal information.","correct":true},{"text":"It is strong because it uses a passphrase.","correct":false},{"text":"It is weak since it is a word that is easily found in the dictionary.","correct":false},{"text":"It is strong because it uses a minimum of 10 numbers, letters and special characters.","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":58,"question":"A network technician is troubleshooting an issue and needs to verify the IP addresses of all interfaces on a router. What is the best command to use to accomplish the task?","explanation":"Topic 17.5.7","section":"Build a Small Network","module":"Module 17","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":29,"type":"choice","choices":[{"text":"show ip interface brief","correct":true},{"text":"nslookup","correct":false},{"text":"ipconfig getifaddr en0","correct":false},{"text":"show ip route","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":59,"question":"Students who are connected to the same switch are having slower than normal response times. The administrator suspects a duplex setting issue. What is the best command to use to accomplish the task?","explanation":"Topic 17.7.1","section":"Build a Small Network","module":"Module 17","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":29,"type":"choice","choices":[{"text":"show interfaces","correct":true},{"text":"ipconfig getifaddr en0","correct":false},{"text":"copy running-config startup-config","correct":false},{"text":"show ip nat translations","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":60,"question":"A user wants to know the IP address of the PC. What is the best command to use to accomplish the task?","explanation":"Topic 17.5.1","section":"Build a Small Network","module":"Module 17","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":30,"type":"choice","choices":[{"text":"ipconfig","correct":true},{"text":"copy running-config startup-config","correct":false},{"text":"show interfaces","correct":false},{"text":"show ip nat translations","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":61,"question":"A student wants to save a router configuration to NVRAM. What is the best command to use to accomplish the task?","explanation":"Topic 17.5.1","section":"Build a Small Network","module":"Module 17","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":30,"type":"choice","choices":[{"text":"copy running-config startup-config","correct":true},{"text":"show interfaces","correct":false},{"text":"show ip nat translations","correct":false},{"text":"show ip route","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":62,"question":"A support technician needs to know the IP address of the wireless interface on a MAC. What is the best command to use to accomplish the task?","explanation":"Topic 17.5.3","section":"Build a Small Network","module":"Module 17","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":30,"type":"choice","choices":[{"text":"ipconfig getifaddr en0","correct":true},{"text":"copy running-config startup-config","correct":false},{"text":"show interfaces","correct":false},{"text":"show ip nat translations","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":63,"question":"A network technician is troubleshooting an issue and needs to verify all of the IPv6 interface addresses on a router. What is the best command to use to accomplish the task?","explanation":"Topic 17.5.5","section":"Build a Small Network","module":"Module 17","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":30,"type":"choice","choices":[{"text":"show ipv6 interface","correct":true},{"text":"show interfaces","correct":false},{"text":"show ip nat translations","correct":false},{"text":"show ip route","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":64,"question":"A teacher is having difficulties connecting his PC to the classroom network. He needs to verify that a default gateway is configured correctly. What is the best command to use to accomplish the task?","explanation":"Topic 17.5.1","section":"Build a Small Network","module":"Module 17","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":31,"type":"choice","choices":[{"text":"ipconfig","correct":true},{"text":"copy running-config startup-config","correct":false},{"text":"show interfaces","correct":false},{"text":"show ip nat translations","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":65,"question":"Only employees connected to IPv6 interfaces are having difficulty connecting to remote networks. The analyst wants to verify that IPv6 routing has been enabled. What is the best command to use to accomplish the task?","explanation":"Topic 17.7.2","section":"Build a Small Network","module":"Module 17","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":31,"type":"choice","choices":[{"text":"show running-config","correct":true},{"text":"show interfaces","correct":false},{"text":"copy running-config startup-config","correct":false},{"text":"show ip nat translations","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":66,"question":"An administrator is troubleshooting connectivity issues and needs to determine the IP address of a website. What is the best command to use to accomplish the task?","explanation":"Topic 17.7.5","section":"Build a Small Network","module":"Module 17","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":31,"type":"choice","choices":[{"text":"nslookup","correct":true},{"text":"show ipv6 route","correct":false},{"text":"show ipv6 interface","correct":false},{"text":"copy startup-config running-config","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":67,"question":"What is a characteristic of UDP?","explanation":"Topic 17.8 UDP has no way to reorder the datagrams into their transmission order, so UDP simply reassembles the data in the order it was received and forwards it to the application.","section":"Build a Small Network","module":"Module 17","source":"Modules 16-17: Building and Securing a Small Network Exam","sourceFile":"CCNA 1 v7 Modules 16 - 17_ Building and Securing a Small Network Exam Answers.pdf","sourcePage":31,"type":"choice","choices":[{"text":"UDP datagrams take the same path and arrive in the correct order at the destination.","correct":false},{"text":"Applications that use UDP are always considered unreliable.","correct":false},{"text":"UDP reassembles the received datagrams in the order they were received.","correct":true},{"text":"UDP only passes data to the network when the destination is ready to receive the data.","correct":false}],"images":[],"sources":["Modules 16-17: Building and Securing a Small Network Exam"]},{"number":1,"question":"Which two traffic types use the Real-Time Transpor
