. A buffer overflow occurs when a program attempts to store more data in a memory location than it can hold.","section":"Network Security Fundamentals","module":"Module 16","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":43,"type":"choice","choices":[{"text":"brute-force attack","correct":false},{"text":"Trojan horse","correct":true},{"text":"DoS","correct":false},{"text":"buffer overflow","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":69,"question":"Which frame field is created by a source node and used by a destination node to ensure that a transmitted data signal has not been altered by interference, distortion, or signal loss?","explanation":"Topic 6.3.2 The frame check sequence (FCS) field is a critical part of the data link layer frame trailer used for error detection . During the encapsulation process, a source node performs a mathematical calculation known as a cyclic redundancy check (CRC) on the frame’s contents and places the resulting value into the FCS field. The destination node performs the same calculation upon receiving the frame; if the results do not match the value in the FCS field, it indicates that the data has been altered during transmission. This alteration is often caused by external physical factors such as interference, distortion, or signal loss occurring on the network media. By identifying these discrepancies, the data link layer can reject and discard corrupt frames to ensure that only valid data is passed up to the higher layers of the protocol stack.","section":"Data Link Layer","module":"Module 6","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":44,"type":"choice","choices":[{"text":"User Datagram Protocol field","correct":false},{"text":"transport layer error check field","correct":false},{"text":"flow control field","correct":false},{"text":"frame check sequence field","correct":true},{"text":"error correction process field","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":70,"question":"A network administrator is adding a new LAN to a branch office. The new LAN must support 4 connected devices. What is the smallest network mask that the network administrator can use for the new network?","explanation":"Topic 11.7.2 To support a LAN with 4 connected devices, the network administrator must select a subnet mask that provides a sufficient number of usable host addresses while minimizing wasted address space. The number of usable hosts is calculated using the formula 2 n −2, where n represents the number of host bits remaining in the mask. A subnet mask of 255.255.255.248 (which corresponds to a /29 prefix ) leaves 3 bits for the host portion, providing 6 usable host addresses . This is the most efficient (smallest) mask among the choices because it satisfies the requirement for 4 devices while leaving fewer unused addresses compared to 255.255.255.192 (/26), 255.255.255.128 (/25), or 255.255.255.0 (/24), which provide 62, 126, and 254 usable addresses respectively.","section":"IPv4 Addressing","module":"Module 11","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":44,"type":"choice","choices":[{"text":"255.255.255.248","correct":true},{"text":"255.255.255.0","correct":false},{"text":"255.255.255.128","correct":false},{"text":"255.255.255.192","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":71,"question":"What service is provided by POP3?","explanation":"Topic 15.3.4 The Post Office Protocol version 3 (POP3) is an application layer protocol designed to enable email clients to retrieve messages from a mail server. According to the sources, the default operation of POP3 is to download the email to the client’s local application and then delete it from the server . This service operates over TCP port 110 and is specifically intended for message retrieval, distinguishing it from SMTP, which is used for sending mail, and IMAP, which typically maintains messages on the server.","section":"Application Layer","module":"Module 15","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":45,"type":"choice","choices":[{"text":"Retrieves email from the server by downloading the email to the local mail application of the client.","correct":true},{"text":"An application that allows real-time chatting among remote users.","correct":false},{"text":"Allows remote access to network devices and servers.","correct":false},{"text":"Uses encryption to provide secure remote access to network devices and servers.","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":72,"question":"What two security solutions are most likely to be used only in a corporate environment? (Choose two.)","explanation":"Topic 1.8.2 While basic security measures like antivirus, antispyware, and firewall filtering are implemented in both home and corporate environments, corporate networks have advanced requirements due to their complexity. According to the sources, intrusion prevention systems (IPS) are specifically used in these larger environments to identify and stop fast-spreading threats like zero-day attacks. Similarly, virtual private networks (VPN) are corporate- level solutions that provide remote workers with secure, encrypted access into the organization’s private network. These components are part of a layered defense-in- depth approach used to protect vital business assets.","section":"Networking Today","module":"Module 1","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":45,"type":"choice","choices":[{"text":"antispyware","correct":false},{"text":"virtual private networks","correct":true},{"text":"intrusion prevention systems","correct":true},{"text":"strong passwords","correct":false},{"text":"antivirus software","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":73,"question":"What characteristic describes antivirus software?","explanation":"Topic 1.8.2 Antivirus and antispyware are applications used to protect end devices (such as PCs, laptops, and smartphones) from being compromised or infected with malicious software . These tools are considered basic security components for both home and small office networks and are often required by corporate security policies to maintain endpoint integrity. While other security measures like firewalls or VPNs focus on network-level protection, antivirus software operates directly on the host to mitigate threats from viruses, worms, and other malware.","section":"Networking Today","module":"Module 1","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":46,"type":"choice","choices":[{"text":"applications that protect end devices from becoming infected with malicious software","correct":true},{"text":"a network device that filters access and traffic coming into a network","correct":false},{"text":"a tunneling protocol that provides remote users with secure access into the network of an organization","correct":false},{"text":"software on a router that filters traffic based on IP addresses or applications","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":74,"question":"What mechanism is used by a router to prevent a received IPv4 packet from traveling endlessly on a network?","explanation":"Topic 8.2.2 To prevent an IPv4 packet to travel in the network endlessly, TCP/IP protocols use ICMPv4 protocol to provide feedback about issues. When a router receives a packet and decrements the TTL field in the IPv4 packet by 1 and if the result is zero, it discards the packet and sends a Time Exceeded message to the source host.","section":"Network Layer","module":"Module 8","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":47,"type":"choice","choices":[{"text":"It checks the value of the TTL field and if it is 0, it discards the packet and sends a Destination Unreachable message to the source host.","correct":false},{"text":"It checks the value of the TTL field and if it is 100, it discards the packet and sends a Destination Unreachable message to the source host.","correct":false},{"text":"It decrements the value of the TTL field by 1 and if the result is 0, it discards the packet and sends a Time Exceeded message to the source host.","correct":true},{"text":"It increments the value of the TTL field by 1 and if the result is 100, it discards the packet and sends a Parameter Problem message to the source host.","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":75,"question":"A client packet is received by a server. The packet has a destination port number of 69. What service is the client requesting?","explanation":"Topic 14.4.3 The transport layer uses port numbers to identify and direct data to specific applications or services on a host. According to the standard assignments for well-known ports, port 69 is reserved for the Trivial File Transfer Protocol (TFTP) . TFTP is a simple, connectionless protocol that utilizes UDP for best-effort, unacknowledged file delivery, requiring less overhead than FTP. When a server receives a packet with destination port 69, it identifies the request as a client seeking to use this specific file transfer service.","section":"Transport Layer","module":"Module 14","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":47,"type":"choice","choices":[{"text":"DNS","correct":false},{"text":"DHCP","correct":false},{"text":"SMTP","correct":false},{"text":"TFTP","correct":true}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":76,"question":"An administrator defined a local user account with a secret password on router R1 for use with SSH. Which three additional steps are required to configure R1 to accept only encrypted SSH connections? (Choose three.)","explanation":"Topic 16.4.4 To successfully transition a router from insecure Telnet to encrypted SSH, specific configuration steps must be followed according to the sources. Since the local user account is already created, the next requirement is to configure the IP domain name , which is essential for the key generation process. The administrator must then generate the SSH keys (typically RSA keys) using the crypto key generate rsa command to provide the foundation for session encryption. Finally, the VTY lines must be updated to enable inbound SSH sessions via the transport input ssh command. This last step is crucial because it ensures the router only accepts encrypted connections and rejects insecure plaintext protocols like Telnet.","section":"Network Security Fundamentals","module":"Module 16","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":48,"type":"choice","choices":[{"text":"Configure DNS on the router.","correct":false},{"text":"Generate two-way pre-shared keys.","correct":false},{"text":"Configure the IP domain name on the router.","correct":true},{"text":"Generate the SSH keys.","correct":true},{"text":"Enable inbound vty SSH sessions.","correct":true},{"text":"Enable inbound vty Telnet sessions.","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":77,"question":"Which two functions are performed at the MAC sublayer of the OSI Data Link Layer to facilitate Ethernet communication? (Choose two.)","explanation":"Topic 6.1.2 The OSI data link layer is divided into two sublayers: LLC and MAC . The MAC (Media Access Control) sublayer is responsible for data encapsulation and media access control. Its data encapsulation functions include frame delimiting , which uses bits to identify and synchronize fields within a frame, and error detection , which involves adding a trailer with a frame check sequence (FCS) to identify transmission errors. Other functions, such as identifying the network layer protocol or handling communication between upper-layer software and hardware, are performed by the LLC sublayer. Case 2: places information in the Ethernet frame that identifies which network layer protocol is being encapsulated by the frame adds Ethernet control information to network protocol data responsible for internal structure of Ethernet frame enables IPv4 and IPv6 to utilize the same physical medium implements trailer with frame check sequence for error detection Explanation: Topic 7.1.3 The MAC (Media Access Control) sublayer is responsible for hardware-based data encapsulation and media access. Its specific encapsulation functions include defining the internal structure of the Ethernet frame and providing error detection by implementing a trailer that contains the Frame Check Sequence (FCS) . Other tasks, such as identifying the encapsulated network layer protocol or enabling IPv4 and IPv6 to share the same physical medium, are functions performed by the LLC (Logical Link Control) sublayer . Case 3: integrates Layer 2 flows between 10 Gigabit Ethernet over fiber and 1 Gigabit Ethernet over copper enables IPv4 and IPv6 to utilize the same physical medium handles communication between upper layer networking software and Ethernet NIC hardware adds Ethernet control information to network protocol data implements CSMA/CD over legacy shared half-duplex media Case 4: applies delimiting of Ethernet frame fields to synchronize communication between nodes places information in the Ethernet frame that identifies which network layer protocol is being encapsulated by the frame adds Ethernet control information to network protocol data implements trailer with frame check sequence for error detection handles communication between upper layer networking software and Ethernet NIC hardware Case 5: applies delimiting of Ethernet frame fields to synchronize communication between nodes applies source and destination MAC addresses to Ethernet frame places information in the Ethernet frame that identifies which network layer protocol is being encapsulated by the frame handles communication between upper layer networking software and Ethernet NIC hardware adds Ethernet control information to network protocol data Explanation: Topic 6.1.2","section":"Data Link Layer","module":"Module 6","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":48,"type":"choice","choices":[{"text":"handles communication between upper layer networking software and Ethernet NIC hardware","correct":false},{"text":"implements trailer with frame check sequence for error detection","correct":true},{"text":"places information in the Ethernet frame that identifies which network layer protocol is being encapsulated by the frame","correct":false},{"text":"implements a process to delimit fields within an Ethernet 2 frame","correct":true},{"text":"adds Ethernet control information to network protocol data","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":78,"question":"An IPv6 enabled device sends a data packet with the destination address of FF02::2. What is the target of this packet?","explanation":"Topic 12.7.2 FF02::2 identifies all IPv6 routers that exist on the link or network. FF02::1 is the target for all IPv6 enabled devices on the link or network.","section":"IPv6 Addressing","module":"Module 12","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":51,"type":"choice","choices":[{"text":"all IPv6 enabled devices on the local link","correct":false},{"text":"all IPv6 DHCP servers","correct":false},{"text":"all IPv6 enabled devices across the network","correct":false},{"text":"all IPv6 configured routers on the local link","correct":true}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":79,"question":"What are the three parts of an IPv6 global unicast address? (Choose three.)","explanation":"Topic 12.3.5 The general format for IPv6 global unicast addresses includes a global routing prefix, a subnet ID, and an interface ID. The global routing prefix is the network portion of the address. A typical global routing prefix is /48 assigned by the Internet provider. The subnet ID portion can be used by an organization to create multiple subnetwork numbers. The interface ID is similar to the host portion of an IPv4 address.","section":"IPv6 Addressing","module":"Module 12","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":51,"type":"choice","choices":[{"text":"subnet ID","correct":true},{"text":"subnet mask","correct":false},{"text":"broadcast address","correct":false},{"text":"global routing prefix","correct":true},{"text":"interface ID","correct":true}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":80,"question":"A network administrator is designing the layout of a new wireless network. Which three areas of concern should be accounted for when building a wireless network? (Choose three.)","explanation":"Topic 4.6.1 The three areas of concern for wireless networks focus on the size of the coverage area, any nearby interference, and providing network security. Extensive cabling is not a concern for wireless networks, as a wireless network will require minimal cabling for providing wireless access to hosts. Mobility options are not a component of the areas of concern for wireless networks.","section":"Physical Layer","module":"Module 4","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":51,"type":"choice","choices":[{"text":"extensive cabling","correct":false},{"text":"mobility options","correct":false},{"text":"packet collision","correct":false},{"text":"interference","correct":true},{"text":"security","correct":true},{"text":"coverage area","correct":true}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":81,"question":"A new network administrator has been asked to enter a banner message on a Cisco device. What is the fastest way a network administrator could test whether the banner is properly configured?","explanation":"Topic 2.4.5 While at the privileged mode prompt such as Router#, type exit,press Enter, and the banner message appears. Power cycling a network device that has had the banner motd command issued will also display the banner message, but this is not a quick way to test the configuration.","section":"Basic Switch and End Device Configuration","module":"Module 2","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":52,"type":"choice","choices":[{"text":"Enter CTRL-Z at the privileged mode prompt.","correct":false},{"text":"Exit global configuration mode.","correct":false},{"text":"Power cycle the device.","correct":false},{"text":"Reboot the device.","correct":false},{"text":"Exit privileged EXEC mode and press Enter .","correct":true}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":82,"question":"What method is used to manage contention-based access on a wireless network?","explanation":"Topic 6.2.8 Carrier sense multiple access with collision avoidance (CSMA/CA) is used with wireless networking technology to mediate media contention. Carrier sense multiple access with collision detection (CSMA/CD) is used with wired Ethernet technology to mediate media contention. Priority ordering and token passing are not used (or not a method) for media access control.","section":"Data Link Layer","module":"Module 6","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":52,"type":"choice","choices":[{"text":"token passing","correct":false},{"text":"CSMA/CA","correct":true},{"text":"priority ordering","correct":false},{"text":"CSMA/CD","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":83,"question":"What is a function of the data link layer?","explanation":"Topic 6.1.1 The data link layer (Layer 2) is specifically responsible for the exchange of frames between network interface cards (NICs) over a common local media . It performs this by accepting Layer 3 packets (such as IPv4 or IPv6) and encapsulating them into Layer 2 frames, which include the necessary control information for the local segment. While higher layers focus on end-to-end delivery between remote hosts or formatting data for applications, the data link layer manages how data is placed on and received from the physical medium, ensuring communication between nodes on the same network .","section":"Data Link Layer","module":"Module 6","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":53,"type":"choice","choices":[{"text":"provides the formatting of data","correct":false},{"text":"provides end-to-end delivery of data between hosts","correct":false},{"text":"provides delivery of data between two applications","correct":false},{"text":"provides for the exchange of frames over a common local media","correct":true}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":84,"question":"What is the purpose of the TCP sliding window?","explanation":"Topic 14.6.5 The TCP sliding window allows a destination device to inform a source to slow down the rate of transmission. To do this, the destination device reduces the value contained in the window field of the segment. It is acknowledgment numbers that are used to specify retransmission from a specific point forward. It is sequence numbers that are used to ensure segments arrive in order. Finally, it is a FIN control bit that is used to end a communication session.","section":"Transport Layer","module":"Module 14","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":53,"type":"choice","choices":[{"text":"to ensure that segments arrive in order at the destination","correct":false},{"text":"to end communication when data transmission is complete","correct":false},{"text":"to inform a source to retransmit data from a specific point forward","correct":false},{"text":"to request that a source decrease the rate at which it transmits data","correct":true}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":85,"question":"What characteristic describes spyware?","explanation":"Topic 1.8.1 Spyware is a specific type of malicious software (malware) that is installed on an end device —such as a computer or smartphone—often without the user’s knowledge. Its primary characteristic is that it secretly collects information about the user, which can include browsing habits, personal data, or sensitive credentials. Unlike other attacks that might aim to crash a system or delete data, spyware focuses on stealthily monitoring activity for the purpose of information theft. It is categorized as a common external security threat that requires host-level protection, such as antispyware applications, to mitigate.","section":"Networking Today","module":"Module 1","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":54,"type":"choice","choices":[{"text":"a network device that filters access and traffic coming into a network","correct":false},{"text":"software that is installed on a user device and collects information about the user","correct":true},{"text":"an attack that slows or crashes a device or network service","correct":false},{"text":"the use of stolen credentials to access private data","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":86,"question":"Which switching method drops frames that fail the FCS check?","explanation":"Topic 7.4.1 The FCS check is used with store-and-forward switching to drop any frame with a FCS that does not match the FCS calculation that is made by a switch. Cut-through switching does not perform any error checking. Borderless switching is a network architecture, not a switching method. Ingress port buffering is used with store-and-forward switching to support different Ethernet speeds, but it is not a switching method","section":"Ethernet Switching","module":"Module 7","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":54,"type":"choice","choices":[{"text":"store-and-forward switching","correct":true},{"text":"borderless switching","correct":false},{"text":"ingress port buffering","correct":false},{"text":"cut-through switching","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":87,"question":"Which range of link-local addresses can be assigned to an IPv6-enabled interface?","explanation":"Topic 12.3.7 Link-local addresses are in the range of FE80::/10 to FEBF::/10. The original IPv6 specification defined site- local addresses and used the prefix range FEC0::/10, but these addresses were deprecated by the IETF in favor of unique local addresses. FDEE::/7 is a unique local address because it is in the range of FC00::/7 to FDFF::/7. IPv6 multicast addresses have the prefix FF00::/8.","section":"IPv6 Addressing","module":"Module 12","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":55,"type":"choice","choices":[{"text":"FEC0::/10","correct":false},{"text":"FDEE::/7","correct":false},{"text":"FE80::/10","correct":true},{"text":"FF00::/8","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":88,"question":"What service is provided by FTP?","explanation":"Topic 15.5.1 The File Transfer Protocol (FTP) is an application layer protocol specifically designed to allow for data transfers between a client and a server. It sets the rules that enable a user on one host to access, upload (push) , and download (pull) files to and from another host over a network. FTP is a reliable and connection-oriented protocol that utilizes TCP services, establishing a control connection on port 21 and a separate data connection on port 20 for the actual transfer.","section":"Application Layer","module":"Module 15","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":55,"type":"choice","choices":[{"text":"A basic set of rules for exchanging text, graphic images, sound, video, and other multimedia files on the web.","correct":false},{"text":"An application that allows real-time chatting among remote users.","correct":false},{"text":"Allows for data transfers between a client and a file server.","correct":true},{"text":"Uses encryption to secure the exchange of text, graphic images, sound, and video on the web.","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":89,"question":"A user is attempting to access http://www.cisco.com/ without success. Which two configuration values must be set on the host to allow this access? (Choose two.)","explanation":"Topic 11.1.2 To access a website like http://www.cisco.com/, two critical configuration values are required beyond a basic IP address and subnet mask. First, a DNS server address is necessary to resolve the human-readable domain name into a numeric IP address that the network layer can use for routing. Second, because the website resides on a remote network (the internet), a default gateway must be configured to allow the host to forward packets outside of its local network segment. Without these, the host can neither find the server’s IP address nor reach any destination beyond its own local LAN.","section":"IPv4 Addressing","module":"Module 11","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":56,"type":"choice","choices":[{"text":"DNS server","correct":true},{"text":"source port number","correct":false},{"text":"HTTP server","correct":false},{"text":"source MAC address","correct":false},{"text":"default gateway","correct":true}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":90,"question":"Which two statements accurately describe an advantage or a disadvantage when deploying NAT for IPv4 in a network? (Choose two.)","explanation":"Topic 12.1.1 Network Address Translation (NAT) is a technology that is implemented within IPv4 networks. One application of NAT is to use private IP addresses inside a network and use NAT to share a few public IP addresses for many internal hosts. In this way it provides a solution to slow down the IPv4 address depletion. However, since NAT hides the actual IP addresses that are used by end devices, it may cause problems for some applications that require end-to-end connectivity.","section":"IPv6 Addressing","module":"Module 12","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":56,"type":"choice","choices":[{"text":"NAT adds authentication capability to IPv4.","correct":false},{"text":"NAT introduces problems for some applications that require end-to-end connectivity.","correct":true},{"text":"NAT will impact negatively on switch performance.","correct":false},{"text":"NAT provides a solution to slow down the IPv4 address depletion.","correct":true},{"text":"NAT improves packet handling.","correct":false},{"text":"NAT causes routing tables to include more information.","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":91,"question":"What would be the interface ID of an IPv6 enabled interface with a MAC address of 1C-6F-65-C2-BD-F8 when the interface ID is generated by using the EUI-64 process?","explanation":"Topic 12.5.6 To derive the EUI-64 interface ID by using the MAC address 1C-6F-65-C2-BD-F8, three steps are taken. Change the seventh bit of the MAC address from a binary 0 to a binary 1 which changes the hex C, into a hex E. Insert hex digits FFFE into the middle of the address. Rewrite the address in IPv6 format. The three steps, when complete, give the interface ID of 1E6F:65FF:FEC2:BDF8 .","section":"IPv6 Addressing","module":"Module 12","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":57,"type":"choice","choices":[{"text":"0C6F:65FF:FEC2:BDF8","correct":false},{"text":"1E6F:65FF:FEC2:BDF8","correct":true},{"text":"C16F:65FF:FEC2:BDF8","correct":false},{"text":"106F:65FF:FEC2:BDF8","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":92,"question":"Refer to the exhibit. PC1 issues an ARP request because it needs to send a packet to PC2. In this scenario, what will happen next?","explanation":"Topic 9.2.4 When a network device wants to communicate with another device on the same network, it sends a broadcast ARP request. In this case, the request will contain the IP address of PC2. The destination device (PC2) sends an ARP reply with its MAC address.","section":"Address Resolution","module":"Module 9","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":57,"type":"choice","choices":[{"text":"SW1 will send an ARP reply with the SW1 Fa0/1 MAC address.","correct":false},{"text":"SW1 will send an ARP reply with the PC2 MAC address.","correct":false},{"text":"PC2 will send an ARP reply with the PC2 MAC address.","correct":true},{"text":"RT1 will send an ARP reply with the RT1 Fa0/0 MAC address.","correct":false},{"text":"RT1 will send an ARP reply with the PC2 MAC address.","correct":false}],"images":["assets/question-images/ccna-1-v7-0-final-exam-answers-full-introduction-to-networks-p57-0a416b1c801b.png"],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":93,"question":"What service is provided by BOOTP?","explanation":"Topic 3.3.4 BOOTP (Bootstrap Protocol) is a precursor to DHCP that allows diskless workstations to automatically discover their own IP address , locate a BOOTP server , and identify a file to be loaded into memory for booting the machine.","section":"Protocols and Models","module":"Module 3","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":58,"type":"choice","choices":[{"text":"Uses encryption to secure the exchange of text, graphic images, sound, and video on the web.","correct":false},{"text":"Allows for data transfers between a client and a file server.","correct":false},{"text":"Legacy application that enables a diskless workstation to discover its own IP address and find a BOOTP server on the network.","correct":true},{"text":"A basic set of rules for exchanging text, graphic images, sound, video, and other multimedia files on the web.","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":94,"question":"What characteristic describes adware?","explanation":"Topic 1.8.1 Adware and spyware are types of software installed on a user’s device that secretly collect information about the user.","section":"Networking Today","module":"Module 1","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":58,"type":"choice","choices":[{"text":"a network device that filters access and traffic coming into a network","correct":false},{"text":"software that is installed on a user device and collects information about the user","correct":true},{"text":"the use of stolen credentials to access private data","correct":false},{"text":"an attack that slows or crashes a device or network service","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":95,"question":"When a switch configuration includes a user-defined error threshold on a per-port basis, to which switching method will the switch revert when the error threshold is reached?","explanation":"Topic 7.4.2 When a switch is configured for cut-through switching , it can be set to monitor error rates on a per-port basis; if a user-defined error threshold is reached, the port automatically reverts to store-and-forward switching to perform error checking on all frames before forwarding. Once the error rate drops below the threshold, it changes back to cut-through switching.","section":"Ethernet Switching","module":"Module 7","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":59,"type":"choice","choices":[{"text":"cut-through","correct":false},{"text":"store-and-forward","correct":true},{"text":"fast-forward","correct":false},{"text":"fragment-free","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":96,"question":"Match a statement to the related network model. (Not all options are used.)","explanation":"Topic 15.2.2 Peer-to-peer networks do not require the use of a dedicated server, and devices can assume both client and server roles simultaneously on a per request basis. Because they do not require formalized accounts or permissions, they are best used in limited situations. Peer-to-peer applications require a user interface and background service to be running, and can be used in more diverse situations.","section":"Application Layer","module":"Module 15","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":59,"type":"reveal","answer":"[+] no dedicated server is required | [+] client and server roles are set on a per request basis | [#] requires a specific user interface | [#] a background service is required","choices":[],"images":["assets/question-images/ccna-1-v7-0-final-exam-answers-full-introduction-to-networks-p60-902f80fbc600.png"],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":97,"question":"What are two primary responsibilities of the Ethernet MAC sublayer? (Choose two.)","explanation":"Topic 7.1.3 The MAC sublayer is primarily responsible for data encapsulation and accessing the media . Data encapsulation includes framing (frame delimiting), addressing, and error detection, while accessing the media involves controlling the hardware (NIC) responsible for sending and receiving signals on the network medium.","section":"Ethernet Switching","module":"Module 7","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":60,"type":"choice","choices":[{"text":"error detection","correct":false},{"text":"frame delimiting","correct":false},{"text":"accessing the media","correct":true},{"text":"data encapsulation","correct":true},{"text":"logical addressing","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":98,"question":"Refer to the exhibit. What three facts can be determined from the viewable output of the show ip interface brief command? (Choose three.)","explanation":"Topic 17.5.7 Vlan1 is the default SVI. Because an SVI has been configured, the switch can be configured and managed remotely. FastEthernet0/0 is showing up and up, so a device is connected.","section":"Build a Small Network","module":"Module 17","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":61,"type":"choice","choices":[{"text":"Two physical interfaces have been configured.","correct":false},{"text":"The switch can be remotely managed.","correct":true},{"text":"One device is attached to a physical interface.","correct":true},{"text":"Passwords have been configured on the switch.","correct":false},{"text":"Two devices are attached to the switch.","correct":false},{"text":"The default SVI has been configured.","correct":true}],"images":["assets/question-images/ccna-1-v7-0-final-exam-answers-full-introduction-to-networks-p61-5667a934ce28.png"],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":99,"question":"Match each type of frame field to its function. (Not all options are used.)","explanation":"Topic 6.3.2","section":"Data Link Layer","module":"Module 6","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":61,"type":"reveal","answer":"See the associated exhibit for the answer shown in the source PDF.","choices":[],"images":["assets/question-images/ccna-1-v7-0-final-exam-answers-full-introduction-to-networks-p61-fd46072f9774.png"],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":100,"question":"What is the subnet ID associated with the IPv6 address 2001:DA48:FC5:A4:3D1B::1/64?","explanation":"Topic 12.3.6 The /64 represents the network and subnet IPv6 fields. The fourth field of hexadecimal digits is referred to as the subnet ID. The subnet ID for this address is 2001:DA48:FC5:A4::0/64.","section":"IPv6 Addressing","module":"Module 12","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":62,"type":"choice","choices":[{"text":"2001:DA48::/64","correct":false},{"text":"2001:DA48:FC5::A4:/64","correct":false},{"text":"2001:DA48:FC5:A4::/64","correct":true},{"text":"2001::/64","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":101,"question":"Match the firewall function to the type of threat protection it provides to the network. (Not all options are used.)","explanation":"Topic 16.3.6 Firewall products come packaged in various forms. These products use different techniques for determining what will be permitted or denied access to a network. They include the following: + Packet filtering – Prevents or allows access based on IP or MAC addresses + Application filtering – Prevents or allows access by specific application types based on port numbers + URL filtering – Prevents or allows access to websites based on specific URLs or keywords + Stateful packet inspection (SPI) – Incoming packets must be legitimate responses to requests from internal hosts. Unsolicited packets are blocked unless permitted specifically. SPI can also include the capability to recognize and filter out specific types of attacks, such as denial of service (DoS)","section":"Network Security Fundamentals","module":"Module 16","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":62,"type":"reveal","answer":"See the associated exhibit for the answer shown in the source PDF.","choices":[],"images":["assets/question-images/ccna-1-v7-0-final-exam-answers-full-introduction-to-networks-p62-bb41c6c3ed7a.png"],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":102,"question":"Users are reporting longer delays in authentication and in accessing network resources during certain time periods of the week. What kind of information should network engineers check to find out if this situation is part of a normal network behavior?","explanation":"Topic 17.4.5 The network engineers should first establish that the reported performance of the network is in fact abnormal. This is done by referring to the documented network performance baseline.Once it has been verified that the network is not having a proper performance, then specific troubleshooting processes can be applied.","section":"Build a Small Network","module":"Module 17","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":63,"type":"choice","choices":[{"text":"syslog records and messages","correct":false},{"text":"the network performance baseline","correct":true},{"text":"debug output and packet captures","correct":false},{"text":"network configuration files","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":103,"question":"How does the service password-encryption command enhance password security on Cisco routers and switches?","explanation":"Topic 2.4.4 The service password-encryption command encrypts plaintext passwords in the configuration file so that they cannot be viewed by unauthorized users.","section":"Basic Switch and End Device Configuration","module":"Module 2","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":64,"type":"choice","choices":[{"text":"It requires encrypted passwords to be used when connecting remotely to a router or switch with Telnet.","correct":false},{"text":"It encrypts passwords that are stored in router or switch configuration files.","correct":true},{"text":"It requires that a user type encrypted passwords to gain console access to a router or switch.","correct":false},{"text":"It encrypts passwords as they are sent across the network.","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":104,"question":"Which two statements are correct in a comparison of IPv4 and IPv6 packet headers? (Choose two.)","explanation":"Topic 8.3.3 The IPv6 packet header fields are as follows: Version, Traffic Class, Flow Label, Payload Length, Next Header, Hop Limit, Source Address, and Destination Address. The IPv4 packet header fields include the following: Version, Differentiated Services, Time-to-Live, Protocol, Source IP Address, and Destination IP Address. Both versions have a 4-bit Version field. Both versions have a Source (IP) Address field. IPv4 addresses are 32 bits; IPv6 addresses are 128 bits. The Time-to-Live or TTL field in IPv4 is now called Hop Limit in IPv6, but this field serves the same purpose in both versions. The value in this 8-bit field decrements each time a packet passes through any router. When this value is 0, the packet is discarded and is not forwarded to any other router.","section":"Network Layer","module":"Module 8","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":64,"type":"choice","choices":[{"text":"The Source Address field name from IPv4 is kept in IPv6.","correct":true},{"text":"The Version field from IPv4 is not kept in IPv6.","correct":false},{"text":"The Destination Address field is new in IPv6.","correct":false},{"text":"The Header Checksum field name from IPv4 is kept in IPv6.","correct":false},{"text":"The Time-to-Live field from IPv4 has been replaced by the Hop Limit field in IPv6.","correct":true}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":105,"question":"A network administrator wants to have the same network mask for all networks at a particular small site. The site has the following networks and number of devices: IP phones – 22 addresses PCs – 20 addresses needed Printers – 2 addresses needed Scanners – 2 addresses needed The network administrator has deemed that 192.168.10.0/24 is to be the network used at this site. Which single subnet mask would make the most efficient use of the available addresses to use for the four subnetworks?","explanation":"Topic 11.7.2 If the same mask is to be used, then the network with the most hosts must be examined for the number of hosts, which in this case is 22 hosts. Thus, 5 host bits are needed. The /27 or 255.255.255.224 subnet mask would be appropriate to use for these networks.","section":"IPv4 Addressing","module":"Module 11","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":65,"type":"choice","choices":[{"text":"255.255.255.192","correct":false},{"text":"255.255.255.252","correct":false},{"text":"255.255.255.240","correct":false},{"text":"255.255.255.248","correct":false},{"text":"255.255.255.0","correct":false},{"text":"255.255.255.224","correct":true}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":106,"question":"What characteristic describes identity theft?","explanation":"Topic 1.8.1 Identity theft is a specific type of information theft where a threat actor steals login credentials or personal information to access private data . Once accessed, this information is often used to take over a person’s identity to make unauthorized purchases or obtain legal documents.","section":"Networking Today","module":"Module 1","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":66,"type":"choice","choices":[{"text":"the use of stolen credentials to access private data","correct":true},{"text":"software on a router that filters traffic based on IP addresses or applications","correct":false},{"text":"software that identifies fast-spreading threats","correct":false},{"text":"a tunneling protocol that provides remote users with secure access into the network of an organization","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":107,"question":"A network administrator is adding a new LAN to a branch office. The new LAN must support 200 connected devices. What is the smallest network mask that the network administrator can use for the new network?","explanation":"Topic 11.7.2 To support 200 connected devices , the network administrator must choose a mask that provides at least 200 usable host addresses based on the formula 2 n −2. A mask with 7 host bits (2 7 −2=126) is insufficient, so 8 host bits 8 are required (2 −2=254). A 32-bit IPv4 address with 8 host bits leaves 24 bits for the network portion (/24), which corresponds to the subnet mask 255.255.255.0 .","section":"IPv4 Addressing","module":"Module 11","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":66,"type":"choice","choices":[{"text":"255.255.255.240","correct":false},{"text":"255.255.255.0","correct":true},{"text":"255.255.255.248","correct":false},{"text":"255.255.255.224","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":108,"question":"What are three commonly followed standards for constructing and installing cabling? (Choose three.)","explanation":"Topic 4.4.2 According to the TIA/EIA-568 standard, which governs commercial cabling for LAN environments, several physical elements are defined to ensure consistency and performance. These include cable lengths , the specific connector types used (such as RJ-45), and the wire color-coded pin assignments, commonly referred to as pinouts .","section":"Physical Layer","module":"Module 4","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":67,"type":"choice","choices":[{"text":"cost per meter (foot)","correct":false},{"text":"cable lengths","correct":true},{"text":"connector color","correct":false},{"text":"pinouts","correct":true},{"text":"connector types","correct":true},{"text":"tensile strength of plastic insulator","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":109,"question":"Refer to the exhibit. What is wrong with the displayed termination?","explanation":"Topic 4.4.2 When a cable to an RJ-45 connector is terminated, it is important to ensure that the untwisted wires are not too long and that the flexible plastic sheath surrounding the wires is crimped down and not the bare wires. None of the colored wires should be visible from the bottom of the jack.","section":"Physical Layer","module":"Module 4","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":67,"type":"choice","choices":[{"text":"The woven copper braid should not have been removed.","correct":false},{"text":"The wrong type of connector is being used.","correct":false},{"text":"The untwisted length of each wire is too long.","correct":true},{"text":"The wires are too thick for the connector that is used.","correct":false}],"images":["assets/question-images/ccna-1-v7-0-final-exam-answers-full-introduction-to-networks-p67-87122bf4919b.png"],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":110,"question":"Match the characteristic to the category. (Not all options are used.)","explanation":"Topic 9.1.1","section":"Address Resolution","module":"Module 9","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":68,"type":"reveal","answer":"See the associated exhibit for the answer shown in the source PDF.","choices":[],"images":["assets/question-images/ccna-1-v7-0-final-exam-answers-full-introduction-to-networks-p68-6266db5bad9c.png"],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":111,"question":"A client packet is received by a server. The packet has a destination port number of 143. What service is the client requesting?","explanation":"Topic 14.4.3 Destination port 143 is the well-known port for IMAP (Internet Message Access Protocol) , which enables clients to access and maintain email stored on a mail server.","section":"Transport Layer","module":"Module 14","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":68,"type":"choice","choices":[{"text":"IMAP","correct":true},{"text":"FTP","correct":false},{"text":"SSH","correct":false},{"text":"Telnet","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":112,"question":"What are two characteristics shared by TCP and UDP? (Choose two.)","explanation":"Topic 14.1.2 Both TCP and UDP use source and destination port numbers to distinguish different data streams and to forward the right data segments to the right applications. Error checking the header and data is done by both protocols by using a checksum calculation to determine the integrity of the data that is received. TCP is connection-oriented and uses a 3-way handshake to establish an initial connection. TCP also uses window to regulate the amount of traffic sent before receiving an acknowledgment. UDP is connectionless and is the best protocol for carry digitized VoIP signals.","section":"Transport Layer","module":"Module 14","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":69,"type":"choice","choices":[{"text":"default window size","correct":false},{"text":"connectionless communication","correct":false},{"text":"port numbering","correct":true},{"text":"3-way handshake","correct":false},{"text":"ability to to carry digitized voice","correct":false},{"text":"use of checksum","correct":true}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":113,"question":"Refer to the exhibit. Which two network addresses can be assigned to the network containing 10 hosts? Your answers should waste the fewest addresses, not reuse addresses that are already assigned, and stay within the 10.18.10.0/24 range of addresses. (Choose two.)","explanation":"Topic 11.7.2 Addresses 10.18.10.0 through 10.18.10.63 are taken for the leftmost network. Addresses 192 through 199 are used by the center network. Because 4 host bits are needed to accommodate 10 hosts, a /28 mask is needed. 10.18.10.200/28 is not a valid network number. Two subnets that can be used are 10.18.10.208/28 and 10.18.10.224/28.","section":"IPv4 Addressing","module":"Module 11","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":69,"type":"choice","choices":[{"text":"10.18.10.200/28","correct":false},{"text":"10.18.10.208/28","correct":true},{"text":"10.18.10.240/27","correct":false},{"text":"10.18.10.200/27","correct":false},{"text":"10.18.10.224/27","correct":false},{"text":"10.18.10.224/28","correct":true}],"images":["assets/question-images/ccna-1-v7-0-final-exam-answers-full-introduction-to-networks-p69-9db8c12c1e0c.png"],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":114,"question":"A client packet is received by a server. The packet has a destination port number of 21. What service is the client requesting?","explanation":"Topic 14.4.3 Destination port 21 is the well-known port used by FTP (File Transfer Protocol) for its control connection. This connection is established by the client to send commands to the server and receive replies, which is essential for managing the file transfer process.","section":"Transport Layer","module":"Module 14","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":70,"type":"choice","choices":[{"text":"FTP","correct":true},{"text":"LDAP","correct":false},{"text":"SLP","correct":false},{"text":"SNMP","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":115,"question":"What attribute of a NIC would place it at the data link layer of the OSI model?","explanation":"Topic 7.2.2 The data link layer describes media access and physical addressing. The encoding of a MAC address on a NIC places it at that layer. Ports and cables are placed at the physical layer of the OSI model. IP addresses are placed at the network layer. The TCP/IP protocol stack describes a different model.","section":"Ethernet Switching","module":"Module 7","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":70,"type":"choice","choices":[{"text":"attached Ethernet cable","correct":false},{"text":"IP address","correct":false},{"text":"MAC address","correct":true},{"text":"RJ-45 port","correct":false},{"text":"TCP/IP protocol stack","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":116,"question":"A network administrator is adding a new LAN to a branch office. The new LAN must support 10 connected devices. What is the smallest network mask that the network administrator can use for the new network?","explanation":"Topic 11.5.2 To support 10 connected devices , you must calculate the number of host bits required using the formula 2 n −2. A mask with 3 host bits (2 3 −2=6) is insufficient, so 4 host bits are needed, providing 14 usable host addresses 4 (2 −2=14). A 32-bit IPv4 address with 4 host bits leaves 28 bits for the network portion ( /28 ), which corresponds to the subnet mask 255.255.255.240 .","section":"IPv4 Addressing","module":"Module 11","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":71,"type":"choice","choices":[{"text":"255.255.255.192","correct":false},{"text":"255.255.255.248","correct":false},{"text":"255.255.255.224","correct":false},{"text":"255.255.255.240","correct":true}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":117,"question":"What technique is used with UTP cable to help protect against signal interference from crosstalk?","explanation":"Topic 4.4.1 To help prevent the effects of crosstalk, UTP cable wires are twisted together into pairs. Twisting the wires together causes the magnetic fields of each wire to cancel each other out.","section":"Physical Layer","module":"Module 4","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":71,"type":"choice","choices":[{"text":"wrapping a foil shield around the wire pairs","correct":false},{"text":"twisting the wires together into pairs","correct":true},{"text":"terminating the cable with special grounded connectors","correct":false},{"text":"encasing the cables within a flexible plastic sheath","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":118,"question":"Refer to the exhibit. The network administrator has assigned the LAN of LBMISS an address range of 192.168.10.0. This address range has been subnetted using a /29 prefix. In order to accommodate a new building, the technician has decided to use the fifth subnet for configuring the new network (subnet zero is the first subnet). By company policies, the router interface is always assigned the first usable host address and the workgroup server is given the last usable host address. Which configuration should be entered into the properties of the workgroup server to allow connectivity to the Internet?","explanation":"Topic 11.5.2 Using a /29 prefix to subnet 192.168.10.0 results in subnets that increment by 8: 192.168.10.0 (1) 192.168.10.8 (2) 192.168.10.16 (3) 192.168.10.24 (4) 192.168.10.32 (5)","section":"IPv4 Addressing","module":"Module 11","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":72,"type":"choice","choices":[{"text":"IP address: 192.168.10.65 subnet mask: 255.255.255.240, default gateway: 192.168.10.76","correct":false},{"text":"IP address: 192.168.10.38 subnet mask: 255.255.255.240, default gateway: 192.168.10.33","correct":false},{"text":"IP address: 192.168.10.38 subnet mask: 255.255.255.248, default gateway: 192.168.10.33","correct":true},{"text":"IP address: 192.168.10.41 subnet mask: 255.255.255.248, default gateway: 192.168.10.46","correct":false},{"text":"IP address: 192.168.10.254 subnet mask: 255.255.255.0, default gateway: 192.168.10.1","correct":false}],"images":["assets/question-images/ccna-1-v7-0-final-exam-answers-full-introduction-to-networks-p72-d876ee975028.png"],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":119,"question":"Refer to the exhibit. The switches are in their default configuration. Host A needs to communicate with host D, but host A does not have the MAC address for its default gateway. Which network hosts will receive the ARP request sent by host A?","explanation":"Topic 11.4.1 Since host A does not have the MAC address of the default gateway in its ARP table, host A sends an ARP broadcast. The ARP broadcast would be sent to every device on the local network. Hosts B, C, and router R1 would receive the broadcast. Router R1 would not forward the message.","section":"IPv4 Addressing","module":"Module 11","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":73,"type":"choice","choices":[{"text":"only host D","correct":false},{"text":"only router R1","correct":false},{"text":"only hosts A, B, and C","correct":false},{"text":"only hosts A, B, C, and D","correct":false},{"text":"only hosts B and C","correct":false},{"text":"only hosts B, C, and router R1","correct":true}],"images":["assets/question-images/ccna-1-v7-0-final-exam-answers-full-introduction-to-networks-p73-c73a958c21e3.png"],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":121,"question":"Refer to the exhibit. A network engineer has been given the network address of 192.168.99.0 and a subnet mask of 255.255.255.192 to subnet across the four networks shown. How many total host addresses are unused across all four subnets?","explanation":"Topic 11.5.2 Usable hosts per subnet : A subnet mask of 255.255.255.192 (/26) leaves 6 host bits (32−26=6). Using the formula 2 n −2, each subnet provides 62 usable host addresses 6 (2 −2=62). Used addresses : Across the four subnets, the total used addresses are 48 (30 for Network A, 14 for Network D, and 2 each for the router-to-router links in Networks B and C). Total unused : With four subnets, there are 248 total usable addresses (62×4=248). Subtracting the 48 used addresses results in 200 unused host addresses (248−48=200).","section":"IPv4 Addressing","module":"Module 11","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":74,"type":"choice","choices":[{"text":"88","correct":false},{"text":"200","correct":true},{"text":"72","correct":false},{"text":"224","correct":false},{"text":"158","correct":false}],"images":["assets/question-images/ccna-1-v7-0-final-exam-answers-full-introduction-to-networks-p74-3bbff21c1369.png"],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":122,"question":"Which connector is used with twisted-pair cabling in an Ethernet LAN?","explanation":"Topic 4.4.2","section":"Physical Layer","module":"Module 4","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":75,"type":"reveal","answer":"RJ 45 (true answer)","choices":[],"images":["assets/question-images/ccna-1-v7-0-final-exam-answers-full-introduction-to-networks-p75-37f021a96d09.png","assets/question-images/ccna-1-v7-0-final-exam-answers-full-introduction-to-networks-p75-f602954264e0.png","assets/question-images/ccna-1-v7-0-final-exam-answers-full-introduction-to-networks-p75-fb19cfe7cd37.png","assets/question-images/ccna-1-v7-0-final-exam-answers-full-introduction-to-networks-p76-d1ff016acc01.png","assets/question-images/ccna-1-v7-0-final-exam-answers-full-introduction-to-networks-p76-0296476080ee.png"],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":123,"question":"A client packet is received by a server. The packet has a destination port number of 22. What service is the client requesting?","explanation":"Topic 14.4.3 Destination port 22 is the well-known port number reserved for SSH (Secure Shell) , which provides a secure remote access connection to network devices and servers. It is considered a secure, encrypted alternative to Telnet , which uses port 23.","section":"Transport Layer","module":"Module 14","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":76,"type":"choice","choices":[{"text":"SSH","correct":true},{"text":"SMB/CIFS","correct":false},{"text":"HTTPS","correct":false},{"text":"SLP","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":124,"question":"What characteristic describes an IPS?","explanation":"Topic 1.8.2 IPS – An intrusion prevention system (IPS) monitors incoming and outgoing traffic looking for malware, network attack signatures, and more. If it recognizes a threat, it can immediately stop it.","section":"Networking Today","module":"Module 1","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":76,"type":"choice","choices":[{"text":"a tunneling protocol that provides remote users with secure access into the network of an organization","correct":false},{"text":"a network device that filters access and traffic coming into a network","correct":false},{"text":"software that identifies fast-spreading threats","correct":true},{"text":"software on a router that filters traffic based on IP addresses or applications","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":125,"question":"What service is provided by DHCP?","explanation":"Topic 15.4.6 DHCP (Dynamic Host Configuration Protocol) automates the assignment of IPv4 addresses , subnet masks, default gateways, and other parameters. It allows these addresses to be leased for a period of time and reused when no longer needed, which is more efficient than manual static addressing.","section":"Application Layer","module":"Module 15","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":77,"type":"choice","choices":[{"text":"An application that allows real-time chatting among remote users.","correct":false},{"text":"Allows remote access to network devices and servers.","correct":false},{"text":"Dynamically assigns IP addresses to end and intermediary devices.","correct":true},{"text":"Uses encryption to provide secure remote access to network devices and servers.","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":126,"question":"Match the header field with the appropriate layer of the OSI model. (Not all options are used.)","explanation":"Topic 3.6.3","section":"Protocols and Models","module":"Module 3","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":77,"type":"reveal","answer":"See the associated exhibit for the answer shown in the source PDF.","choices":[],"images":["assets/question-images/ccna-1-v7-0-final-exam-answers-full-introduction-to-networks-p77-d8321288d31a.png"],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":127,"question":"Refer to the exhibit. The switches have a default configuration. Host A needs to communicate with host D, but host A does not have the MAC address for the default gateway. Which network devices will receive the ARP request sent by host A?","explanation":"Topic 11.4.1 Because host A does not have the MAC address of the default gateway in the ARP table, host A sends an ARP broadcast. The ARP broadcast would be sent to every device on the local network. Hosts B, C, and router R1 would receive the broadcast. Router R1 would not forward the message.","section":"IPv4 Addressing","module":"Module 11","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":78,"type":"choice","choices":[{"text":"only host D","correct":false},{"text":"only hosts A, B, C, and D","correct":false},{"text":"only hosts B and C","correct":false},{"text":"only hosts B, C, and router R1","correct":true},{"text":"only hosts A, B, and C","correct":false},{"text":"only router R1","correct":false}],"images":["assets/question-images/ccna-1-v7-0-final-exam-answers-full-introduction-to-networks-p79-a4ea510c8ec5.png"],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":128,"question":"Which wireless technology has low-power and low- data rate requirements making it popular in IoT environments?","explanation":"Topic 4.6.2 Zigbee is a specification used for low-data rate, low- power communications. It is intended for applications that require short-range, low data-rates and long battery life. Zigbee is typically used for industrial and Internet of Things (IoT) environments such as wireless light switches and medical device data collection.","section":"Physical Layer","module":"Module 4","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":79,"type":"choice","choices":[{"text":"Bluetooth","correct":false},{"text":"Zigbee","correct":true},{"text":"WiMAX","correct":false},{"text":"Wi-Fi","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":129,"question":"What two ICMPv6 message types must be permitted through IPv6 access control lists to allow resolution of Layer 3 addresses to Layer 2 MAC addresses? (Choose two.)","explanation":"Topic 9.3.3 IPv6 performs address resolution (mapping a known Layer 3 IPv6 address to a Layer 2 MAC address) using the Neighbor Discovery (ND) protocol instead of ARP. This process specifically requires Neighbor Solicitation (NS) messages to request the MAC address and Neighbor Advertisement (NA) messages to provide it; therefore, both must be permitted through access control lists for local network communication to function.","section":"Address Resolution","module":"Module 9","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":79,"type":"choice","choices":[{"text":"neighbor solicitations","correct":true},{"text":"echo requests","correct":false},{"text":"neighbor advertisements","correct":true},{"text":"echo replies","correct":false},{"text":"router solicitations","correct":false},{"text":"router advertisements","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":130,"question":"A client is using SLAAC to obtain an IPv6 address for its interface. After an address has been generated and applied to the interface, what must the client do before it can begin to use this IPv6 address?","explanation":"Topic 12.5.7 Stateless DHCPv6 or stateful DHCPv6 uses a DHCP server, but Stateless Address Autoconfiguration (SLAAC) does not. A SLAAC client can automatically generate an address that is based on information from local routers via Router Advertisement (RA) messages. Once an address has been assigned to an interface via SLAAC, the client must ensure via Duplicate Address Detection (DAD) that the address is not already in use. It does this by sending out an ICMPv6 Neighbor Solicitation message and listening for a response. If a response is received, then it means that another device is already using this address.","section":"IPv6 Addressing","module":"Module 12","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":80,"type":"choice","choices":[{"text":"It must send a DHCPv6 INFORMATION-REQUEST message to request the address of the DNS server.","correct":false},{"text":"It must send a DHCPv6 REQUEST message to the DHCPv6 server to request permission to use this address.","correct":false},{"text":"It must send an ICMPv6 Router Solicitation message to determine what default gateway it should use.","correct":false},{"text":"It must send an ICMPv6 Neighbor Solicitation message to ensure that the address is not already in use on the network.","correct":true}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":131,"question":"Two pings were issued from a host on a local network. The first ping was issued to the IP address of the default gateway of the host and it failed. The second ping was issued to the IP address of a host outside the local network and it was successful. What is a possible cause for the failed ping?","explanation":"Topic 13.2.3 If the ping from one host to another host on a remote network is successful, this indicates that the default gateway is operational. In this scenario, if a ping from one host to the default gateway failed, it is possible that some security features are applied to the router interface, preventing it from responding to ping requests.","section":"ICMP","module":"Module 13","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":81,"type":"choice","choices":[{"text":"The default gateway is not operational.","correct":false},{"text":"The default gateway device is configured with the wrong IP address.","correct":false},{"text":"Security rules are applied to the default gateway device, preventing it from processing ping requests.","correct":true},{"text":"The TCP/IP stack on the default gateway is not working properly.","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":132,"question":"An organization is assigned an IPv6 address block of 2001:db8:0:ca00::/56. How many subnets can be created without using bits in the interface ID space?","explanation":"Topic 12.8.1 The organization is assigned a /56 prefix . Since a standard IPv6 subnet uses a /64 prefix length to preserve the 64-bit interface ID space, there are 8 bits n available for subnetting (64−56=8). Using the formula 2 , where 8 n is the number of bits, 2 allows for the creation of 256 subnets .","section":"IPv6 Addressing","module":"Module 12","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":81,"type":"choice","choices":[{"text":"256","correct":true},{"text":"512","correct":false},{"text":"1024","correct":false},{"text":"4096","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":133,"question":"What subnet mask is needed if an IPv4 network has 40 devices that need IP addresses and address space is not to be wasted?","explanation":"Topic 11.5.2 In order to accommodate 40 devices, 6 host bits are needed. With 6 bits, 64 addresses are possible, but one address is for the subnet number and one address is for a broadcast. This leaves 62 addresses that can be assigned to network devices. The mask associated with leaving 6 host bits for addressing is 255.255.255.192.","section":"IPv4 Addressing","module":"Module 11","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":82,"type":"choice","choices":[{"text":"255.255.255.0","correct":false},{"text":"255.255.255.240","correct":false},{"text":"255.255.255.128","correct":false},{"text":"255.255.255.192","correct":true},{"text":"255.255.255.224","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":134,"question":"Refer to the exhibit. If host A sends an IP packet to host B, what will the destination address be in the frame when it leaves host A?","explanation":"Topic 9.1.2 When a host sends information to a distant network, the Layer 2 frame header will contain a source and destination MAC address. The source address will be the originating host device. The destination address will be the router interface that connects to the same network. In the case of host A sending information to host B, the source address is AA:AA:AA:AA:AA:AA and the destination address is the MAC address assigned to the R2 Ethernet interface, BB:BB:BB:BB:BB:BB.","section":"Address Resolution","module":"Module 9","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":82,"type":"choice","choices":[{"text":"DD:DD:DD:DD:DD:DD","correct":false},{"text":"172.168.10.99","correct":false},{"text":"CC:CC:CC:CC:CC:CC","correct":false},{"text":"172.168.10.65","correct":false},{"text":"BB:BB:BB:BB:BB:BB","correct":true},{"text":"AA:AA:AA:AA:AA:AA","correct":false}],"images":["assets/question-images/ccna-1-v7-0-final-exam-answers-full-introduction-to-networks-p82-38e497316b60.png"],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":135,"question":"What is a benefit of using cloud computing in networking?","explanation":"Topic 1.7.6 Cloud computing extends IT’s capabilities without requiring investment in new infrastructure, training new personnel, or licensing new software. These services are available on-demand and delivered economically to any device anywhere in the world without compromising security or function. BYOD is about end users having the freedom to use personal tools to access information and communicate across a business or campus network. Smart home technology is integrated into every-day appliances allowing them to interconnect with other devices, making them more ‘smart’ or automated. Powerline networking is a trend for home networking that uses existing electrical wiring to connect devices to the network wherever there is an electrical outlet, saving the cost of installing data cables.","section":"Networking Today","module":"Module 1","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":83,"type":"choice","choices":[{"text":"Technology is integrated into every-day appliances allowing them to interconnect with other devices, making them more ‘smart’ or automated.","correct":false},{"text":"Network capabilities are extended without requiring investment in new infrastructure, personnel, or software.","correct":true},{"text":"End users have the freedom to use personal tools to access information and communicate across a business network.","correct":false},{"text":"Home networking uses existing electrical wiring to connect devices to the network wherever there is an electrical outlet, saving the cost of installing data cables.","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":136,"question":"Which two statements are correct about MAC and IP addresses during data transmission if NAT is not involved? (Choose two.)","explanation":"Topic 9.1.2 IP addresses (Layer 3) represent the original source and final destination of a packet and remain constant throughout the entire path across multiple networks, provided NAT is not involved. In contrast, MAC addresses (Layer 2) have local significance only and are used to deliver a frame from one network interface to another within the same network . Every time a packet reaches a router, the Layer 2 frame is stripped off and a new frame with updated source and destination MAC addresses is created for the next segment of the journey.","section":"Address Resolution","module":"Module 9","source":"CCNA 1 v7.0 Final Exam","sourceFile":"CCNA 1 v7.0 Final Exam Answers Full - Introduction to Networks.pdf","sourcePage":84,"type":"choice","choices":[{"text":"Destination IP addresses in a packet header remain constant along the entire path to a target host.","correct":true},{"text":"Destination MAC addresses will never change in a frame that goes across seven routers.","correct":false},{"text":"Every time a frame is encapsulated with a new destination MAC address, a new destination IP address is needed.","correct":false},{"text":"Destination and source MAC addresses have local significance and change every time a frame goes from one LAN to another.","correct":true},{"text":"A packet that has crossed four routers has changed the destination IP address four times.","correct":false}],"images":[],"sources":["CCNA 1 v7.0 Final Exam"]},{"number":137,"question":"What is one main characteristic of the data link layer?","explanation":"Topic 6.1.1 The data link layer (Layer 2) prepares network data for the physical network and enables upper layers to access the media while remaining completely unaware of the type of physical medium used. Without this layer, higher- level protocols like IP would have to be specifically designed to connect to every possible type of media along a delivery path.","section":"Data Link Layer","module":"Module 6","source":"CCNA 1 v7.0 Fina
